<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>2023 정형외과 전문의 시험</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sidebar-w:240px;--memo-w:340px;
  --dark:#181b20;--dark2:#1f2329;--dark3:#282d36;--dark4:#323844;
  --accent:#4a90d9;--accent2:#6cb2f7;--accent-glow:rgba(74,144,217,.12);
  --text:#d8dce4;--text2:#8b919e;--text3:#5c6370;
  --border:rgba(255,255,255,.06);
  --content-bg:#f8f9fb;--card-bg:#fff;
  --heading1:#1a2332;--heading2:#243044;--heading3:#344256;--body-text:#3a4553;
  --correct:#4caf50;--wrong:#f44336;--correct-bg:rgba(76,175,80,.08);--wrong-bg:rgba(244,67,54,.06)
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;background:var(--content-bg);color:var(--body-text);display:flex;height:100vh;overflow:hidden}

/* ====== SIDEBAR (간소화) ====== */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--dark);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;border-right:1px solid rgba(255,255,255,.03)}
.sidebar-header{padding:22px 20px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(74,144,217,.08) 0%,transparent 100%)}
.sidebar-header h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sidebar-header .sub{font-size:10.5px;color:var(--text2);margin-top:5px}
.user-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--dark2)}
.user-bar .user-info{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.user-bar .user-icon{width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.user-bar .logout-btn{padding:3px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text3);font-size:10.5px;cursor:pointer;font-family:inherit;transition:all .15s}
.user-bar .logout-btn:hover{border-color:#f44;color:#f44}

/* 책 목록 */
.book-list{flex:1;overflow-y:auto;padding:12px}
.book-item{padding:14px 16px;margin-bottom:8px;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--dark2);position:relative}
.book-item:hover{background:var(--dark3);border-color:var(--dark4);transform:translateX(2px)}
.book-item.active{background:var(--accent-glow);border-color:var(--accent);box-shadow:0 0 12px rgba(74,144,217,.15)}
.book-item .book-icon{font-size:20px;margin-bottom:6px}
.book-item .book-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.book-item.active .book-title{color:var(--accent2)}
.book-item .book-stats{display:flex;gap:8px;margin-top:8px;font-size:10px}
.book-item .book-stats span{padding:2px 8px;border-radius:8px;font-weight:600}
.book-stat-total{background:var(--dark3);color:var(--text2)}
.book-stat-done{background:rgba(76,175,80,.15);color:var(--correct)}
.book-stat-wrong{background:rgba(244,67,54,.1);color:var(--wrong)}
.book-item .book-progress{margin-top:8px;height:3px;background:var(--dark4);border-radius:2px;overflow:hidden}
.book-item .book-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* 사이드 하단 버튼 */
.sidebar-bottom{padding:0 12px 12px;display:flex;flex-direction:column;gap:6px}
.sidebar-bottom button{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--dark2);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;font-family:inherit;font-weight:600}
.sidebar-bottom button:hover{background:var(--dark3);border-color:var(--dark4)}
.sidebar-bottom .count{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700}
.sidebar-bottom .wrong-count{background:var(--wrong)}

/* ====== MAIN ====== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:10px 28px;border-bottom:1px solid #e5e8ed;background:#fff;font-size:13px;color:#555;display:flex;align-items:center;justify-content:space-between;min-height:44px;font-weight:500}
.main-header .back-btn{padding:5px 14px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#555;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;display:none}
.main-header .back-btn:hover{border-color:var(--accent);color:var(--accent)}
.content-area{flex:1;overflow-y:auto;padding:20px 40px 60px}
.content-area::-webkit-scrollbar{width:5px}
.content-area::-webkit-scrollbar-thumb{background:#d0d3d9;border-radius:3px}

/* ====== WELCOME ====== */
.welcome{text-align:center;padding-top:60px}
.welcome h2{font-size:26px;color:var(--heading1);margin-bottom:10px;font-weight:800}
.welcome p{color:var(--text2);font-size:13.5px;line-height:1.6}
.welcome .stats{display:flex;gap:48px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.welcome .stat-num{font-size:36px;font-weight:800;letter-spacing:-.5px}
.welcome .stat-num.blue{color:var(--accent)}.welcome .stat-num.green{color:var(--correct)}.welcome .stat-num.red{color:var(--wrong)}.welcome .stat-num.orange{color:#ff9800}
.welcome .stat-label{font-size:12px;color:var(--text2);margin-top:2px;font-weight:500}
.welcome .reset-views{margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.welcome .reset-views button{padding:8px 20px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#777;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.welcome .reset-views button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ====== QUESTION GRID ====== */
.grid-view{max-width:900px;margin:0 auto}
.grid-view h2{font-size:22px;font-weight:800;color:var(--heading1);margin-bottom:6px}
.grid-view .grid-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.grid-view .grid-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.grid-controls button{padding:6px 14px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#777;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.grid-controls button:hover{border-color:var(--accent);color:var(--accent)}
.grid-controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.q-group{margin-bottom:24px}.q-group-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px;padding:8px 14px;background:rgba(74,144,217,.08);border-radius:8px;border-left:3px solid var(--accent);display:flex;align-items:center;justify-content:space-between}.q-group-stats{font-size:11px;color:var(--text2);font-weight:500}
.q-card{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #e0e3e8;background:#fff;transition:all .2s;position:relative;overflow:hidden}
.q-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,144,217,.15)}
.q-card .q-card-num{font-size:18px;font-weight:800;color:var(--heading2)}
.q-card .q-card-views{font-size:9px;color:var(--text2);margin-top:2px;font-weight:600}
.q-card.answered-correct{border-color:var(--correct);background:var(--correct-bg)}
.q-card.answered-correct .q-card-num{color:var(--correct)}
.q-card.answered-wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.q-card.answered-wrong .q-card-num{color:var(--wrong)}
.q-card.has-note::after{content:'';position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#ff9800}

/* ====== QUIZ CARD ====== */
.quiz-card{max-width:820px;margin:0 auto}
.quiz-meta{background:linear-gradient(135deg,#f0f4fa 0%,#e8edf6 100%);border-radius:10px;padding:10px 16px;margin-bottom:12px;border-left:4px solid var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.quiz-meta .meta-section{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.quiz-meta .meta-num{font-size:13px;color:#6a7585;font-weight:600}
.quiz-meta .meta-views{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:3px 10px;background:rgba(74,144,217,.1);border-radius:12px;font-size:11px;color:var(--accent);font-weight:600}
.quiz-meta .meta-minus-btn,.quiz-meta .meta-reset-btn{background:none;border:1px solid rgba(74,144,217,.3);color:var(--accent);padding:1px 7px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;margin-left:4px;font-family:inherit}
.quiz-meta .meta-minus-btn:hover,.quiz-meta .meta-reset-btn:hover{background:var(--accent);color:#fff}
.quiz-question{font-size:15.5px;font-weight:700;color:var(--heading1);line-height:1.55;margin-bottom:14px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #e8eaef}
.quiz-question img{max-width:100%;border-radius:8px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.quiz-question img:hover{transform:scale(1.02)}
.quiz-choices{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.choice-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;border:2px solid #e0e3e8;border-radius:10px;background:#fff;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;font-size:14px;line-height:1.45;color:var(--body-text)}
.choice-btn:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateX(4px)}
.choice-btn .choice-num{min-width:26px;height:26px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#666;flex-shrink:0;transition:all .2s}
.choice-btn:hover .choice-num{background:var(--accent);color:#fff}
.choice-btn .choice-text{padding-top:0;flex:1}
.choice-btn.correct{border-color:var(--correct);background:var(--correct-bg)}
.choice-btn.correct .choice-num{background:var(--correct);color:#fff}
.choice-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.choice-btn.wrong .choice-num{background:var(--wrong);color:#fff}
.choice-btn.disabled{pointer-events:none;opacity:.85}
.choice-btn.dimmed{opacity:.5}
.result-banner{padding:10px 16px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.result-banner.correct{background:var(--correct-bg);color:var(--correct);border:1px solid rgba(76,175,80,.2)}
.result-banner.wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid rgba(244,67,54,.15)}
.result-banner .result-icon{font-size:24px}
.retry-btn{background:rgba(255,255,255,.85);color:#333;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s ease}
.retry-btn:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.explanation-box{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e8eaef;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:12px;animation:slideIn .4s ease}
.explanation-box h3{font-size:14.5px;font-weight:800;color:var(--heading1);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.explanation-box .expl-text{font-size:13.5px;line-height:1.55;color:var(--body-text)}
.explanation-box .expl-ref{margin-top:8px;font-size:12px;color:var(--accent);font-weight:600;padding:4px 10px;background:var(--accent-glow);border-radius:8px;display:inline-block}
.explanation-box .expl-images{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.explanation-box .expl-images img{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.explanation-box .expl-images img:hover{transform:scale(1.02)}
.note-section{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.note-input-row{display:flex;gap:8px}
.note-input{flex:1;padding:10px 14px;border:1px solid #d0d3d9;border-radius:10px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:120px;line-height:1.5;transition:border .2s}
.note-input:focus{border-color:var(--accent)}
.note-input::placeholder{color:#aaa}
.note-add-btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.note-add-btn.wrong-btn{background:var(--wrong);color:#fff}
.note-add-btn.wrong-btn:hover{background:#d32f2f}
.note-add-btn.memo-btn{background:var(--accent);color:#fff}
.note-add-btn.memo-btn:hover{background:#3a7bc8}
.note-list{margin-top:10px}
.note-item{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:8px;border-left:4px solid;font-size:13px;line-height:1.6;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.note-item.wrong-note{border-color:var(--wrong);background:var(--wrong-bg)}
.note-item.memo-note{border-color:var(--accent);background:var(--accent-glow)}
.note-item .note-del{position:absolute;top:8px;right:10px;cursor:pointer;color:#ccc;font-size:16px;transition:color .15s;background:none;border:none}
.note-item .note-del:hover{color:var(--wrong)}
.note-item .note-time{font-size:10px;color:#999;margin-top:4px}
.quiz-nav{display:flex;gap:10px;margin-top:14px;justify-content:space-between}
.quiz-nav button{padding:10px 24px;border:1px solid #d0d3d9;border-radius:10px;background:#fff;color:#555;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.quiz-nav button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.quiz-nav button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.quiz-nav button.primary:hover{background:#3a7bc8}
.lightbox{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)}
/* Memo panel */
.memo-panel{width:0;min-width:0;background:var(--dark);color:var(--text);transition:all .3s ease;overflow:hidden;display:flex;flex-direction:column;height:100vh;border-left:1px solid var(--border);position:relative}
.memo-panel.open{width:var(--memo-w);min-width:var(--memo-w)}
.memo-panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.memo-panel-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.memo-close{cursor:pointer;color:var(--text2);font-size:20px;padding:4px;transition:color .15s;background:none;border:none}
.memo-close:hover{color:#fff}
.memo-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--dark2)}
.memo-tab-btn{flex:1;padding:9px 4px;border:none;background:none;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.memo-tab-btn:hover{color:var(--text);background:var(--dark3)}
.memo-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.memo-filter-bar{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--dark)}
.memo-filter-chip{padding:4px 10px;border:1px solid var(--border);border-radius:12px;background:none;color:var(--text3);font-size:10.5px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.memo-filter-chip:hover{border-color:var(--text2);color:var(--text)}
.memo-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.memo-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.memo-tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.memo-tab-content.active{display:flex}
.memo-list{flex:1;overflow-y:auto;padding:10px}
.memo-empty{text-align:center;padding:48px 18px;color:var(--text3);font-size:12.5px;line-height:1.7}
.memo-item{background:var(--dark2);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:12.5px;line-height:1.55;position:relative;border-left:3px solid;transition:background .15s;cursor:pointer}
.memo-item:hover{background:var(--dark3)}
.memo-item.wrong{border-left-color:var(--wrong)}.memo-item.note{border-left-color:var(--accent)}
.memo-item .memo-q{font-size:10.5px;color:var(--accent2);margin-bottom:5px;font-weight:600}
.memo-item .memo-text{color:var(--text)}
.memo-item .memo-del{position:absolute;top:8px;right:10px;cursor:pointer;color:var(--text3);font-size:15px;transition:color .15s;background:none;border:none}
.memo-item .memo-del:hover{color:#f44}
.memo-export{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.memo-export button{width:100%;padding:9px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:12.5px;cursor:pointer;font-weight:700;font-family:inherit;transition:background .15s}
.memo-export button:hover{background:#3a7bc8}
.memo-export .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text2)}
.memo-export .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.memo-resize-handle{width:5px;cursor:col-resize;background:transparent;position:absolute;left:0;top:0;bottom:0;z-index:10;transition:background .2s}
.memo-resize-handle:hover,.memo-resize-handle.active{background:var(--accent)}
.memo-wrong-preview{border-top:1px solid var(--border);padding:14px 16px;max-height:45%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:rgba(255,255,255,.03);flex-shrink:0}
.memo-wrong-preview .preview-header{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.memo-wrong-preview .preview-header button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px}
.memo-wrong-preview .preview-q{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:8px}
.memo-wrong-preview .preview-choices{font-size:12px;color:var(--text2);line-height:1.7}
.memo-wrong-preview .preview-choices .correct-choice{color:#4ade80;font-weight:700}
.memo-wrong-preview .preview-choices .wrong-choice{color:#f87171;text-decoration:line-through}
.memo-wrong-preview .preview-go{margin-top:10px;padding:6px 14px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.memo-wrong-preview .preview-go:hover{background:var(--accent);color:#fff}
.memo-item.selected{background:rgba(66,133,244,.15);border-left:3px solid var(--accent)}
/* Login */
.login-overlay{position:fixed;inset:0;z-index:99999;background:var(--dark);display:flex;align-items:center;justify-content:center}
.login-box{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:40px 36px 32px;width:340px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-box h2{color:#fff;font-size:22px;text-align:center;margin-bottom:4px;font-weight:800}
.login-box .login-sub{color:var(--text2);font-size:12px;text-align:center;margin-bottom:24px}
.login-box label{display:block;color:var(--text2);font-size:11.5px;font-weight:600;margin-bottom:5px;margin-top:14px}
.login-box input[type="text"],.login-box input[type="password"]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--dark3);color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border .2s}
.login-box input:focus{border-color:var(--accent)}
.login-box .login-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit}
.login-box .login-btn:hover{background:#3a7bc8}
.login-box .login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-box .login-error{color:#f44;font-size:12px;text-align:center;margin-top:12px;min-height:18px}

<script>
const APP_VERSION='20260429-1742';
async function _checkForUpdate(){
  try{
    const r=await fetch('./index.html?_='+Date.now(),{cache:'no-store'});
    const t=await r.text();
    const m=t.match(/APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
    if(m&&m[1]&&m[1]!==APP_VERSION){
      console.log('[Update] 새 버전 감지:',APP_VERSION,'→',m[1]);
      let div=document.getElementById('_updateBanner');
      if(div)return;
      div=document.createElement('div');
      div.id='_updateBanner';
      div.style.cssText='position:fixed;top:14px;right:14px;background:linear-gradient(135deg,#4a90d9,#6cb2f7);color:#fff;padding:14px 20px;border-radius:10px;z-index:99999;font:14px sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.4);cursor:pointer;user-select:none';
      div.title='클릭하면 즉시 새로고침';
      document.body.appendChild(div);
      let cnt=5;
      const render=()=>{div.innerHTML='🔄 새 버전 적용 중... <b>'+cnt+'초</b><br><span style=font-size:11px;opacity:.85>클릭하면 즉시 적용</span>';};
      render();
      div.onclick=()=>location.reload(true);
      const tm=setInterval(()=>{cnt--;if(cnt<=0){clearInterval(tm);location.reload(true);}else render();},1000);
    }
  }catch(e){console.warn('[Update] 체크 실패:',e);}
}
setTimeout(_checkForUpdate,30000);
setInterval(_checkForUpdate,5*60*1000);
window._checkForUpdate=_checkForUpdate;
</script>

function doLogin(){const i=document.getElementById('loginId').value.trim(),p=document.getElementById('loginPw').value,e=document.getElementById('loginError'),b=document.getElementById('loginBtn');e.textContent='';if(!i||!p){e.textContent='아이디와 비밀번호를 입력하세요';return;}const em=i.includes('@')?i:i+'@'+EMAIL_DOMAIN;b.disabled=true;b.textContent='로그인 중...';console.log('[Auth] 로그인 시도:',em);const loginTimeout=setTimeout(()=>{e.textContent='서버 응답 없음. 네트워크를 확인하세요.';b.disabled=false;b.textContent='로그인';},15000);auth.signInWithEmailAndPassword(em,p).then(()=>{clearTimeout(loginTimeout);console.log('[Auth] 로그인 성공');}).catch(err=>{console.log('[Auth] 로그인 실패:',err.code,err.message);if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential'){console.log('[Auth] 새 계정 생성 시도');auth.createUserWithEmailAndPassword(em,p).then(()=>{clearTimeout(loginTimeout);console.log('[Auth] 계정 생성 성공');}).catch(e2=>{clearTimeout(loginTimeout);console.log('[Auth] 계정 생성 실패:',e2.code,e2.message);let m='로그인 실패';if(e2.code==='auth/weak-password')m='비밀번호 6자 이상 입력하세요';else if(e2.code==='auth/email-already-in-use')m='비밀번호가 틀렸습니다';else if(e2.code==='auth/network-request-failed')m='네트워크 오류 — 인터넷 연결을 확인하세요';else m=e2.message;e.textContent=m;b.disabled=false;b.textContent='로그인';});}else{clearTimeout(loginTimeout);let m=err.message;if(err.code==='auth/wrong-password')m='비밀번호가 틀렸습니다';else if(err.code==='auth/network-request-failed')m='네트워크 오류 — 인터넷 연결을 확인하세요';else if(err.code==='auth/too-many-requests')m='로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요';e.textContent=m;b.disabled=false;b.textContent='로그인';}});}

function doLogout(){if(!confirm('로그아웃 하시겠습니까?'))return;localStorage.removeItem(PREFIX+'_mode');auth.signOut();location.reload();}
auth.onAuthStateChanged(u=>{console.log('[Auth] 상태 변경:',u?u.email:'로그아웃');if(offlineMode)return;if(u){currentUser=u;document.getElementById('loginOverlay').style.display='none';document.getElementById('userBar').style.display='flex';localStorage.setItem(PREFIX+'_mode','firebase');const n=u.email.replace(/@.*$/,'');document.getElementById('userDisplayName').textContent=n;document.querySelector('.user-icon').textContent=n.charAt(0).toUpperCase();loadFromFirestore().then(()=>{firestoreReady=true;initApp();}).catch(err=>{console.error('[Auth] Firestore 로드 실패:',err);firestoreReady=false;loadLocalData();initApp();});}else{currentUser=null;firestoreReady=false;document.getElementById('loginOverlay').style.display='flex';document.getElementById('userBar').style.display='none';document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='로그인';}});
function _mergeArrById(a,b){const seen=new Set();const out=[];for(const it of [...(a||[]),...(b||[])]){if(!it||it.id==null)continue;if(seen.has(it.id))continue;seen.add(it.id);out.push(it);}return out;}
function _mergeObjByKey(a,b,timeKey){const out={...(a||{})};for(const k of Object.keys(b||{})){if(!out[k]){out[k]=b[k];}else{const t1=(out[k]&&out[k][timeKey])||0,t2=(b[k]&&b[k][timeKey])||0;if(t2>t1)out[k]={...b[k]};if(timeKey==='lastViewed'&&out[k].count!=null&&b[k].count!=null)out[k].count=Math.max(out[k].count,b[k].count);}}return out;}
async function loadFromFirestore(){if(!currentUser)return;showSync('syncing','☁️ 동기화 중...');loadLocalData();const lc={w:wrongNotes.length,m:memoNotes.length,v:Object.keys(viewData).length,a:Object.keys(answerData).length};console.log('[Firestore] 로컬 데이터:',lc);try{const d=await db.collection('users').doc(currentUser.uid).get();if(d.exists){const data=d.data();const cw=data.wrongNotes||[],cm=data.memoNotes||[],cv=data.viewData||{},ca=data.answerData||{};console.log('[Firestore] 클라우드 데이터:',{w:cw.length,m:cm.length,v:Object.keys(cv).length,a:Object.keys(ca).length,lastUpdated:data.lastUpdated&&data.lastUpdated.toDate?data.lastUpdated.toDate().toLocaleString():null});const mw=_mergeArrById(cw,wrongNotes),mm=_mergeArrById(cm,memoNotes),mv=_mergeObjByKey(cv,viewData,'lastViewed'),ma=_mergeObjByKey(ca,answerData,'time');const upload=mw.length>cw.length||mm.length>cm.length||Object.keys(mv).length>Object.keys(cv).length||Object.keys(ma).length>Object.keys(ca).length;wrongNotes=mw;memoNotes=mm;viewData=mv;answerData=ma;console.log('[Firestore] 머지 후:',{w:mw.length,m:mm.length,v:Object.keys(mv).length,a:Object.keys(ma).length,uploadNeeded:upload});if(upload){localStorage.setItem(PREFIX+'_wrong',JSON.stringify(wrongNotes));localStorage.setItem(PREFIX+'_memos',JSON.stringify(memoNotes));localStorage.setItem(PREFIX+'_views',JSON.stringify(viewData));localStorage.setItem(PREFIX+'_answers',JSON.stringify(answerData));await saveToFirestore();showSync('synced','✅ 머지/업로드 완료');return;}}else{console.log('[Firestore] 클라우드 문서 없음, 로컬 데이터로 초기화');if(wrongNotes.length||memoNotes.length||Object.keys(viewData).length||Object.keys(answerData).length){await saveToFirestore();showSync('synced','✅ 기존 데이터 이전 완료');return;}}showSync('synced','✅ 동기화 완료');}catch(e){console.error('[Firestore] 로드 실패:',e);showSync('error','❌ 동기화 실패: '+(e&&e.message?e.message:e));}}
function syncToCloud(){localStorage.setItem(PREFIX+'_wrong',JSON.stringify(wrongNotes));localStorage.setItem(PREFIX+'_memos',JSON.stringify(memoNotes));localStorage.setItem(PREFIX+'_views',JSON.stringify(viewData));localStorage.setItem(PREFIX+'_answers',JSON.stringify(answerData));if(!firestoreReady||!currentUser)return;clearTimeout(syncDebounceTimer);syncDebounceTimer=setTimeout(()=>saveToFirestore(0),1500);}
async function saveToFirestore(retryCount){if(retryCount==null)retryCount=0;if(!currentUser)return;try{await db.collection('users').doc(currentUser.uid).set({wrongNotes,memoNotes,viewData,answerData,lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});console.log('[Firestore] 저장 성공',new Date().toLocaleTimeString(),'wrong:',wrongNotes.length);}catch(e){console.error('[Firestore] 저장 실패 (재시도 '+retryCount+'):',e);showSync('error','❌ 저장 실패'+(retryCount>0?' (재시도 '+retryCount+')':'')+': '+(e&&e.message?e.message:e));if(retryCount<3){setTimeout(()=>saveToFirestore(retryCount+1),2000*(retryCount+1));}}}

경과관찰","Denis brown brace","외회전 보조기","원위 경골 외회전 절골술","대퇴골 감염 절골술"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q020.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e020.jpg?v=1776535000"]},{"num":21,"question":"15세 환아가 대퇴골 연장술을 시행하였다. 근위 및 원위 골편에 각각 4개의 핀을 삽 입하여 외고정기를 장착하였으며 골간부에서 절골을 시행하였다. 수술 5일째에 슬 관절 관절운동 및 부분적 체중 부하를 시작하였으며 수술 7일째에 하루에 1mm, 4번 에 나눠서 신연을 시행하였다. 수술 6주째에 시행한 단순방사선 사진상 절골부의 골 형성 부족이 관찰되었다. 가장 의심되는 원인은?","choices":["근위, 원위부에 4개의 핀 삽입","하루에 1mm 신연","하루에 4번 신연","골간부에서 절골","수술 7일째 신연 시작"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q021.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e021.jpg?v=1776535000"]},{"num":22,"question":"10세 환아로 5개월 전 우측 근위 경골의 S-H type 2의 골절로 수술받았던 기왕력이 있다. 1년 뒤 방사선 추시에서 내반 변형 10도, 변연부 골극이 관절면의 25% 침범하 였을 때 해야 하는 치료는?","choices":["경과관찰","골교절제술","교정절골술","골교절제술+교정절골술","epiphysiodesis"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q022.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e022.jpg?v=1776535000"]},{"num":23,"question":"9세 환아가 과상부 완전 전위골절로 관혈적 정복술 및 핀고정술을 시행 받았다. 이 후 6주간 장상지 석고 고정을 시행하였다. 석고 고정을 제거한 뒤 관절구축 방지를 위해 수동적 관절운동을 시행하였다. 3개월 뒤 추시관찰에서 굴곡 35도, 신전 80도 로 구축이 남아있었으며 방사선 검사상 myositis ossifcans가 관찰되었다. Myositis ossificans와 연관이 있는 것은?","choices":["9세 환아","완전 전위 과상부골절","관혈적 정복","6주간 석고고정","수동적 관절운동"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q023.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e023.jpg?v=1776535000"]},{"num":24,"question":"2세 환아가 금일 넘어진 뒤 발생한 주관절 변형을 주소로 내원하였다. 내원하여 시 행한 방사선 검사상 탈구, 골절 소견은 관찰되지 않았다. Radiocapiteallar line 정렬 은 정상이였다. Ulnohumeral line은 후내측으로 전위된 소견을 보이고 있다. 이때 석고 고정으로만 치료하였을 경우 문제가 될 수 있는 것은?","choices":["내반주변형","외반주변형","성장판 조기 닫힘","불유합","관절운동장애"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q024.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e024.jpg?v=1776535000"]},{"num":25,"question":"8세 여아가 6개월 전 척골 골절로 보존적 치료를 시행하였다. 주관절의 통증과 굴곡 구축이 있었고, 방사선학적 검사상 요골의 전방 탈구와 척골의 부정유합이 확인되었 다. 치료를 위해 반드시 해야 할 것은?","choices":["관혈적 요골두 정복술","소두 요골두 핀고정","윤상인대 재건술","요골두 절제술","척골 교정 절골술"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q025.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e025.jpg?v=1776535000"]},{"num":26,"question":"8세 남아에게 발생한 비전위성 경골 근위 골간단 골절에 대해 단순 석고 고정을 시 행하였다. 이 경우 가장 흔히 발생할 수 있는 경골 변형의 맞는 조합은?","choices":["외반 및 단축","외반 및 과성장","외반 및 외회전","내반 및 단축","내반 및 과성장"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q026.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e026.jpg?v=1776535000"]},{"num":27,"question":"아동학대에 의해 발생할 가능성이 높은 골절은?","choices":["경골 근위 모서리 골절","쇄골 골절","척추체 골절","두개골 선상골절","상완골 원위 골단 골절"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 소아","question_images":["images/유니온_1권_q027.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e027.jpg?v=1776535000"]},{"num":28,"question":"경골 근위 간부 다음 중 성인 추간판의 영양공급을 담당하는 것은?","choices":["동맥혈관","모세혈관","림프관","세포외액 확산","정맥혈관"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 척추","question_images":["images/유니온_1권_q028.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e028.jpg?v=1776535000"]},{"num":29,"question":"75세의 척추 변형 환자가 있다. 수술 전 계획을 위해 cobb’s angle을 재려고 한다면 가장 먼저 측정해야 할 것은?","choices":["stable vertebra","end vertebra","apical vertebra","C7 plumb line","central sacral vertebral line"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 척추","question_images":["images/유니온_1권_q029.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e029.jpg?v=1776535000"]},{"num":3 ","골수강 내 금속정 삽입술","환형강선고정술","경과 관찰"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 고관절","question_images":["images/유니온_1권_q062.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e062.jpg?v=1776535000"]},{"num":63,"question":"전방십자인대 손상 시 가장 sensitive한 신체검진으로, 전방십자인대 재건술 결정에 가장 신뢰도 있는 검사는?","choices":["External rotation recurvatum test","Anterior drawer test","Pivot shift test","Anterolateral drawer test","Lachman test"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q063.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e063.jpg?v=1776535000"]},{"num":64,"question":"50세 환자가 1주일 전 버스에서 내리다 뚝 소리가 나면서 발생한 슬관절 통증을 주 소로 내원하였다. 슬관절 내측 관절면 통증 및 tenderness가 있었다. 방사선 검사상 하지 정렬은 정상이며, MRI상 내측 반월상 연골판의 posterior horn의 matrix에는 이상이 없으나, tibia plateau와의 접합부에서 cleft sign(fluid-filled defect)이 관찰 되었다. 내측 대퇴골 관절면과 경골 내측 관절면의 연골 상태는 ICRS grade 1 이었다. 내측 반월상 연골판에 대한 수술적 치료는?","choices":["Debridement","봉합술","연골판 전 절제술","연골판 부분 절제술","연골판이식술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q064.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e064.jpg?v=1776535000"]},{"num":65,"question":"무릎 관절 운동 범위 확인시 goniometer의 hinge를 고정해야 하는 위치는?","choices":["대퇴골 과상부","대퇴골 관절면","경골관절면","대퇴골 내측상과","대퇴골 외측상과"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q065.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e065.jpg?v=1776535000"]},{"num":66,"question":"다발성 인대 손상 환자가 내원하였다. 전방십자인대, 후방십자인대, 후외측 복합구 조물 손상을 모두 한 번에 수술할 때 재건하는 수술 순서는?","choices":["PCL -> ACL -> PLC","PCL -> PLC -> ACL","ACL -> PCL -> PLC","ACL -> PLC -> PCL","PLC -> PCL -> ACL"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q066.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e066.jpg?v=1776535000"]},{"num":67,"question":"40대 남자가 3일 전부터 발생한 슬관절 통증 및 부종 주소로 내원하였다. 최근 주 사 치료등 침습적인 치료를 받은 적은 없다. 관절천자 검사상 WBC 20,000, PMN 80%이며, 혈액 검사상 CRP 12.0, glucose 120이었다. 편광현미경 검사상 약한 이 중 양성 굴절성을 보였으며 장사방형의 결정이 관찰되었다. 가장 적절한 약제는?","choices":["요산 억제제","요산 배설제","항생제","NSAID","콜키친"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q067.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e067.jpg?v=1776535000"]},{"num":68,"question":"인공 슬관절 전치환술 시 굴곡 구축을 해결하기 위해서 후방 관절막 유리술을 시행 할 때 견인되어 손상될 수 있는 혈관을 고르시오.","choices":["superomedial genicular artery","popliteal artery","inferomedial genicular artery","inferolateral genicular artery","middle genicular artery"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q068.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e068.jpg?v=1776535000"]},{"num":69,"question":"류마티스 관절염을 앓고 있는 환자가 40도의 슬관절 굴곡성 강직이 있다. 인공슬관 절 전치환술을 시행하였다. 수술 후 슬관절 외측부에 감각 이상이 발견되었다. 다만 운동 기능에는 이상이 없었다. 이때 손상 받았을 것으로 예상되는 신경은?","choices":["tibial nerve","infrapatellar br. of saphenous nerve","lateral sural cutaneous nerve","common peroneal nerve","sciatic nerve"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q069.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e069.jpg?v=1776535000"]},{"num":70,"question":"슬관절 통증 및 잠김 증상을 호소하는 13세 남아가 내원하였다. 대퇴 내과 체중 부하 부위에 1.5cm2 가량의 골 결손이 관찰될 때 적절한 치료는?","choices":["다발성 천골술","소파술 + 골편 고정술","골편 제거술","골편 제거술 + 자가 골연골 이식술","골편 제거술 + 자가 연골세포 이식술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q070.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e070.jpg?v=1776535000"]},{"num":71,"question":"후방 십자인대 대치형의 인공슬관절 전치환술 후 1년이 경과한 환자가 수술 한 무릎 에서 clunk 및 crepitus를 호소하였다. 이와 동시에 전방 슬관절의 통증을 호소하였 다. 이에 대한 원인은?","choices":["대퇴 치환물의 길이","대퇴치환물 길이와 intercondylar 박스의 비","슬개골 치환물 좌우의 길이","슬개골 치환물 두께","슬개골 치환물 좌우 길이와 두께의 비"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q071.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e071.jpg?v=1776535000"]},{"num":72,"question":"인공슬관절 전치환술에서 원위 대퇴골을 절골하였다. 이후 sizer로 anterior referencing을 하여 측정한 대퇴골 삽입물의 크기가 2와 3번 사이였다. 3번을 선택 하였을 때 발생할 수 있는 문제점을 해결하는 방법은?","choices":["대퇴골 원위부 추가 절제","경골 후면 경사 추가 절제","더 작은 PE 사용","경골 근위부 추가 절제","후방 유리술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q072.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e072.jpg?v=1776535000"]},{"num":73,"question":"슬관절이 10도 과신전이 되며 동시에 후방 불안정성을 보이는 환자가 내원하였다. 단순 방사선 검사상 퇴행성 슬관절염 소견이 관찰되었고, K-L grade 4였다. 인공슬 관절 전치환술 시, 슬관절 과신전에 대한 적절한 처치는?","choices":["경골 후방경사 증가","내측 측부 인대 유리술","varus-valgus constrained type stem의 시용","후방 대퇴골 절제 및 두꺼운 Pe의 사용","원위 대퇴골 절제 줄이기"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q073.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e073.jpg?v=1776535000"]},{"num":74,"question":"15년 전 후방십자인대 보존형 슬관절 전치환술을 시행 받은 80대 환자가 내원하였 다. 방사선 검사에서 삽입물 주위의 골용해 및 해리 소견은 없었다. 하지만 신체검진 상 내외반 불안정성 및 보행 시 슬관절 과신전 양상을 보여 인공관절 재치환술을 시 행하려 한다. 이때 사용할 수 있는 component type은?","choices":["Varus-valgus constrained type","Anterior stabilized prosthesis","Posterior stabilized prosthesis","전후방 십자인대 대치형 치환물","Hinge prosthesis"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q074.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e074.jpg?v=1776535000"]},{"num":75,"question":"과차 47세 여자가 무릎 외측 통증을 호소하며 내원하였다. 방사선 검사에서 하지 정렬은 tibiofemoral angle은 외반 14도, mechanical LDFA 기도, MPTA 83도였다. 슬관절 전후방 불안정성은 없었으며 MRI상 외측 반월상연골판 복합 파열과 대퇴골 외측과 의 체중 부하 부위에 1cm x 1cm의 연골 손상 소견이 보였다. 이에 대한 치료는?","choices":["HTO","UKA","TKA","자가 연골세포 이식술","DFO"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q075.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e075.jpg?v=1776535000"]},{"num":76,"question":"21세 남자 환자가 반복되는 좌측 슬관절 통증과 부종으로 내원하였다. Q-angle은 25도, TT-TG은 23mm, Insall-salvati ratio는 1.2로 관측되었다. 하지 정렬은 정상이 였으며, 슬개골 외측 관절연골에 전층 결손 chondromalacia 소견이 있었다. 이 환자 에게 적절한 수술적 치료를 고르시오","choices":["경골결절 내측이전술","경골결절 전내측이전술","내측슬개대퇴인대 재건술","내측슬개대퇴인대 경첩술","외측지대 이완술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q076.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e076.jpg?v=1776535000"]},{"num":77,"question":"12세 남자 환아가 슬관절의 locking과 giving way 증상으로 내원하였다. MRI 검사 상 외측 완전형 원판형 연골판과, 외측 원판형 연골판 후각부에 15mm의 종파열이 연골판-관절낭 접합부에 있었다. 가장 적절한 치료는?","choices":["연골판 후각부 봉합술","연골판 부분 절제술 및 후각부 봉합술","아전절제술 및 연골판이식","전절제술 및 연골판이식","전절제술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q077.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e077.jpg?v=1776535000"]},{"num":78,"question":"전방십자인대 재건술 후 3개월 된 환자가 슬관절 통증 및 관절운동 제한이 발생하여 내원하였다. 이학적 검사상 전방 불안정성은 보이지 않았고 굴곡 제한은 20도, 후속 굴곡은 120도로 확인되었다. 이 환자의 원인으로 가능성 높은 것은?","choices":["경골 터널 전방","경골 터널 후방","과도한 과간절흔 성형","대퇴 터널 전방","대퇴 터널 후방"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q078.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e078.jpg?v=1776535000"]},{"num":79,"question":"쳐 - 절 19세 축구선수로 후방십자인대 재건술을 1년 전 시행 받았으나 슬관절 통증 이 지속되어 내원하였다. Posterior drawer test에서 심한 후방 전위를 보였고, posterolateral drawer test에서도 양성을 보였다. MRI에서 후방십자인대의 연속성 은 유지되고 있으나 외측 측부인대가 얇아져 있다. 이에 적절한 수술적 치료는?","choices":["후방십자인대 재건술","근위경골절골술","전방십자인대 재건술","후방십자인대 재건술 + 후외측 구조물 재건술","후방십자인대 재건술 + 내측 측부인대 재건술"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q079.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e079.jpg?v=1776535000"]},{"num":80,"question":"22세 남자 환자가 오토바이 운전 중 수상하여 우측 슬관절 탈구 발생 후 정복되어 응 급실로 내원하였다. 응급실에서 시행한 검사상 우측 슬관절 및 하지에 부종이 있었 고 골절 및 탈구의 소견은 없었다. 하지 도플러 검사에서 우측 하지의 맥박이 있음을 확인하였고 ABI는 0.9였으며, 하지 구획압력은 15mmHg였다. 이후 시행해야 할 처 치로 옳은 것은?","choices":["부목고정 후 외래추시","혈관조영술","근막절개술","혈관 수술","입원 후 주기적 관찰"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"1교시 슬관절","question_images":["images/유니온_1권_q080.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e080.jpg?v=1776535000"]},{"num":1,"question":"이 정상 보행에서 중간 입각기때 족부굴곡을 조절하고 체중을 무릎 전방으로 이동시키 게 된다. 이때 주로 작용하는 근육 및 작용은?","choices":["전경골근 동심선 수축","전경골근 편심성수축","전경골근 하퇴삼두근 동시 수축","하퇴삼두근 동심성 수축","하퇴삼두근 편심성 수축"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q081.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e081.jpg?v=1776535000"]},{"num":2,"question":"인공관절 수술 시 골 시멘트를 이용하여 인공관절을 견고히 고정한다. 골시멘트가 생체 내에서 고정되는 기전은?","choices":["골유도(osteoinduction)","기계적 맞물림(interdigitation)","신생혈관 형성(neovascularization)","생체 결합(biointegration)","화학적 결합(chemical integration)"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q082.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e082.jpg?v=1776535000"]},{"num":3,"question":"마취시 감각신경에 주로 작용하고 운동신경 차단은 적으며 작용시간은 2-4 시간으 로 긴 편이나 정맥 주입시 심독성을 일으켜서 주의를 요하는 약은?","choices":["로피바케인","부피바케인","레보부피바케인","리도케인","메피바케인"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q083.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e083.jpg?v=1776535000"]},{"num":4,"question":"고관절의 인공관절 치환술 후 발생하는 대표적인 마모의 조합으로 옳은 것은?","choices":["부식-연마","부식-점착","연마-점착","연마-피로","점착-피로"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q084.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e084.jpg?v=1776535000"]},{"num":5,"question":"정형외과 수술에 예방적으로 쓰는 항생제는 A 세대 세팔로스포린이며, 수술 B 시간 전 투여해야 한다. A와 B의 알맞은 조합은?","choices":["1-1","1-2","2-1","-1","3-2"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q085.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e085.jpg?v=1776535000"]},{"num":6,"question":"주관절 굴곡구축이 있는 환자를 30초-1분간 지속적으로 신연시 서서히 관절 운동범 위가 늘어났다. 이 기전을 설명하는 용어는?","choices":["네킹","응력이완","포복","인성","취성"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q086.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e086.jpg?v=1776535000"]},{"num":7,"question":"원위 대퇴골 골절로 관혈적 정복 및 금속판 고정술을 시행한 환자에서 온열 치료를 시행하고자 한다. 이때 적절한 심부열 치료 방법은?","choices":["극초단파치료","단파투열치료","온습포（핫팩）","적외선 온열 램프","초음파 치료"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q087.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e087.jpg?v=1776535000"]},{"num":8,"question":"교통사고로 인한 다발성 골절로 치료를 받은 50세 환자가 내원하였다. 골절부가 모 두 유합되고 증상이 고정된 후에 맥브라이드 법으로 평가한 장애율이 우측 고관절 20%, 좌측 슬관절 10%였다. 이 환자의 복합 장애를 모두 합산하면 몇 %로 평가할 수 있겠는가?","choices":["22%","24%","26%","28%","30%"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q088.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e088.jpg?v=1776535000"]},{"num":9,"question":"개방성 골절로 입원한 환자에게 항생제 피부검사를 시행하여 적절한 예방적 항생제 를 투여하였으나, 약물 알레르기 과거력을 확인하지 않고 tramadol을 통증 조절을 위해 투여한 다음 과민성 쇼크(anaphylactic shock)가 발생하였다. 법적 분쟁이 발 생하였다면 의료진은 어떠한 의무를 다하지 못한 것에 대한 책임을 져야 하는가?","choices":["기록 의무","동의 의무","설명 의무","주의 의무","지도 의무"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 총론","question_images":["images/유니온_1권_q089.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e089.jpg?v=1776535000"]},{"num":10,"question":"외벌시 악성 골종양의 병기(stage)를 구분한 AJCC 분류법에서 사용되는 병기 II와 III를 구 분하기 위해 반드시 시행해야 하는 검사는?","choices":["혈액 검사","골 주사 검사","흉부 전산화 단층 촬영","생검","복부 전산화 단층 촬영"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q090.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e090.jpg?v=1776535000"]},{"num":11,"question":"대퇴골 전자하부에 발생한 전이성 골조양에 대해 철저한 소파술(extended curettage) 후 예방적 골수강내 금속적 삽입술을 시행하였다. 이에 해당하는 절제연 은?","choices":["Intralesional","Marginal","Wide","Contaminated wide","Radical"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q091.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e091.jpg?v=1776535000"]},{"num":12,"question":"46세 여자 환자가 3개월 전부터 대퇴부 통증이 발생하여 내원하였다. 방사선 검사 상 좌측 대퇴 원위부에 병변이 보였다. 병변 주위로는 감소된 음영이, 병변 내에는 불 규칙한 석회화가 관찰되었으며, 병변은 피질골 외측으로 자라는 양상을 보였다. 양 측 원위 경골 및 근위 경골에 다발성 병변이 관절면으로부터 멀어지는 양상으로 있 었다. 진단은?","choices":["골육종","다발성 골수종","섬유육종","연골육종","유잉육종"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q092.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e092.jpg?v=1776535000"]},{"num":13,"question":"분야: 종양 12세 환아가 3개월 전부터 발생하여 점점 심해지는 대퇴부 통증으로 내원하였다. 방 사선 검사상 대퇴골 간부에 moth-eaten 골용해 소견과 동시에 골형성 소견이 관찰 되었다. 또 onion-skin 골막반응이 관찰되었다. 조직검사상 작은 원형의 세포들이 비교적 일정한 모양으로 밀집되어있는 소견이 관찰되었을 때 진단은?","choices":["골육종","다발성골수종","악성 골 림프종","연골육종","유잉육종"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q093.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e093.jpg?v=1776535000"]},{"num":14,"question":"41세 남자 환자로, 경미한 외상 후 촬영한 단순 방사선 검사에서 상완골 근위부에 경 계가 명확한 점상 석회화 병변이 발견되었다. 자기 공명 검사에서 병변의 장축 지름 은 3cm으로, 골수강내에 국한되어 있었고, 피질골 침범은 없었다. 적절한 치료는?","choices":["추시 관찰","고주파 용해술","방사선 치료","소파술","범위 절제술"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q094.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e094.jpg?v=1776535000"]},{"num":15,"question":"13세 환아가 넘어지면서 발생한 우측 경골 간부의 통증으로 내원하였다. 단순 방사 선 검사 상에서 피질골 내의 경화성 골에 의해 구분되는 다발성 낭포 모양의 용해성 병소가 1 x 2cm 크기로 경골 간부에 발생하였고, 골막반응은 없었다. 1년 추시 후 크 기가 1.2 x 2.2cm 크기로 되었다. 다음 처치는?","choices":["추시 관찰","MRI","생검","소파술","광범위 절제술"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q095.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e095.jpg?v=1776535000"]},{"num":16,"question":"50세 남자가 대퇴부 종괴를 주소로 내원하였다. MRI에서 근육 내부에 11cm 크기의 종괴가 확인되었다. 조직검사 상, grade 3의 육종이 확인되었다. 위 연부조직 종양의 AJCC grade는?","choices":["1B","2A","2B","3","4"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q096.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e096.jpg?v=1776535000"]},{"num":17,"question":"양성 종양이지만 매우 침습적이며, 변연절제술 시 재발이 많아 광범위 절제술이 권 고되는 양성 종양은?","choices":["색소융모결절활액막염(pigmented villonodular synovitis)","섬유종증(fibromatosis)","신경초종(neurilemmoma)","점액종(myxoma)","평활근종(leiomyoma)"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q097.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e097.jpg?v=1776535000"]},{"num":18,"question":"62세 환자가 2개월부터 시작된 좌측 발목 통증으로 내원하였다. 방사선 사진 상 거 골에 골 용해성 병변이 확인되었다. 악성 전이성 종양이라면 가장 가능성이 높은 원 발암은?","choices":["갑상선암","위암","간암","폐암","전립선암"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q098.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e098.jpg?v=1776535000"]},{"num":19,"question":"40세 여자 환자가 신장암으로 4년 전부터 치료받고 있었다. 대퇴골 경부부터 소전 자하부까지 신장암 골전이가 있다. 이에 대한 치료는?","choices":["소파술","소파술후 골이식","소파술후 시멘트","내고정","절제술 후 종양대치술"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 종양","question_images":["images/유니온_1권_q099.jpg?v=1776535000"],"explanation_i "explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q119.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e119.jpg?v=1776535000"]},{"num":40,"question":"65세 환자가 수근관 증후군을 앓고 있으며 환측 무지구근의 심한 위축이 발생하였 다. 또한 신체검진 상 대립기능의 약화가 관찰되었다. 무지 대립기능의 회복을 위하 여 건 이전술을 고려할 때 가장 적절한 공여건은?","choices":["Extensor carpi radialis brevis","Abductor digiti minimi","Flexor digitorum profundus","Flexor carpi radialis","Palmaris longus"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q120.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e120.jpg?v=1776535000"]},{"num":41,"question":"62세 환자가 3년 전부터 무지 수근중수관절의 통증이 있었다. 신체검사에서 무지 중 수골에 축성 압력을 가하면서 무지를 회전 시켰을 때 심한 통증이 발생하였다. 방사 선 검사에서 대능형중수관절의 관절 간격 감소, 골 경화, 연골하 골낭종, 4mm 크기 의 골극이 있었으며 주상대능형골간 관절에도 진행된 관절염이 있었다. 가장 적절한 치료는?","choices":["대능형골부분절제술 + 개재관절성형술","대능형 골완전절제술 + 개재관절성형 술","수근중수관절 고정술","수근중수관절 관절경적 변연절제술","수근중수관절 인대 재건술"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q121.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e121.jpg?v=1776535000"]},{"num":42,"question":"35세 환자가 8개월 전 넘어진 뒤 발생한 손목관절의 통증으로 내원하였다. 전후방 방사선 사진에서 주상월상골 간격이 5mm였고, 측면 방사선 사진에서 주상월상골 각이 80도 였으며 수근관절의 관절염은 없었다. 수술 소견 상 주상월상골간인대는 완전히 파열되었고 봉합은 불가능해 보였으나, 주상골의 정복은 가능한 상태였다. 가장 적절한 치료는?","choices":["경피적 핀 고정술","근위 수근골 절제술","수근관절 유합술","주상월상골간 인대 재건술","후방 관절낭 봉합술"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q122.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e122.jpg?v=1776535000"]},{"num":43,"question":"32세 환자가 2년 전 류마티스 관절염으로 진단 후 약물치료 시행 중이다. 6개월 전 부터 손목의 통증 및 종창을 호소하며 방사선상 손목관절의 간격은 유지되고 있다. 적절한 치료는?","choices":["Proximal row carpectomy","4-corner fusion","Wrist arthrodesis","Wrist arthroplasty","Synovectomy"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q123.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e123.jpg?v=1776535000"]},{"num":44,"question":"50세 환자가 2년전 부터 발생한 lateral epicondylitis에 대하여 수술적 치료를 계획 중이다. 관절경적 수술보다 관혈적 수술에 적합한 것은?","choices":["우세수","1년 이상의 이환기간","극심한 통증","활동적인 환자","후외측 불안정성 동반"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q124.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e124.jpg?v=1776535000"]},{"num":45,"question":"27세 환자가 액와 부위의 열상으로 척골신경의 손상을 입었다. 열상부위에서 척골신 경에 대한 봉합을 시행하였다. 이에 추가적으로 기능 회복을 위해 신경 이전을 할 때 적절한 공여부위는?","choices":["근피신경","액와신경","Anterior interosseous nerve","Posterior interosseous nerve","흉배신경"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q125.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e125.jpg?v=1776535000"]},{"num":46,"question":"키엔벡 환자에서 치료 방침을 정할 때, 월상골 보존 수술과 구제 수술을 결정하는 가 장 중요한 인자는?","choices":["월상골 경화","월상골 골절","월상골 높이","월상골 혈액순환","주상골의 고정된 회전"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q126.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e126.jpg?v=1776535000"]},{"num":47,"question":"30세 컴퓨터 프로그램 개발자가 외상력 없이 2년 전부터 손목의 척측부위 통증을 호소했다. 신체검진 상 손목을 신전, 척측 변위, 회내전 시 통증이 발생하였고, 수근 관절 불안정성은 없었다. 방사선 소견상 관절면은 잘 보존되어있었고, 3mm의 척골 양성 변위가 확인되었다. 1년간의 보존적 치료에도 통증 호전 없었다. 이에 가장 적 절한 치료 방법은?","choices":["요골 경상돌기 제거","DRUJ 제거술","척골 단축술","Sauve-kapandji procedure","수근관절 유합술"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q127.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e127.jpg?v=1776535000"]},{"num":48,"question":"35세 남성이 5년 전 넘어지면서 발생한 손목 통증을 주소로 내원하였다. 손목 요측 에 통증이 있으며, 수근관절에 중등도의 운동 제한이 있었다. 방사선 검사상 주상골 요부의 불유합 및 굴곡 변형이 동반되었으며 관절염은 없었다. 주상-월상각은 70도 로 확인되었다. 이에 대한 치료로 적절한 것을 고르시오","choices":["경피적 내고정","근위 수근골 절제술","전방골이식+내고정","4-코너 유합술","혈관부착 골이식"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q128.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e128.jpg?v=1776535000"]},{"num":49,"question":"원위지골의 배부에 5mm 크기의 종괴를 주소로 내원하였다. 종괴를 터트리니 볏짚 같은 진물이 나왔다. 그동안 수 차례 반복적인 종괴의 호전과 재발을 보인 경우 가장 적절한 치료는?","choices":["항생제","물리치료","석고붕대 고정","종괴제거 및 골극제거","절단"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q129.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e129.jpg?v=1776535000"]},{"num":50,"question":"65세 환자가 제 5 중수지관절과 근위지 관절의 구축을 주소로 내원하였다. 중수지관 절의 굴곡 구축은 40도이고 근위지 관절은 30도이다. 현재 일상생활을 하기에 불편 감이 매우 심하였다. 적절한 치료는?","choices":["스테로이드 주사","건막절개술","건막절제술","보존적 치료","건이식술"],"answer":3,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 수부","question_images":["images/유니온_1권_q130.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e130.jpg?v=1776535000"]},{"num":51,"question":"교시견주관절 젊은 남자가 경부 후방 삼각에서 조직검사를 시행하였다. 조직검사 이후 동측 견관 절의 전방 굴곡 및 외회전이 되지 않아 내원하였다. 내원하여 시행한 신체검사 상 견 갑골이 후방 돌출 되었으며, 외측 하방 전위를 보였다. 관련 있는 구조물은?","choices":["Trapezius","Serratus anterior","Rhomboid","Levator scapulae","Latissimus dorsi"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 견주관절","question_images":["images/유니온_1권_q131.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e131.jpg?v=1776535000"]},{"num":52,"question":"주관절 외상성 탈구를 도수 정복 이후 보존적 치료 하였다. 이후 주관절 굴곡 구축이 50도, 후속 굴곡이 135도로 관찰되었다. 방사선 사진 상, 이소성 골화는 보이지 않았 다. 주관절 구축의 원인은?","choices":["내측측부인대의 전방 밴드","내측측부인대의 사선 밴드","내측측부인대의 후방 밴드","주두 골극","전방 관절낭"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 견주관절","question_images":["images/유니온_1권_q132.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e132.jpg?v=1776535000"]},{"num":53,"question":"쇄골 간부의 분쇄 골절에 대해 관혈적 정복술 및 금속판 고정을 시행하였다. 이후 견 관절 외전 장애와 주관절 신전 장애, 수근관절 신전 장애 와 중수지관절의 신전 on_images":["images/유니온_1권_e160.jpg?v=1776535000"]},{"num":71,"question":"젊은 남자가 스키를 타다가 발목을 접질렀다. 계단을 오르내릴 때 불편감을 느끼고, 족근관절 족배굴곡시 후외측에서 클릭이 느껴졌고 해당 부위 압통이 있었다. 현재 환자 상태를 유발한 해부학적 구조는?","choices":["Superior peroneal retinaculum","Inferior peroneal retinaculum","Calcaneofibular ligament","Superior extensor retinaculum","Inferior extensor retinaculum"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q150.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e150.jpg?v=1776535000"]},{"num":72,"question":"45세 여자가 족부 제 1족지 건막류 부위 통증과 외반 변형이 있었다. 무지외반각도 (HVA)는 50도, 중족지간각도(IMA)는 20도였다. 신체검진 상 1st ray instability?)- 존재하였다. 이 환자를 수술할 때, 원위 연부조직 유리술과 함께 시행할 술기는?","choices":["1st중족_족지골 유합술","1st 중곡골 원위 절골술","1st 중족골 간부 절골술","1st 중곡골 근위 절골술","1st 족근-중족골 유합술"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q151.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e151.jpg?v=1776535000"]},{"num":73,"question":"23세 군인이 훈련할 때 뒤꿈치 통증이 심해졌다. 외상의 병력은 없었고 신체검사 상 종골 양측을 압박할 때 통증이 유발되었다. 처음 치료로 적절한 것은?","choices":["활동경감","스트레칭 운동","비스테로이드성 소염제","석고고정","종골 골극 절제"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q152.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e152.jpg?v=1776535000"]},{"num":74,"question":"50세 여자가 4주전부터 뒤꿈치 통증이 발생하였다. 아침에 일어나서 첫 발을 디딜 때 통증이 심하였으며, 조금 지나면 괜찮다가 많이 걸으면 다시 아파하였다. 치료로 가장 적절한 것은?","choices":["스트레칭 운동","스테로이드 국소주사","4주간 석고 고정","체외충격파","족저근막 부분절제 및 종골 골극 절제술"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q153.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e153.jpg?v=1776535000"]},{"num":75,"question":"60세 여자 환자가 족관절 내과 전하측 통증으로 내원하였다. 신체검사 상 후경골근 주행 방향을 따라 압통이 있었으며, 일측 발뒤꿈치 올림(single heel rise)을 하지 못 하였고 기립 시 내측 세로궁 소실이 있었다. 관절 강직은 없었고 방사선 검사에서 관 절염은 없었다. 거골두의 15%가 덮여있지 않았다. 3개월간 비스테로이드성 소염제, 물리치료, 교정 깔창 등 시행하였으나 호전은 없었다. 다음 단계 치료로 적절한 것 은?","choices":["스테로이드 국소 주사","후경골근 활액막 제거술","거골하관절 제동","종골 내측 전위 절골술","삼중 관절 고정술"],"answer":4,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q154.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e154.jpg?v=1776535000"]},{"num":76,"question":"당뇨병이 있는 55세 환자로 첨족이 있으며 족저부에 골과 건이 노출되어있다. 건을 따라 농이 나오는 상태이다. 족배 동맥 혈류는 촉지 되었으나 혈관조영술상 중등도 동맥 협착을 보이고 있다. 가장 먼저 해야 할 치료는?","choices":["변연절제술","아킬레스 건 연장술","전접촉 석고고정","중족골 절단술","혈관성형술"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q155.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e155.jpg?v=1776535000"]},{"num":77,"question":"70세 남자가 10년 전 좌측 족관절 유합술 시행하였다. 6개월 전부터 우측 발목 통증 으로 보행 힘들어 내원하였다. 단순 방사선상 K-L grade IV의 관절염 소견과 내반 변 형이 10도 있었다. 신체검진 상 불안정성은 없다. 상기 환자의 치료로 적절한 것은?","choices":["과상부 교정절골술","과상부 교정절골술 및 관절경적 변연절제술","관절경적 변연절제술","과상부 교정절골술 및 인공관절 치환술","족관절 인공관절 전치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q156.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e156.jpg?v=1776535000"]},{"num":78,"question":"20세 남자 환자가 울퉁불퉁한 길을 걷기 힘들어한다. 족저부 내측 통증을 호소하였 고 내과 하방에 단단한 융기가 촉지되었다. 진단명은?","choices":["거골 골연골 병변","거종결합","족근관 증후군","요 내반족","후 경골건 부전증"],"answer":2,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q157.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e157.jpg?v=1776535000"]},{"num":79,"question":"70세 남자 환자가 당뇨족으로 중족골 절단을 고려하고 있다. 중족골 절단 시 보존 해 야하는 건으로 알맞은 것은?","choices":["단비골건/전경골건","단비골건/후경골건","삼비골건/전경골건","삼비골건/후경골건","장비골건/후경골건"],"answer":1,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q158.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e158.jpg?v=1776535000"]},{"num":80,"question":"45세 남자가 발목에 간헐적인 통증이 있었다. 통증은 활동 시 심해지다 저절로 호전 되는 양상을 반복하였다. 신체검사에서 발목 전내측에 압통이 있었다. 방사선 검사 에서 거골 내측의 음영 감소가 관찰되었다. 이 질환의 가장 흔한 원인은?","choices":["감염성 질환","내분비 질환","무혈성 괴사","염증성 질환","외상"],"answer":5,"explanation":"","reference":"","section":"유니온 1권","chapter":"2교시 족부","question_images":["images/유니온_1권_q159.jpg?v=1776535000"],"explanation_images":["images/유니온_1권_e159.jpg?v=1776535000"]},{"num":1,"question":"다음 A와 같은 소견이 보여 B와 같은 수술을 하였다. 수술 중 그림 C와 같은 작업을 시행하였다. 그림 C 수술 과정에 대한 설명으로 적절한 것은?","choices":["주상골 신전 변형 교정","월상골 신전 변형 교정","주상골 굴곡 변형 교정","월상골 굴곡 변형 교정","삼각골 신전 변형 교정"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q001.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e001.jpg?v=1776535000"]},{"num":2,"question":"불안정성 주두 골절로 금속판 고정술을 받고 사진과 같은 손의 마비가 발생하였다. 손상 받은 신경은?","choices":["요골신경","전골간신경","정중신경","척골신경","후골간신경"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q002.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e002.jpg?v=1776535000"]},{"num":3,"question":"50세 여자 환자 3개월 전 원위 요골 골절에 대해 수술적 치료를 시행 받은 후 석고고 정을 하였다. 석고를 제거한 후부터 수부의 부종을 동반한 통증과 저린감이 발생하 였다. 수근관절의 full ROM이 가능하지 않았다. 근전도 검사상 이상 소견은 관찰되 지 않았다. 다음 중 적절한 진단은?","choices":["신전건 부전","굴곡건 부전","수근관 증후군","CRPS Type I","CRPS Type II"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q003.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e003.jpg?v=1776535000"]},{"num":4,"question":"50세 남자가 악화되는 손목의 척측 통증으로 내원하였다. 신체검사는 동영상과 같 으며 방사선 검사는 아래 사진과 같았다. 이 환자의 적절한 진단은? 동영상에서, 수근관절을 척측 변위하고 회외전하면 tendon의 poppingO| 관찰된다. (https://youtu.be/PNcKBIm96us)","choices":["Flexor carpi radialis instability","Scapholunate dissociation","Extensor carpi ulnaris instability","Distal radio니nar joint instability","Ulnar impaction syndrome"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q004.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e004.jpg?v=1776535000"]},{"num":5,"question":"손목의 요측 부위 통증이 몇 개월 전 시작하여 최근 악화되었다. 환자의 방사선 사진 과 MRI 사진이다. 적절한 진단은?","choices":["Scaphoid nonunion","Ganglion cyst","Scapholunate dissociation","Scaphotrapeziotrapezoidal arthritis","Wrist infection"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q005.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e005.jpg?v=1776535000"]},{"num":6,"question":"20세 남자 환자가 손목 통증을 호소하여 촬영한 방사선 사진 소견이다. Percutaneous screw fixation을 어느 방향으로 하는가?","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q006.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e006.jpg?v=1776535000"]},{"num":7,"section":"유니온 2권","question":"축전성 다지증(preaxial polydactyly) 중 가장 흔한 유형은?","choices":["Wassel type 1","Wassel type 2","Wassel type 3","Wassel type 4","Wassel type 5"],"answer":4,"explanation":"","reference":"정형외과학 8th. 1권. P.241 / Gonzalez et al. JCO. 2013","question_images":["images/유니온_2권_q092.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e092.jpg?v=1776535000"],"chapter":"수부"},{"num":8,"question":"4개월 전 우측 전완부의 골절로 수술 후 심한 통증이 있었으나 경과관찰 하였다. 이 후 발생한 변형으로 내원한 환자로 손목은 굴곡, 무지는 내전, 제 2,3,4,5 수지의 중 수지 관절은 신전, 지간 관절은 굴곡 상태로 구축되었다. 중수지 관절은 신전은 가능 하나 후속 굴곡은 30도까지만 가능하였다. 정중신경과 척골신경이 분포하는 영역에 서 감각의 30% 손실이 있었다. 이 환자에게 가장 적절한 치료는?","choices":["Dynamic splinting & stretching","Tendon lengthening","Muscle sliding","Tendon transfer","Muscle transfer using the gracilis muscle"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q007.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e007.jpg?v=1776535000"]},{"num":9,"question":"tendon repair suture에서 core suture는 몇 strand인7b?","choices":["2","3","4","6","12"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q008.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e008.jpg?v=1776535000"]},{"num":10,"question":"상완골 골절 이후 high radial nerve palsy가 발생하였다. 이후 신경이전술을 시행하 였지만 엄지를 제외한 제 2-5 수지의 신전 기능은 회복되었으나, 엄지의 신전은 회 복되지 않았다. 건이전술을 고려할 때 자주 사용되는 donor tendon은?","choices":["Palmaris longus","Flexor carpi radialis","Extensor carpi radialis longus","Extensor carpi radialis brevis","Flexor indicis proprius"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q009.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e009.jpg?v=1776535000"]},{"num":11,"question":"30세 남자 환자가 넘어진 후 발생한 후 엄지 통증을 주소로 내원하였다. 방사선 사 진상 아래와 같았다. 이에 대한 수술을 할 때 중수골의 간부를 정복하기 위한 방향 은?","choices":["내전 굴곡 회내전","내전 신전 회내전","외전 굴곡 회외전","외전 신전 회내전","외전 신전 회외전"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q010.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e010.jpg?v=1776535000"]},{"num":12,"question":"65세 류마티스 관절염 환자로 수개월 전부터 사진 A와 같은 임상 증상을 보였고 수 부 감각의 이상 소견은 발견되지 않았다. 촬영한 단순 방사선 사진은 아래와 같다. 가 장 적절한 치료는?","choices":["건이전술","건봉합술","건이전술 + 척골 단축술","신경탐색술","건이전술 + 원위 척골 절제술"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"수부","question_images":["images/유니온_2권_q011.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e011.jpg?v=1776535000"]},{"num":13,"section":"유니온 2권","question":"50세 남자가 팔을 뻗으며 넘어진 이후 좌측 어깨 주위 통증이 있다. 동영상과 같은 신체검사 소견이 관찰되었다 (팔꿈치를 구부려서 뒤쪽으로 내회전시킨 후 검사자는 대상자의 등 뒤에서 손바닥에 저항을 가함 = lift-off test). 방사선 사진에서는 특별한 이상 소견은 없었으며, 연부조직의 이상을 평가하기 위해 초음파 검사를 계획하였다. 환자의 병변을 관찰하기 가장 좋은 검사 자세와 초음파 변환기의 위치는?","choices":["Supraspinatus long axis view","Supraspinatus short axis view","Infraspinatus long axis view","Biceps long head short axis view","Subscapularis long axis view"],"answer":5,"explanation":"","reference":"자세에 따른 견관절부 초음파 진단 비교. JKOA. 2017. P.336-343","question_images":["images/유니온_2권_q093.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e093.jpg?v=1776535000"],"chapter":"견관절"},{"num":14,"question":"반복적인 어깨 탈구 환자의 견관절 MR arthrogram이다. 화살표가 표시하는 구조를 관절경 영상에서 고르시오.","choices":["1","2","3","4","5"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"견관절","question_images":["images/유니온_2권_q012.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e012.jpg?v=1776535000"]},{"num":15,"question":"극심한 견관절 통증을 주소로 응급실로 내원한 환자로, 단순 방사선 사진 (A, B) 및 견갑하건의 short axis view이다. 다음 질환의 병기는?","choices":["Pre-calcific stage","Formative phase","Resting phase","Resorptive phase","Post-calcific stage"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"견관절","question_images":["images/유니온_2권_q013.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e013.jpg?v=1776535000"]},{"num":16,"question":"아래 사진은 좌측 견관절의 삼각흉근 도달법의 동영상이다. 화살표가 가리키는 해부 학적 구조물은?","choices":["Biceps brachii long head","Brachialis muscle","Conjoined tendon","Pectoralis major muscle","Subscapularis muscle"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"견관절","question_images":["images/유니온_2권_q014.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e014.jpg?v=1776535000"]},{"num":17,"question":"1개월 전 두부 손상으로 의식이 없던 25세 남자가 의식이 회복된 후 발생한 주관절 주위 통증 및 운동 범위 제한을 주소로 내원하였다. 아래 방사선 사진과 핵의학 검사 결과이다. 가장 적절한 치료는?","choices":["방사선 추시 관찰","관절 수동술","관혈적 절제술","관혈적 관절막 봉합술","관절경적 관절막 절제술"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"견관절","question_images":["images/유니온_2권_q015.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e015.jpg?v=1776535000"]},{"num":18,"section":"유니온 2권","question":"70세 환자가 우측 견관절 통증을 주소로 내원하였다. 신체검진 상 Hornblower sign 양성이었다. 환자의 MRI로 적절한 것은?","choices":["Supraspinatus muscle insertion site tear and retraction","Massive rotator cuff tear (supraspinatus ~ infraspinatus)","Teres minor tear and posterior capsule tear at the humerus","Subscapularis tendon tear","AVN induced osteoarthritis"],"answer":3,"explanation":"","reference":"정형외과학 8th. 1권. P.824 / Radsource. 2018","question_images":["images/유니온_2권_q094.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e094.jpg?v=1776535000"],"chapter":"견관절"},{"num":19,"question":"심한 회전근개 관절병증을 앓고 있는 환자에서 견관절 역 전치환술（reverse total shoulder replacement arthroplasty）을 하고자 한다. 그림 （가） 에 비해서 그림 （나） 삽입물의 장점은 무엇인가?","choices":["내회전 범위 증가","외회전 범위 증가","Scapular notching의 증가","Acromial stress fracture의 감소","외전 범위의 증가"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"견관절","question_images":["images/유니온_2권_q016.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e016.jpg?v=1776535000"]},{"num":20,"question":"10세 소아 환자의 방사선 사진이다. 이 환자가 취하는 자세로 적절한 것은?","choices":["고관절 굴곡 + 슬관절 굴곡","고관절 과신전 + 슬관절 굴곡","고관절 굴곡 + 슬관절 과신전","고관절 과신전 + 슬관절 과신전","고관절 굴곡 + 슬관절 정상 정렬"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q017.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e017.jpg?v=1776535000"]},{"num":21,"question":"41세 남자가 4시간 전 추락사고로 응급실에 내원하였다. 진찰 소견상 양 하지의 불 완전한 운동신경의 마비를 보였으며 항문반사와 구해면체 반사는 양성이었고 항문 주위 감각은 보존되어있었다. 단순 방사선 사진과 MRI 사진은 다음과 같았다. 이 환 자의 치료로 가장 적절한 것은?","choices":["보조기 착용","전방 감압 및 유합술","후방 감압 및 유합술","전후방 감압 및 유합술","경과 관찰"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q018.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e018.jpg?v=1776535000"]},{"num":22,"question":"60세 남자가 허리 통증과 방사통을 주소로 내원하였다. 아래 영상 검사를 진행하였 다. 원인이 되는 구조물은?","choices":["우측 제 4 요추","좌측 제 4 요추","우측 제 5 요추","좌측 제 5 요추","좌측 제 1 천추"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q019.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e019.jpg?v=1776535000"]},{"num":23,"question":"제 4-5 요추 후방 요추체간 유합술 과정에서 cage를 삽입하는 중 경막을 내측으로 견인하면서 신경근이 손상되었다. 다음 중 감각 이상을 보일 가능성이 가장 높은 구","choices":["1","2","3","4","5"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q020.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e020.jpg?v=1776535000"]},{"num":24,"question":"교통사고 이후 경부통으로 응급실에 내원하였다. 다음 방사선 검사에서 보이는 경추 손상의 기전은?","choices":["수직 압박 손상","신연 굴곡 손상","신연 신전 손상","압박 굴곡 손상","압박 신연 손상"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q021.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e021.jpg?v=1776535000"]},{"num":25,"question":"40세 환자가 경부통과 함께 우측 상지 방사통으로 내원하였다. 아래와 같은 자세를 취하면 증상이 완화된다. 시행한 MRI 검사는 다음과 같다. 화살표 병변으로 인해 발 생하는 방사통의 전형적인 위치는?","choices":["1","2","3","4","5"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q022.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e022.jpg?v=1776535000"]},{"num":26,"question":"70세 환자가 보행이상과 양손의 어눌함으로 아래 수술을 하였다. 우측 접근을 하였 고 수술 후 쉰 목소리가 발생하였다. 이때 손상된 구조물은?","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q023.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e023.jpg?v=1776535000"]},{"num":27,"section":"유니온 2권","question":"64세 여자 환자가 하지 방사통이 심하여 촬영한 MRI 사진(L3-4, L4-5 central spinal stenosis with ligamentum flavum hypertrophy)이다. 위 환자의 방사통의 위치는?","choices":["① (문제 이미지의 dermatome 도식 참조)","② (문제 이미지의 dermatome 도식 참조)","③ (문제 이미지의 dermatome 도식 참조)","④ (문제 이미지의 dermatome 도식 참조)","⑤ (문제 이미지의 dermatome 도식 참조)"],"answer":5,"explanation":"정답: 5번. 문제의 MRI 소견은 L3-4, L4-5 central canal stenosis with ligamentum flavum hypertrophy. Cauda equina nerve root의 해부학적 배열상 중앙(central)에는 S2-S5 nerve roots가 위치하고, L5 nerve root는 dura의 전외측에 배치되어 있다. 따라서 central stenosis가 주된 병변일 때는 중앙에 위치한 S2-S5 root가 먼저 압박되어 회음부/안장마비(saddle anesthesia) 양상의 방사통이 주 증상이 된다. Key point: L4-5 level cauda equina root의 해부학적 배열을 기억할 것 (central = sacral roots, lateral = lumbar roots).","reference":"정형외과학 8th. 2권. P.1049 / Iwasaki et al. 2017","question_images":["images/유니온_2권_q095.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e095.jpg?v=1777160000"],"chapter":"척주"},{"num":28,"question":"20세 남자 환자가 심부 감각과 고유 감각이 소실되었다. 하지만 통각과 온도 감각 신경은 보존되었고, 운동신경도 보존되었다. 환자의 MRI 사진이다. 적절한 진단은?","choices":["Posterior cord syndrome","Anterior cord syndrome","Central cord syndrome","Brown-sequard syndrome","Cauda equina syndrome"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q024.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e024.jpg?v=1776535000"]},{"num":29,"question":"척추의 시상면 균형을 분석하는데 골반지표를 계측하는 것이 필수이다. 요추 후만의 환자를 치료할 때 아래 그림의 다 와 임상적으로 가장 관련이 깊은 것은? Horizontal Femoral Head","choices":["흉추 후만각","시상수직 축","요추전만각","경추전만각","요천추 측만각"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q025.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e025.jpg?v=1776535000"]},{"num":30,"question":"75세 여환이 다음과 같은 변형이 있을 때 나타날 수 있는 소견을 고르시오","choices":["경추전만각증가","요추 전만각 감소","슬관절 신전","고관절 신전","골반 retroversion"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q026.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e026.jpg?v=1776535000"]},{"num":31,"question":"경추 경막외 신경 차단술 후 호흡곤란을 호소하다 전신마비가 발생하였다. 증상을 유발할 가능성이 높은 것은?","choices":["식도 손상","경막 손상","신경근 손상","아나필라틱 반응","혈관 내 약물 주입"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"척주","question_images":["images/유니온_2권_q027.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e027.jpg?v=1776535000"]},{"num":32,"question":"25세 체조 선수로 2달 전 체조 경기 중 수상한 이후 지속적인 좌측 고관절 통증을 호 소하는 환자이다. 상기 환자의 자기 공명 영상검사 및 관절경 소견이다. 진단은?","choices":["Labral tear","Ligamentum teres tear","Acetabular cartilage injury","Osteochondral defect","Osteonecrosis of femoral head"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q028.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e028.jpg?v=1776535000"]},{"num":33,"question":"24세 축구선수가 심한 외상력 없이 4개월전부터 발생한 우측 치골, 사타구니 통증을 주소로 내원하였다. 촬영한 단순 방사선 사진은 정상이었으나 MRI에서 아래와 같은 소견이 관찰되었다. 다음 중 증상의 유발한 원인이 되는 근육은?","choices":["Abdominis external oblique","Adductor longus","Abdominis internal oblique","Rectus femoris","Sartorius"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q029.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e029.jpg?v=1776535000"]},{"num":34,"question":"46세 남자가 우측 서혜부 통증을 주소로 내원하였다. 신체검사 상 전방 충돌은 음성 이었다. 아래 영상 검사를 시행하였다. 적절한 진단은?","choices":["골수염","대퇴 경부 골절","대퇴 골두 괴사","피로하 골절","대퇴골두 충돌 증후군"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q030.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e030.jpg?v=1776535000"]},{"num":35,"question":"요통과 하지 방사통 그리고 고관절 통증이 있는 환자가 내원하였다. 환자는 인공관 절 전치환술과 요추 후방 유합술을 시행 예정이다. 먼저 인공관절 전치환술을 시행 하고 (1), 6개월 후 요추 후방 유합술을 (2) 시행하였다. 이후 고관절 탈구가 (3) 발생 할 때, 탈구의 방향 (A)과 revision 시 비구컵의 위치 (B)는 어떻게 해야 하는가? 그림 1 그림 2 그림 3","choices":["전방 - 전염각 증가","후방 - 전염각 증가","후방 - 전염각 감소","전방 - 전염각 감소","측방 - 전염각 증가"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q031.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e031.jpg?v=1776535000"]},{"num":36,"question":"81세 환자가 우측 dual mobility cup을 이용하여 수술하였다. 이후 고관절 탈구가 （그림 1） 되어 응급실 내원하여 도수 정복 （그림 2）을 시행하였다. 정복 후 촬영한 방 사선 영상 사진이다. 이에 적절한 치료는? 그림 1 그림 2","choices":["비구컵 재치환","스템 재치환","관혈적 정복 및 라이너 교체","도수 정복 및 외전 보조기 착용","라이너 치환"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q032.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e032.jpg?v=1776535000"]},{"num":37,"question":"42세 여자 환자가 파행과 하지 부동을 주소로 내원하였다. 과거력상 우측 결핵성 고 관절염으로 고관절 유합술을 시행 받았다. 수 년전부터 좌측 고관절의 간헐적 통증 과 심한 요통으로 보행이 어려울 정도이나 척추의 다른 질환은 없었다. 좌측 고관절 과 양 슬관절 운동 범위는 정상일 때 가장 적절한 치료는?","choices":["보존적 치료","하지연장술","대전자 이전술","절제 관절 성형술","고관절 전치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q033.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e033.jpg?v=1776535000"]},{"num":38,"section":"유니온 2권","question":"다음 중 high offset stem을 적용한 것은 무엇인가? (빨간색 점은 acetabular cup의 중심, 노란색 점은 femoral head의 중심이다.)","choices":["노란점이 빨간점과 수직 높이는 같고, 빨간점보다 lateral에 위치","노란점이 빨간점과 수직 높이는 같고, 빨간점보다 medial에 위치","노란점이 빨간점보다 위에 위치하고 lateral에 위치","노란점이 빨간점보다 아래에 위치하고 medial에 위치","노란점이 빨간점과 완전히 일치"],"answer":5,"explanation":"","reference":"Campbell 14th. Ch.3. P.202-205","question_images":["images/유니온_2권_q096.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e096.jpg?v=1777160001"],"chapter":"고관절"},{"num":39,"question":"25세 남자가 외상 후 전자간 골절이 발생하였다. 이때 적절한 치료는?","choices":["Compression hip screw","IVhjItiple pinning","Intramedullary nailing","Lateral anatomical plate","Extenral fixator"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q034.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e034.jpg?v=1776535000"]},{"num":40,"question":"인공 고관절 전치환술에서 direct anterior approach를 시행하였다. 이때 사용하는 internervous plane의 경계는 어떻게 되는가?","choices":["대퇴신경-상둔신경","대퇴신경 - 하둔신경","외측 대퇴피신경 - 대퇴신경","좌골신경-하둔신경","좌골신경-상둔신경"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q035.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e035.jpg?v=1776535000"]},{"num":41,"question":"대퇴골 골수강내 금속정 고정술을 하려고 한다. Trochanteric nail을 사용할 때, 방 사선 사진에서 올바른 entry point의 조합으로 옳은 것은?","choices":["1-ㄱ","2-ㄱ","3-ㄱ","1-ㄴ","2-ㄴ"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q036.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e036.jpg?v=1776535000"]},{"num":42,"question":"Percutaneous sacroiliac screw를 삽입하기 위해 intraoperative C-arm 사진을 촬 영하였다. 화살표가 가리키는 방향으로 screw insertion시 발생하는 합병증은?","choices":["L3 root","L4 root","L5 root","SI root","S2 root"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q037.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e037.jpg?v=1776535000"]},{"num":43,"question":"다음과 같은 수술 후 사진이 관찰되는 환자가 병적 보행을 주소로 내원하였다. 우측 고관절 통증은 없는 상태로 다음 환자가 보이는 보행은 어떤 보행인가?","choices":["Antalgic gait","Tandem gait","Ataxic gait","Vaulting gait","Waddling gait"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"고관절","question_images":["images/유니온_2권_q038.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e038.jpg?v=1776535000"]},{"num":44,"question":"10년 전 인공슬관절 치환술을 받은 60세 환자가 3달 전부터 수술한 무릎의 통증과 종창을 주소로 내원하였다. 혈액검사에서 ESR 57mm/hr, CRP 5.5mg/dL（정상 : 0.5 이하）였다. 관절 천자 검사에서 백혈구 12,800/mm3, 다형핵호중구 76%였고, 균배 양검사에서 메 티실린 내성 황색포도상구균이 확인되었다. 가장 적절한 치료법은?","choices":["경과 관찰","변연절제술","항생제 치료","1단계 재치환술","2단계 재치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q039.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e039.jpg?v=1776535000"]},{"num":45,"question":"외반슬 환자를 인공슬관절 전치환술을 계획하였다. 수술 중 gap을 재었더니 flexion gap은 대칭적이었으나, extension gap은 외측 구획이 내측 구획보다 tight 하였다. 가장 먼저 유리할 구조물은?","choices":["내측 슬개대퇴인대","장경대","외측측부인대","반막양근","후외방 관절막"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q040.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e040.jpg?v=1776535000"]},{"num":46,"question":"24세 남자가 우측 슬관절의 통증을 주소로 내원하였다. MRI 검사에서 외측 반월상 연골판의 전각의 longitudinal tear가 발견되었다. 관절경 outside-in technique 로 봉합을 하였다. 이때, 만들어야 할 portal의 위치로 알맞은 것은? (1은 표준 anteromedial portal이다.)","choices":["(1)보다 상외측","(1)보다 상내측","⑴","(1)보다 하외측","(1)보다 하내측"],"answer":2,"explanat
