tion_images":["images/유니온_2권_q045.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e045.jpg?v=1776535000"]},{"num":51,"question":"인공슬관절 전치환술을 하던 중 다음과 같은 기구로 대퇴 치환물 크기를 측정하였 다. 크기가 2와 3 사이가 나와서 2번을 선택하였다. 이때 생기는 부작용에 대한 치료 로 알맞은 것은?","choices":["원위 대퇴부 metal block 보강","후방 관절막 유리술","전방 내측측부인대 유리술","경골 후방경사 증가","근위 경골 추가 절제"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q046.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e046.jpg?v=1776535000"]},{"num":52,"question":"좌측 슬관절 전치환술 후 추시 관찰 중 아래와 같은 영상 검사 소견이 있어 재 치환 술을 하였다. 사진과 같은 수술장 소견을 보였을 때, 골결손에 대한 처치로 가장 적절 한것은?","choices":["Morselized bone graft","Structural allo-bone prosthesis component","Arthrodesis","Bone cement","Further cutting"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q047.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e047.jpg?v=1776535000"]},{"num":53,"question":"55세 환자가 인공슬관절 전치환술을 5년 전 시행하였다. 넘어진 후 슬관절 통증으로 촬영한 방사선 사진이다. 치환물의 해리 소견은 없었을 때 적절한 치료법은?","choices":["역행성 골수강 내정","긴 금속판 고정술","주대를 사용한 재치환술","종양 치환물","보존적 치료"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q048.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e048.jpg?v=1776535000"]},{"num":54,"question":"25세 남자가 후방십자인대 파열로 재건술을 계획 중이다. 이때 대퇴골, 경골 tunnel 의 적절한 위치의 조합은?","choices":["1-ㄱ","1-ㄴ","1-ㄷ","2-ㄱ","2-ㄴ"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q049.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e049.jpg?v=1776535000"]},{"num":55,"question":"55세 환자가 6개월 전 발생한 외상 후 지속되는 좌측 슬관절 불안정성을 주소로 내 원하였다. 슬관절 신체검진 및 보행 시 (A,B) 양상과 후방 부하 방사선 사진(C), 촬영 한 자기 공명 영상 검사(D)이다. 일차적으로 먼저 시행해야 할 치료는?","choices":["전방십자인대 재건술","후방십자인대 재건술","후외측인대 재건술","내측 개방형 근위 경골 외반 절골술","외측 폐쇄형 근위 경골 외반 절골술"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"슬관절","question_images":["images/유니온_2권_q050.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e050.jpg?v=1776535000"]},{"num":56,"question":"38세 여성 환자의 방사선 사진이다. 과거력상 류마토이드 관절염으로 치료받고 있 으며, 보조기 착용 및 교정으로도 전족부의 불편 및 통증이 지속되었다. 가장 적절한 치료는 무엇인가?","choices":["원위 중족골 골절술","근위 중족골 골절술","제 1 중족족지 관절 고정술","제 1 중족족지 관절 고정술 + 제 2,3,4,5 중족골 단축 절골술","제 1 중족족지 관절 고정술 + 제 2,3,4,5 중족골두 절제 성형술"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q051.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e051.jpg?v=1776535000"]},{"num":57,"question":"64세 여자가 좌측 족관절의 종창 및 발적이 있지만 통증은 없다. 환자는 제2형 당뇨 병을 20년째 앓고 있었다. 외상력은 없었다. 전 접촉 석고 고정 후에도 변형과 종창 이 진행할 때 가장 적절한 치료는?","choices":["변연절제술","관혈적 정복술","유합술","인공관절 전치환술","절제 관절성형술"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q052.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e052.jpg?v=1776535000"]},{"num":58,"question":"전거비인대 봉합술을 위한 족관절 working portal로 적절한 위치는?","choices":["A","B","C","D","E"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q053.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e053.jpg?v=1776535000"]},{"num":59,"question":"22세 남자가 외상 후 발생한 족관절 통증을 주소로 내원하였다. 아래 방사선 사진이 다. 정복을 방해하는 구조물은?","choices":["Tibialis posterior tendon （Medial malleolus와 골절편 사이）","Tibialis posterior tendon （Talus와 medial malleolus 사이）","Flexor hallucis longus tendon","Peroneus tendon","Periosteum"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q054.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e054.jpg?v=1776535000"]},{"num":60,"section":"유니온 2권","question":"6개월 전부터 시작된 우측 족관절 통증으로 시행한 임상 사진 및 초음파 영상(varus stress 시 talus와 fibula 과도하게 벌어짐)이다. 수술적인 치료를 결정하고 족관절 관절경 검사를 시행할 때, 초음파 검사 결과에 부합하는 가장 알맞은 관절경 소견은?","choices":["AiTFL (anterior inferior tibiofibular ligament)","PiTFL (posterior inferior tibiofibular ligament)","ATFL (anterior talofibular ligament)","CFL (calcaneofibular ligament)"],"answer":3,"explanation":"정답: 3번 (ATFL). Ankle sprain에서 ATFL rupture 진단을 위해 초음파 검사를 한다. Probe는 lateral ankle에서 fibula의 anterior margin → posterior 방향으로 oblique하게 위치시키고, varus stress 시 talus-fibula가 과도하게 벌어짐을 확인한다. 본 문제의 동영상에서도 varus stress 시 talus-fibula가 과도하게 벌어져 ATFL tension이 없음을 확인. 보기 ①은 AiTFL, ②는 PiTFL, ③은 ATFL, ④는 CFL의 관절경 소견이다. Key point: Ankle arthroscopy에서 AiTFL, PiTFL, ATFL, deltoid ligament 4가지를 구분할 수 있어야 한다.","reference":"정형외과학 8th. 2권. P.1417 / Sin et al. Arthroscopy techniques. 2019 / Ioannis et al. Cureus. 2021","question_images":["images/유니온_2권_q097.jpg?v=1777160010"],"explanation_images":["images/유니온_2권_e097.jpg?v=1777160010"],"chapter":"족부"},{"num":61,"question":"64세 여자가 10년 전 좌측 족관절, 거골하관절 유합술을 시행하였다. 6개월 전부터 우측 발목 통증으로 보행이 힘들어 내원하였다. 단순 방사선 사진에서 grade IV의 관절염 소견과 내반 변형이 10도 있었다. 신체검진 상 불안정성은 없었다. 상기 환자 의 치료로 적절한 것은?","choices":["과상부 교정절골술","과상부 교정절골술 및 관절경적 변연절제술","관절경적 변연절제술","과상부 교정절골술 및 인공관절 전치환술","족관절 인공관절 전치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q055.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e055.jpg?v=1776535000"]},{"num":62,"question":"다음과 같은 자세의 운동 처방을 하였을 때, 증상이 악화 될 가능성이 있어 권장되지 않은 질환은?","choices":["Insertional achilles tendinopathy","Noninsertional achilles tendinopathy","Retrocalcaneal bursitis","Plantar fasciitis","Flexible flat foot"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"족부","question_images":["images/유니온_2권_q056.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e056.jpg?v=1776535000"]},{"num":63,"question":"다음 골절 손상에서 소독용으로 사용할 수 있는 물질은?","choices":["Saline","Polymyxin","Chloroxylenol","Idophor","Hydrogen peroxide"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"외상","question_images":["images/유니온_2권_q057.jpg?v=1776535000"],"explanation_i  + 골수정 내고정술 + 변연절제술"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"외상","question_images":["images/유니온_2권_q062.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e062.jpg?v=1776535000"]},{"num":69,"question":"우측 족부 외측에 동통과 압통을 호소하는 10세 여아의 방사선 사진이다. 체중부하 시 통증이 발생하였으며 resisted eversion 시 pain이 증가하였다. 진단은?","choices":["Sever’s disease","5th metatarsal base stress fracture","Iselin’s disease","Sequestrum","Sinding larsen johansson syndrome"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"소아","question_images":["images/유니온_2권_q063.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e063.jpg?v=1776535000"]},{"num":70,"section":"유니온 2권","question":"뇌성마비(cerebral palsy) 환자에서 일단계 다수준 수술(single-event multilevel surgery) 후 좋은 결과를 기대할 수 있는 수술 전 환아의 보행 형태는? (가: crouch gait, 나: spastic scissoring gait, 다: Trendelenburg gait, 라: ataxic gait, 마: athetoid gait)","choices":["가 (crouch gait)","나 (spastic scissoring gait)","다 (Trendelenburg gait)","라 (ataxic gait)","마 (athetoid gait)"],"answer":2,"explanation":"","reference":"정형외과학 8th. 1권. P.639 / Graham et al. 2021","question_images":["images/유니온_2권_q098.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e098.jpg?v=1776535000"],"chapter":"소아"},{"num":71,"question":"5세 소아 환아가 주관절 통증을 주소로 내원하였다. 촬영한 방사선 사진이 다음과 같 다. 수술 중에 정복이 잘 되었는지 가장 정확하게 환인할 수 있는 view는 무엇인가?","choices":["Arthrogram","Internal oblique view","External oblique view","Jones view","Valgus stress view"],"answer":2,"explanation":"","reference":"","section":"유니온 2권","chapter":"소아","question_images":["images/유니온_2권_q064.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e064.jpg?v=1776535000"]},{"num":72,"question":"출생 당시 우측 발달성 고관절 이형성증으로 생후 7개월에 도수 정복 및 고수상 석고 고정으로 치료하였다. 이후 1 년마다 외래에서 방사선 사진을 촬영하며 외래 추시 하 였다. 2세에 촬영한 방사선 사진 (A) 와 금번 7세의 나이로 촬영한 방사선 사진 (B) 이다. 다음과 같이 보이는 이유는? A W티CHT BEARING B","choices":["비동심성정복","성장판 조기유합","대퇴골두 무혈성 괴사","관절운동 제한","재탈구"],"answer":2,"explanation":"","reference":"","se "],"explanation_images":["images/유니온_2권_e068.jpg?v=1776535000"]},{"num":77,"section":"유니온 2권","question":"다음 사진들은 소아에서 보일 수 있는 다양한 tibia bowing의 양상이다(1~4: Type II~IV congenital pseudoarthrosis of tibia, 5: posteromedial bowing of tibia). 이 중 그 경과가 가장 양호하여 단순 추시 관찰이 가능할 것으로 생각되는 것은?","choices":["Type II congenital pseudoarthrosis of tibia (전외측 각형성)","Type III congenital pseudoarthrosis of tibia","Type IV congenital pseudoarthrosis of tibia","Anterolateral bowing of tibia","Posteromedial bowing of tibia (후내측 각형성)"],"answer":5,"explanation":"","reference":"소아정형외과학 4th. Ch.18. P.474 / Pannier et al. OTSR. 2011","question_images":["images/유니온_2권_q100.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e100.jpg?v=1776535000"],"chapter":"소아"},{"num":78,"question":"6세 아의 방사선 사진이다. 혈액 검사 상 25-hydroxyvitamin D가 40ng/ml(정 상, 30-80nm/ml), parathyroid hormone 56pg/ml(정상, 14-72pg/ml), alkaline phosphatase 200, U/L(정상, 35-130U/L)이었다. 유전자 검사 상 COL10A1 유전 자의 이상이 진단되었다. 진단은?","choices":["골간단 연골 이형성증(metaphyseal chondrodysplasia)","구루병 (rickets)","국소 섬유연골 이형성증(focal fibrocartilgenous dysplasia)","블라운트씨 병(Blount disease)","섬유성 골 이형성증(fibrous dysplasia)"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"소아","question_images":["images/유니온_2권_q069.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e069.jpg?v=1776535000"]},{"num":79,"question":"보행 이상을 보이는 환아의 방사선 사진이다. 이 환자의 수술적 치료를 결정하고 예 후에 가장 연관된 방사선 계측치는?","choices":["대퇴전염각","대퇴경간각","비구지수","Center-edge 각","Hilgenreiner-epiphyseal 각"],"answer":5,"explanation":"","reference":"","section":"유니온 2권","chapter":"소아","question_images":["images/유니온_2권_q070.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e070.jpg?v=1776535000"]},{"num":80,"question":"소아 환자가 수지를 수상하여 내원하였다. 다음과 같은 방사선 소견 미 임상 소견을 보일 때, 적절한치료는?","choices":["관혈적 정복 및 핀고정술","도수 정복 및 핀고정술","신전부목","신전제한블럭","조갑상대 혈종제거술"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"소아","question_images":["images/유니온_2권_q071.jpg?v=1776 tion_images":["images/유니온_2권_q076.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e076.jpg?v=1776535000"]},{"num":86,"question":"27세 여성 환자가 1달 전부터 손목 통증을 호소하여 MRI을 촬영하였다. 환자에게 절 절한 치료는?","choices":["Wide excision + autobone graft","Extended curettage + autobone graft","Wide excision + cementation","Extended curettage + cementation","Extended curettage + wrist fusion"],"answer":4,"explanation":"","reference":"","section":"유니온 2권","chapter":"종양","question_images":["images/유니온_2권_q077.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e077.jpg?v=1776535000"]},{"num":87,"question":"53세 남자가 사구체신염으로 cyclosporin과 steroid을 복용중이다. 피부에 울긋불 긋한 병변이 발생하여 조직검사를 시행하니, human herpes virus 80| 관찰되었다. 사구체신염 약제를 감량하니 증상이 호전되었다. 적절한 진단은?","choices":["Kaposi sarcoma","Merk이 tumor","Squamous cell carcinoma","M이anoma","Dermatofibrosarcoma protuberens"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"종양","question_images":["images/유니온_2권_q078.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e078.jpg?v=1776535000"]},{"num":88,"question":"55세 남자가 8개월 전부터 악화되는 허빅지 통증으로 내원하였다. 촬영한 방사선, MRI 검사는 다음과 같다. 적절한 치료 방법은?","choices":["소파술","소파술 후 방사선 치료","광범위 절제술","광범위 절제술 후 방사선 치료","광범위 절제술 후 항암 치료"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"종양","question_images":["images/유니온_2권_q079.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e079.jpg?v=1776535000"]},{"num":89,"question":"10세 소아 환자가 6개월 전 원위 요골 골절로 다가F를 시행하였다. 수술 후 1개월 째 부터 손목관절에 통증과 종창 및 열감이 있어 항생제 치료를 시작하였다. 붉은 화살 이 가르키는 구조물은?","choices":["Sequestrum","Involucrum","이oaca","Subperiosteal abscess","Brodie’s abscess"],"answer":1,"explanation":"","reference":"","section":"유니온 2권","chapter":"감염/대사","question_images":["images/유니온_2권_q080.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e080.jpg?v=1776535000"]},{"num":90,"question":"53세 남자가 수 일전부터 우측 슬관절 통증 및 부종이 심해 내원하였다. 과거 제 1족 지 중족지관절에 비슷한 증상이 있었다. 혈액검사 상 백혈구는 13,200/mm3（정상 4,000-10,000/mm3）였고, ESR 60mm/h（정상 0-10mm/h）, CRP 10.52mg/dl（정 상＜0.5mg/dl）, Uric acid 6.5mg/dL （정상 3.5-7.2mg/dL） 였다. 관절천자액을 현미 경을 봤을 때 아래와 같았다. 일차로 사용하는 약제는?","choices":["Allopurinol","Cephazolin","Colchine","Probenecid","Corticosteroid"],"answer":3,"explanation":"","reference":"","section":"유니온 2권","chapter":"감염/대사","question_images":["images/유니온_2권_q081.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e081.jpg?v=1776535000"]},{"num":91,"question":"골표지자는 골다공증 치료제의 효과를 평가하는 가장 강력한 수단이다. 다음 형태를 보이는 골다공증 약제를 고르시오?","choices":["Bisphosphonate","Denosumab","PTH","Anti-sclerostin antibody","Calcium"],"answer":4,"explanation":"골다공증 치료제의 효과를 평가하는 골표지자는 골형성 지표와 골흡수 지표 2가지가 있다. 골형성 표지자는 PICP, PINP, osteocalcin, serum ALP이다(문제의 serum procollagen 1 N-terminal extension peptide가 여기에 속한다). 골흡수 표지자는 acid phosphatase, CTx, NTx 이다(문제의 type 1 collagen C-telopeptide가 여기에 속한다).<br>Anti-sclerostin antibody(Romosozumab)를 복용하면 12개월 동안 골형성 표지자는 증가하고, 골흡수 표지자는 감소한다.<br>Bisphosphonate를 복용하면 골형성 지표와 골흡수 지표가 모두 감소한다. 골흡수 지표가 4-6주 후 먼저 감소하며, 그 후에 골형성 지표도 3-6개월 후 감소한다.","reference":"정형외과학 8th. 1권. P.352. / Minisola et al. 2019.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q082.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e082.jpg?v=1776535000"]},{"num":92,"question":"31세의 류마티스 여자 환자가 양쪽 무릎과 발목을 포함한 여러 관절에 부종을 동반한 통증이 있다. 혈액검사 상 rheumatoid factor는 음성, anti-CCP는 양성이었다. Methotrexate와 leflunomide를 적정 용량으로 6개월 사용중이나 효과가 없었다. 다음으로 사용할 수 있는 약제는?","choices":["Abatacept","Sulfasalazine","Steroid","Celecoxib","Hydroxychloroquine"],"answer":1,"explanation":"양성적 약용을 위한 관찰의 정차(remission)에 이르게 되면 DMARD 치료가 시행되는데 단계는 다음과 같다.<br>1. Methotrexate는 주로 처음에 사용하는 cDMARD로 사용된다.<br>2. Methotrexate로 조절되지 않을 경우 sulfasalazine, hydroxychloroquine을 병용한다. 두 번째 option은 methotrexate와 leflunomide, 세 번째 option은 TNF inhibitor(etanercept, adalimumab)를 사용할 수 있다.<br>3. Biologic DMARD(bDMARD) abatacept는 이전에 cDMARD 병용치료(methotrexate와 TNF inhibitor)에도 효과가 없을 때 시도할 수 있다. Abatacept와 methotrexate or cDMARD 병용치료도 시도할 수 있다.","reference":"정형외과학 8th. 1권. / Bair et al. BMC Drug Safety Evaluation. 2017.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q083.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e083.jpg?v=1776535000"]},{"num":93,"question":"80세 환자가 직장암으로 항암치료를 받던 중 발생한 39도의 고열, 혈압저하, 좌측 둔부 통증 및 열감이 있었다. CT 및 MRI 소견이 다음과 같을 때, 원인균으로 가장 가능성이 높은 것은?","choices":["Clostridium perfringens","Staphylococcus aureus","Staphylococcus epidermidis","Streptococcus mutans","Streptococcus pyogenes"],"answer":1,"explanation":"Gas gangrene이 CT와 MRI에서 thigh에 분포하고 있다. 현재 고열과 혈압저하 등 septic shock의 임상증상을 보이고 있다. Gas production organism은 흔히 Clostridium perfringens, Escherichia coli가 원인이다.","reference":"Rockwood and Green 9th. Ch.13 P.728. / Hechter et al. Cureus. 2022.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q084.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e084.jpg?v=1776535000"]},{"num":94,"question":"인공 고관절 치환술 후 발생하는 마모 기전중 전단 응력에 의해 발생하는 기전은 어떤 것인가?","choices":["표면 마모","연마 마모","점착 마모","피로성 마모","부식성 마모"],"answer":3,"explanation":"점착 마모(adhesive wear)란 서로 표면을 맞대고 이동하는 물체에서, 마찰력에 의해 맞닿아 있는 면적에 전단 응력이 작용하면서 미세하게 파편이 떨어져 나가는 마모이다. 흔히 가장 흔하게 볼 수 있다. 인공 고관절 치환술에서는 점착 마모와 연마 마모(abrasive wear)가 흔하며, 인공 슬관절 치환술에서는 피로 마모(fatigue wear)가 흔하다.","reference":"정형외과학 8th. 1권. P.139","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q085.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e085.jpg?v=1776535000"]},{"num":95,"question":"다음 물체들 중 torsional stiffness가 가장 큰 것을 고르시오.","choices":["원형 (속이 찬 원기둥)","튜브 (속이 빈 중공 원기둥)","삼각형","사각형","I형 빔"],"answer":2,"explanation":"Stiffness란 외부 응력이 주어졌을 때, 물체가 이에 저항하는 지지력을 일컫는다. 흔히 stiffness는 물체의 질과 물체의 형태 2가지에 의해 결정된다. 물체의 형태에 따라 stiffness가 다르며, 그중 물체의 형태에 의한 stiffness를 관성 능률(moment of inertia)이라고 한다. Torsional stiffness는 극관성 모멘트(polar moment of inertia, Ip = Ix + Iy)에 의해 결정된다.<br>같은 밀도와 질량을 가지고 있다면 구멍이 빈 중공 원형(hollow tube)의 극관성모멘트가 가장 크다.<br>• Torsional stiffness: 중공 원통 > 원기둥 > I형 순으로 높다.<br>• Bending stiffness: I형 > 원통 > 원기둥 순으로 높다.","reference":"정형외과학 8th. 2권. P.134","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q086.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e086.jpg?v=1776535000"]},{"num":96,"question":"다음은 allograft의 예를 보여주고 있다. (A)에 해당하는 allograft가 (B)에 해당하는 allograft 보다 더 강한 특성은?","choices":["Osteoconduction","Osteoinduction","Cellularity","Compressive force resistance","Tensile force resistance"],"answer":1,"explanation":"그림 A는 cancellous allobone이고, 그림 B는 strut(cortical) allobone이다.<br>먼저 osteoconduction은 trabecula가 풍부하여 donor cell이 들어가기 쉬운 cancellous bone이 더 좋다. 반면 strut allograft는 cortical bone으로 치밀하여 compressive, tensile force에 대한 resistance가 크다. 반면 allobone은 osteogenesis, vascularity는 모두 없다.","reference":"정형외과학 8th. 1권. P.193.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q087.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e087.jpg?v=1776535000"]},{"num":97,"question":"다음과 같은 현상을 방지하기 위해 해야 할 것으로 가장 적절한 것은?","choices":["감마선 조사","지르코니아 입자 추가","탄소 장력 증가","표면 열처리","항산화제 첨가"],"answer":2,"explanation":"Ceramic은 인체적합도가 높고 마찰계수가 낮아 인공관절 bearing으로 많이 쓰인다. 흔히 알루미나(alumina), 지르코니아(zirconia) 등이 있다. 제 4세대의 가장 큰 단점은 brittle하여 ceramic-ceramic bearing에서 골절이 보고되고 있다.<br>Brittle한 단점을 고치기 위해 발전되어 왔고, 3세대 세라믹 인공 관절면(forte, BIOLOX)에서 지르코니아를 첨가한 4세대 세라믹 인공 관절면(delta, BIOLOX)를 개발하였다.<br>지르코니아를 첨가하여 알루미나 사이로 생긴 균열이 지르코니움에게 흡수당하여 더 이상 진행되지 않는 특성을 보여 파손을 줄여 주었다.","reference":"고관절학. 2nd. Ch.4. P.501. / Oak et al. J Hip Surg. 2017. / CeramTec GmbH.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q088.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e088.jpg?v=1776535000"]},{"num":98,"question":"다음의 관절연골 그림에서 수분 함유량이 가장 많은 층은?","choices":["1","2","3","4","5"],"answer":1,"explanation":"연골 층은 위에서부터 (1에서 5까지) 차례대로 표재층(superficial zone), 이행층(transitional zone), 중간층(middle zone), 석회화 연골층(calcified zone)으로 이루어져 있다. E(=5)는 연골하골(subchondral bone)이다. 이 중 표재층이 물의 함유량은 가장 많고 단백다당(proteoglycan) 함유량은 가장 적어 인장력에 잘 견딘다.","reference":"정형외과학 8th. 1권. P.105. / Usami et al. 2015.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q089.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e089.jpg?v=1776535000"]},{"num":99,"question":"사진은 장관골의 골단판 조직 소견이다. 소아 성장판 골절 시, Salter-Harris type II가 발생하는 층은?","choices":["1","2","3","4","5"],"answer":4,"explanation":"성장판 층은 위에서부터 차례대로 reserve zone, proliferative zone, maturation zone, hypertrophic zone, vascular invasion zone이다. 보기 1번은 epiphysis bone, 2번은 reserve zone, 3번은 proliferative zone, 4번은 hypertrophic zone이다.<br>비후대(hypertrophic zone)는 세포 분열이 종결되고, 크기가 약 5~10배로 커지게 된다. 비후대는 산소 분압이 낮고, 혈관이 없어 손상에 가장 취약하다. Salter-Harris type II 골절과 SCFE 등이 모두 비후대에서 골절이 된다.","reference":"정형외과학 8th. 1권. P.105. / Cahgin et al. Paediatric research. 2020.","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q090.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e090.jpg?v=1776535000"]},{"num":100,"question":"원위 상완골 골절에서 관혈적 정복 및 내고정술을 하였다. 수술 후 손목과 무지의 능동적 신전운동이 안되었다. 초음파 검사 시행 시에는 신경 및 혈관의 주행에는 이상이 없었다. 근전도 검사에서 근세동 전위(fibrillation potential) 및 양성 예각화(positive sharp wave)와 같은 신경손상의 침 근전도 양성 소견을 보인다. 신경 손상 후 대부분의 환자에서 양성 소견이 뚜렷하게 나타나기 시작하는 시기 및 신경 손상의 정도는?","choices":["1주 / 신경단열(neurotmesis)","1주 / 신경진탕(neuropraxia)","1주 / 축색단열(axonotmesis)","3주 / 신경진탕(neuropraxia)","3주 / 축색단열(axonotmesis)"],"answer":5,"explanation":"신경 손상 후 근전도 검사에서 뚜렷한 소견은 3-4주 후부터 관찰된다. 척추 주위근에는 2주 후, 사지의 원위부 근육은 3~4주가 경과한 후에 근전도에서 myofibrillation과 positive sharp wave가 현저하게 나타난다.<br>Neuropraxia(신경진탕)은 조직검사에서 myelin의 mild한 injury가 관찰되고 axon에는 이상이 없다. 반면 Axonotmesis(축색단열)은 조직검사에서 myelin과 axon에 injury가 관찰되며, 임상적으로 Tinel sign이 관찰된다. Neurotmesis(신경단열)은 조직검사상 myelin, axon 외에도 epineurium에도 손상이 발생한다.","reference":"정형외과학 8th. 1권. P.681","section":"유니온 2권","chapter":"총론","question_images":["images/유니온_2권_q091.jpg?v=1776535000"],"explanation_images":["images/유니온_2권_e091.jpg?v=1776535000"]},{"num":1,"question":"수근부 장측의 해부학적 구조에서 월상골 주위 탈구시 월상골의 장측 탈구가 잘 일 어나는 약한 공간이 있다. 이 곳의 경계를 이루는 인대 구조물은? Carpal bones Hamate Trapezoid Capitate — Pisiform Triquetrum — Lunate -----------Trapezium Scaphoid","choices":["Long radiolunate ligament - scapholunate ligament","Long radiolunate ligament - short radiolunate ligament","Radioscaphocapitate ligament - long radiolunate ligament","Radioscaphocapitate ligament - triquetrocapitate ligament","Radioscaphocapitate ligament - ulnotriqetral ligament"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q001.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e001.jpg?v=1776535000"]},{"num":2,"question":"38세 남자가 6개월 전부터 좌측 수부 소지구근부위의 통증과 환지, 소지의 감각이 상이 있었다. 시간이 지나면서 환지와 소지에 갈퀴손 변형(claw hand deformity)이 보였으며 손에 힘이 떨어졌다. 영상 검사는 다음과 같을 때 가장 적절한 치료는?","choices":["관혈적 정복 및 내고정술","관혈적 정복 및 내고정술 + 척골신경 감압술","골편 절제술","골편 절제술 + 척골신경 감압술","척골신경 감압술"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q002.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e002.jpg?v=1776535000"]},{"num":3,"question":"70세 여자가 3년 전부터 손목 통증이 있었다. 보존적 치료에도 통증이 지속되었고 영상 검사가 다음과 같을 때 가장 적절한 치료는?","choices":["근위 수근열 절제술","사중관절 유합술","요골 단축술","유두골 단축술","혈관부착 골이식술"],"answer":1,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q003.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e003.jpg?v=1776535000"]},{"num":4,"question":"68세 남자가 2년 전부터 좌측 손목에 통증이 있었고 한 달 전부터 수지 움직임 제한 이 발생하였다. 신체검사는 동영상과 같으며 방사선 검사 및 MRI 검사는 아래 사진 과 같았다. 이 환자에게 시행할 수 있는 적절한 치료는? 동영상에서, 수지 신전시 4,5번째 손가락의 신전 불가 (Plastic surgery key)","choices":["관절경하 Wafer 술식","원위요척관절 재건술 + 신전건 봉합술","척골 단축술 + 신전건 봉합술","척골 단축술 + 신전건 재건술","Sauve-Kapandji 술식 + 신전건 재건술"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q004.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e004.jpg?v=1776535000"]},{"num":5,"question":"60세 환자가 3개월 전 날카로운 유리에 수상 후 건 봉합 수술을 받았다. 이후 관절운 동을 시작하면서 우측 중지에 부종과 통증이 발생하였다. 신체검사에서 수동적으로 는 신전이 되지만 굴곡 상태에서는 능동적 신전이 되지 않았다. 손상된 구조물은?","choices":["Central slip","Interosseous tendon","Lateral band","Sagittal band","Terminal tendon"],"answer":1,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q005.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e005.jpg?v=1776535000"]},{"num":6,"question":"3년 전부터 시작된 우측 제5수지 변형이 있는 59세 환자의 수술 전 사진이다. 이 환 자의 수지 변형에 가장 기여하는 병적 구조물은?","choices":["Central cord","Lateral digital cord","Pretendinous cord","Retrovascular cord","Spiral cord"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q006.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e006.jpg?v=1776535000"]},{"num":7,"question":"류마티스 관절염으로 치료 중인 50세 환자가 3년 전부터 악화되는 좌측 엄지손가락 중수지관절 통증이 있었다. 외상력은 없고 신체검사에서 중수지관절의 불안정성과 운동범위 제한이 있었다. 영상 검사가 다음과 같을 때 가장 적절한 치료는?","choices":["관절유합술","관혈적정복 및 내고정","도수정복 및 석고고정","인공관절치환술","인대재건술"],"answer":1,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q007.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e007.jpg?v=1776535000"]},{"num":8,"question":"60세 환자가 우측 엄지손가락이 꺾인 뒤 우측 엄지손가락 중 수지관절에 통증과 부 종이 발생하였다. 영상 검사와 MRI가 다음과 같다. 수술 사진에서 보이는 구조물 (1) 와 (2)로 적절한 것은?","choices":["1： 무지내전근건막, 2: 요측측부인대","1： 무지내전근건막, 2： 척측측부인대","1： 무지외전근막, 2： 요측측부인대","1： 척측측부인대, 2： 무지내전근건막","1： 척측측부인대, 2： 무지외전근건막"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q008.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e008.jpg?v=1776535000"]},{"num":9,"question":"33세 환자가 5년 전 넘어진 후 발생한 손목 통증이 지속되었다. 신체검사에서 해부 학적 취약함 (anatomical snuffbox)에 압통이 있었고, 방사선 검사, MRI가 다음과 같았다. 가장 적절한 치료는?","choices":["경피적 나사못 고정술","근위열 절제술","사중유합술","쐐기골 이식술 및 나사못 고정술","혈관부착 골 이식술"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q009.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e009.jpg?v=1776535000"]},{"num":10,"question":"55세 환자가 좌측 3수지 첨부에 다음과 같은 손상이 있고 손상 부위에서 원위지골이 관찰되었다. 가장 적절한 치료는?","choices":["Cross finger flap","Homodigital neurovascular island flap","이차적 치유","피부 이식","V-Y flap"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q010.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e010.jpg?v=1776535000"]},{"num":11,"question":"다음 중 물갈퀴 공간(web space)을 만들기 위한 피판으로 가장 적절한 것은?","question_images":["images/유니온_3권_q095.jpg?v=1776535000"],"choices":["보기 1","보기 2","보기 3","보기 4","[보기 5 - 누락]"],"answer":3,"explanation":"","explanation_images":["images/유니온_3권_e095.jpg?v=1776535000"],"reference":"Kvernmo et al. 2013.","section":"유니온 3권","chapter":"수부"},{"num":12,"question":"수지 및 수장의 감염시 발생한 고름이 모여 공간을 형성할 수 있는 장소로 아래 그림 의 심수지굴곡건과 A 사이의 공간을 B라고 한다. 적절한 조합은?","choices":["A: flexor retinaculum, B: carpal tunnel","A: hypothenar muscle, B： hypothenar space","A: lumbrical muscle, B： mid-palmar space","A: pronator quadratus muscle, B: Parona's space","A: thenar muscle, B： thenar space"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"수부","question_images":["images/유니온_3권_q011.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e011.jpg?v=1776535000"]},{"num":13,"question":"50세 남자가 팔을 뻗으며 넘어진 이후 좌측 어깨 주위 통증이 있다. 동영상과 같은 신체검사 소견이 관찰되었다. 방사선 사진에서는 특별한 이상 소견은 없었으며, 연부조직의 이상을 평가하기 위해 초음파 검사를 계획하였다. 환자의 병변을 관찰하기 가장 좋은 검사 자세와 초음파 변환기의 위치는?","question_images":["images/유니온_3권_q096.jpg?v=1776535000"],"choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":5,"explanation":"","explanation_images":["images/유니온_3권_e096.jpg?v=1776535000"],"reference":"자세에 따른 견관절부 초음파 진단 비교. JKOA. 2017. P336-343.","section":"유니온 3권","chapter":"견관절"},{"num":14,"question":"20세 남자가 우측 어깨 주위 통증과 힘이 빠지는 증상이 있다. 견관절의 외회전이 좌측에 비해 악화되었다. 어깨 주위 육안소견은 사진과 같다. 단순 방사선 사진에서 는 특별한 이상소견은 없었고, MRI 영상은 다음과 같았다. 이 경우 압박되는 신경을 상완신경총 그림에서 고르시오.","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"견관절","question_images":["images/유니온_3권_q012.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e012.jpg?v=1776535000"]},{"num":15,"question":"해부학적 인공견관절 치환술을 시행할 때 삼각근과 회전근개의 lever arm을 유지하 기 위해 복원해야 할 lateral humeral offset은?","choices":["HF","GF","DE","AC","MH"],"answer":1,"explanation":"","reference":"","section":"유니온 3권","chapter":"견관절","question_images":["images/유니온_3권_q013.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e013.jpg?v=1776535000"]},{"num":16,"question":"반복적인 어깨 탈구 환자의 견관절 MR arthrogram이다. 화살표가 표시하는 구조를 관절경 영상에서 고르시오.","choices":["1","2","3","4","5"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"견관절","question_images":["images/유니온_3권_q014.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e014.jpg?v=1776535000"]},{"num":17,"question":"좌측 주관절에 축성압박, 외반, 회외전력을 가했을 때 다음과 같은 소견이 관찰되었 다. 주관절 주위 인대 중 가장 손상이 심할 것이 예상되는 구조는? Reduction","choices":["1","2","3","4","5"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"견관절","question_images":["images/유니온_3권_q015.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e015.jpg?v=1776535000"]},{"num":18,"question":"60세 남자가 퇴행성 관절염으로 해부학적 견관절 전치환술을 예정 중이다. 다음 영 상을 보고 불량한 예후와 연관이 있는 영상으로 가장 적절한 것은?","choices":["1","2","3","4","5"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"견관절","question_images":["images/유니온_3권_q016.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e016.jpg?v=1776535000"]},{"num":19,"question":"상완골 근위부 골절(proximal humerus fracture)의 방사선 사진이다. 다음 중 인공관절 치환술을 해야 할 가능성이 가장 높은 골절을 고르시오.","question_images":["images/유니온_3권_q097.jpg?v=1776535000"],"choices":["보기 1","보기 2","보기 3","보기 4","[보기 5 - 누락]"],"answer":2,"explanation":"","explanation_images":["images/유니온_3권_e097.jpg?v=1776535000"],"reference":"정형외과학 8th. 2권. P1561.","section":"유니온 3권","chapte chapter":"고관절"},{"num":36,"question":"81세 남자가 넘어진 후 좌측 고관절 통증이 생겼다 평소 일상 활동에 제한이 없고 고 혈압으로 정기적인 내과 진료를 받고 있는 것 이외에는 건강상의 특별한 문제는 없 다. 방사선 검사는 아래와 같다. 가장 적절한 치료는?","choices":["다발성 나사못 고정술","골이식 및 다발성 나사못 고정술","압박고나사 고정술","금속정 고정술","인공관절치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q032.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e032.jpg?v=1776535000"]},{"num":37,"question":"32세 여자가 출산 후 지속적인 양측 둔부 통증이 있다. 신체 검사에서 신경학적 이상 소견은 없으며, 천장 관절의 신연 및 압박 검사에서 음성이었다. 혈액검사는 정상이 었다. 방사선 검사 및 CT 검사이다. 가장 적절한 진단은?","choices":["강직성 척추염","유방암의 천장관절 전이","장골 치 밀화 골염","천장관절 증후군","천장관절 결핵성 관절염"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q033.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e033.jpg?v=1776535000"]},{"num":38,"question":"8개월전 세라믹 골두 골절로 금속-폴리에틸렌 관절면을 이용한 우측 고관절 인공관 절 재치환술을 시행 받았다. （그림 A） 수술 후 3년이 지나자 고관절 통증이 발생하여 촬영한 방사선 검사 （그림 B）와 재치환술시 수술실 소견 （그림 C,D）은 다음과 같다. 마모의 기전으로 가장 적절한 것은?","choices":["미동 마모 (fretting wear)","부식 마모 (corrosive wear)","연마 마모 (abrasive wear)","점착 마모 (adhesive wear)","피로 마모 (fatigue wear)"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q034.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e034.jpg?v=1776535000"]},{"num":39,"question":"고관절 인공관절치환술에서 사용되는 무시멘트형(cementless) 삽입물은 표면처리를 통해 숙주골과의 골고정을 얻는다. 다음 중 골표면성장(bone ongrowth)을 얻기 위한 표면처리 방법으로 가장 적절한 것은?","question_images":["images/유니온_3권_q099.jpg?v=1776535000"],"choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":2,"explanation":"정답: 2번 (grit-blasted surface)<br><br><b>Bone ongrowth</b>를 얻기 위한 표면처리:<br>- Grit-blasted surface<br>- Plasma-sprayed surface (titanium 또는 hydroxyapatite)<br>- 대표 stem: type 3C grit-blasted stem<br><br><b>Bone ingrowth</b>를 얻기 위한 표면처리:<br>- Sintered beads<br>- Diffusion bonded fiber mesh<br>- Highly porous tantalum coating<br><br><b>그림별 분류</b><br>- 그림 1: sintered beads (ingrowth)<br>- <b>그림 2: grit-blasted surface (ongrowth) ← 정답</b><br>- 그림 3, 4: highly porous tantalum coating (ingrowth)<br>- 그림 5: diffusion bonded fiber mesh coating (ingrowth)","explanation_images":["images/유니온_3권_e099.jpg?v=1776535000"],"reference":"Campbell. 14th. Ch3. Fig3-19, 3-20 / Uklejewski et al. 2008.","section":"유니온 3권","chapter":"고관절"},{"num":40,"question":"단순 횡형의 대퇴 전자하 골절로 대전자부 삽입 골수내정을 사용하였다. 그림의 변 형과 의인성 골절 （화살표）이 발생하였을 때, 수술 중 사용된 골수내정의 삽입점으로 가장 가능성이 높은 것은?","choices":["대전자부 내측-전방","대전자부 외측-전방","대전자부 내측-후방","대전자부 외측-후방","대전자부 중심-중심"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q035.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e035.jpg?v=1776535000"]},{"num":41,"question":"73세 여자의 좌측 대퇴골 방사선 및 MRI 검사이다. 좌측 대퇴부의 통증이나 압통은 없다. 골밀도 검사에서 요추 및 대퇴 경부의 T-score는 각각 -3.4 및 -2.3로 비스포 스포네이트 제제를 3년간 복용하였다. 2개월 전 우측 비전형 대퇴간부 골절로 수술 을 받았다. 현시점에서 이 환자의 좌측 대퇴골에 대한 치료 방법 및 근거로 가장 적 절한 것은?","choices":["보존적 치료 - 골밀도 검사","보존적 치료 - 증상","예방적 골수내정 고정 - 골절 부위","예방적 골수내정 고정 - MRI 검사","예방적 골수내정 고정 - 증상"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q036.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e036.jpg?v=1776535000"]},{"num":42,"question":"좌측 서혜부 통증이 있는 환자의 방사선 검사와 CT 검사이다. 통증은 운동이나 장시 간 앉아있을 때 악화된다. 신체검사에서 통증이 유발되었으나 운동 범위의 감소는 없다. 환자의 골 변형으로 인해 가장 먼저 손상 받을 것으로 예상되는 구조물은?","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q037.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e037.jpg?v=1776535000"]},{"num":43,"question":"우측 고관절 통증이 있는 환자의 수술 전 기립 골반 전후면 및 요천추부 측면 방사선 사진이다. 고관절 인공관절 전치환술을 시행하였고, 삽입물은 안전범위 내에 정상적 으로 삽입되었다. 발생 가능성이 가장 높은 합병증은?","choices":["비구삽입물 주위 골절","신경 손상","이소성 골화","탈구","하지부동"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"고관절","question_images":["images/유니온_3권_q038.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e038.jpg?v=1776535000"]},{"num":44,"question":"좌측 슬관절에 대한 관절경 검사 동영상이다. 손상된 구조물로 가장 가능성이 높은 것은?","choices":["Anterior cruciate ligament","Lateral patellofemoral ligament","Popliteofibular ligament","Posterior oblique ligament","Superficial medial collateral ligament"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q039.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e039.jpg?v=1776535000"]},{"num":45,"question":"좌측 슬관절에 대한 수술 동영상이다. 보이는 현상과 가장 연관성이 높은 손상 구조 물은? 초기 소견 (A) Anterior draw 시행 후 보이는 소견(B)","choices":["내측슬개대퇴인대","내측측부인대","외측측부인대","전방십자인대","후방십자인대"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q040.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e040.jpg?v=1776535000"]},{"num":46,"question":"35세 남자가 1년 전부터 지속적으로 반복되는 우측 슬관절 동통과 부종으로 인해 일상생활에 지장이 있다. 방사선 검사에서 하지 정렬은 정상이다. MRI 검사에서 3.5cm 크기의 ICRS grade 4a 관절연골 손상이 대퇴 활차에 관찰된다. 가장 적절한 치료는?","choices":["경과관찰","미세골절술","자가골연골이식술","자가 연골세포이식술","자가골수유래세포이식술"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q041.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e041.jpg?v=1776535000"]},{"num":47,"question":"25세 남자의 우측 슬관절 전방십자인대 수술 후 방사선 사진이다. 환자는 수술 후 슬 관절 불안정성은 호전되었지만 굴곡 제한이 발생하였다. 시간 경과와 함께 굴곡 제 한이 사라지면서, 슬관절 불안정이 다시 발생하였다. 가장 적절한 치료는? （파란 삼각형은 대퇴골 screw의 위치를 나타낸다.）","choices":["보존적 치료","후외측인대 복합체 재건술 추가","전외측인대 재건술 추가","1단계 전방십자인대 재재건술","2단계 전방십자인대 재재건술"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q042.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e042.jpg?v=1776535000"]},{"num":48,"question":"간헐적으로 부위가 명확하지 않은 좌측 무릎 통증을 호소하는 17세 남자의 MRI 사진 이다. 가장 적절한 치료는?","choices":["경과 관찰","석고 붕대 고정","미세골절술","골연골편 고정","자가골연골이식술"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q043.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e043.jpg?v=1776535000"]},{"num":49,"question":"22세 환자로 요가 운동 중 다리 꺾이며 우측 무릎 통증 발생하였다. 이전에 동측 무 릎에 유사한 수상이 2차례 있어 석고 고정 치료를 시행한 바 있었다. MRI에서 화살 표로 표시된 부분을 재건할 때 이식건의 대퇴부 고정위치로 가장 적절한 부위는? ligament sMCL (proximal tibial) Meniscofemoral ligament sMCLtdisu! tibial)","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q044.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e044.jpg?v=1776535000"]},{"num":50,"question":"기켠 전 좌측 무릎에 가동형 내측 단일구획 슬관절 치환술을 받은 60세 환자이다. 2 일 전 바닥에서 일어나는 중 파열음과 함께 통증, 관절운동 제한이 시작되었다. 방사 선 사진에서 가장 가능성이 높은 진단은?","choices":["골융해","무균성 해리","치환물 주위 감염","치환물 주위 골절","폴리에틸렌 삽입물 탈구"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q045.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e045.jpg?v=1776535000"]},{"num":51,"question":"방사선 사진과 같이 경골 내측에 심한 골 결손이 있는 환자에서 슬관절 전치환술을 시행할 때, 골 결손 부위 전체를 포함하여 10mm 이상의 경골외과가 절제된다면 손 상 가능성이 높아 주의를 요하는 구조물은?","choices":["대퇴이두근","비복근의 외측 두","슬와건","외측측부인대","장경대"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q046.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e046.jpg?v=1776535000"]},{"num":52,"question":"4년 전 좌측 슬관절전치환술을 시행한 76세 환자에게 2개월 전부터 무릎 통증이 점 점 증가하였다. 신체검사에서 무릎발적, 부종, 관절운동 제한이 있었다. 혈액검사에 서 ESR 57mm/hr, CRP 5.5mg/dL（정상 : 0.5 이하）였다. 관절 천자 검사에서 백혈구 12,800/mm3, 다형핵호중구 76%였고, 균배양검사에서 메티실린내성 황색포도상구 균이 확인되었다. 가장 적절한 치료법은?","choices":["경과 관찰","변연절제술","항생제 치료","1단계 재치환술","2단계 재치환술"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"슬관절","question_images":["images/유니온_3권_q047.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e047.jpg?v=1776535000"]},{"num":53,"question":"55세 남자가 6개월 전 등산 후 발생하였고. 3개월 전 스노우보드를 탄 후 리를 짚지 않으려고 한다. 신체검사에서 근위 하퇴부에 압 통과 열감이 있으며 관절운동 범위는 양호하였다. 체온은 38.8도였으며, 혈액검사 상 백혈구는 20,000/mm3였고, CRP는 6.5mg/dl（정상＜0.5mg/dl）, ESR 32mm/ 미정상 0-10mm/h） 였다. 영상검사소견은 다음과 같다. 가장 우선적으로 시행하여 야 할 조치는?","choices":["경험적 항생제 투여","골 천자술 및 세균 배양","다발성 천공술","슬관절 관절막 절제술","HLA-B27, 류마토이드 인자, 항핵항체 검사"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"감염/대사","question_images":["images/유니온_3권_q053.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e053.jpg?v=1776535000"]},{"num":59,"question":"4세 여아가 양쪽 무릎과 발목을 포함한 여러 관절에 부종을 동반한 통증이 있다. 전 신적 열이 2주전부터 간헐적으로 있었으며, 열이 있을 때 피부에는 사진과 같은 병 변이 나타났다가 열이 떨어지면 사라졌다. 상기도 감염의 징후는 없었다. 혈액검사 에서 백혈구는 15,000/mm3（정상 4,000-10,000/mm3）였고, ESR 45mm/h（정상 0-10mm/h）, CRP 7.2mg/dl（정상<0.5mg/dl）, rheumatoid factor는 7IU/ml（정상 <14IU/ml）이었다. 혈액배양 검사는 음성이었다. 가장 가능성이 높은 진단은?","choices":["Felty syndrome","Juvenile systemic rheumatoid arthritis","psoriatic arthritis","rheumatic fever","systemic lupus erythematosus"],"answer":2,"explanation":"","reference":"","section":"유니온 3권","chapter":"감염/대사","question_images":["images/유니온_3권_q054.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e054.jpg?v=1776535000"]},{"num":60,"question":"16개월 된 소아가 내반슬을 보여 내원했다. 다음과 같은 혈액검사 및 방사선 사진을 보였을 때 원인으로 가장 적절한 것은? Test 측정치 정상치 Serum 25OHD level 55 ng/ml 30-80 ng/ml Serum ALP level 19 U/L 35-130 U/L Serum calcium level 10.3 mg/dl 8.5-10.2 mg/이 Serum PTH level 50 pg/ml 14-72 pg/ml Serum phosphorus level 1.3 mg/dl 2.5-4.5 mg/이","choices":["1-a-hydroxylase","성장호르몬","인슐린","제23형 섬유모세포 성장인자(fibroblast growth factor type 23)","제3형 섬유모세포 성장인자 수용체"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"감염/대사","question_images":["images/유니온_3권_q055.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e055.jpg?v=1776535000"]},{"num":61,"question":"18세 군인이 6개월 전부터 지속된 족관절 내측의 통증이 있다. 불규칙한 지면을 걷 기가 힘들고, 신체검사에서 거골하관절의 움직임이 소실되었다. 방사선 사진(A) 및 CT 사진(B)은 다음과 같다. 가장 가능성이 있는 진단은?","choices":["거골골연골병변","부주상골 증후군","족관절 내측 불안정증","족근골 결합","족근동 증후군"], "reference":"","section":"유니온 3권","chapter":"족부","question_images":["images/유니온_3권_q061.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e061.jpg?v=1776535000"]},{"num":67,"question":"6개월 전 스키 타다 넘어진 후 지속되는 족관절 외측부 통증에 대해 실시한 초음파 영상 및 임상 사진이다. 수술로 재건해야 할 수조물은?","choices":["상비골근지대(superior peroneal retinaculum)","상신전지대(superior extensor retinaculum)","전하경비인대(anterior inferior tibiofibular ligament)","하비골근지대(inferior peroneal retinaculum)","하신전지대(inferior extensor retinaculum)"],"answer":1,"explanation":"정답: 1번 (Superior peroneal retinaculum, SPR)<br><br><b>임상 소견 — Acute peroneal tendon dislocation/subluxation</b><br>- 스키, 축구 등에서 갑작스러운 족관절 과신전 또는 외전 + 강한 비골근 수축<br>- Superior peroneal retinaculum (SPR) 파열 → peroneal tendon이 fibula 후방에서 전방으로 탈구<br>- 또는 fibula 견연 골절(rim fracture)을 동반<br><br><b>초음파 소견</b><br>- Peroneal tendon이 fibular groove에서 anterior로 위치 (subluxation/dislocation)<br>- SPR의 연속성 소실<br><br><b>치료</b><br>- 활동 적은 환자: 보존적 (cast immobilization 6주)<br>- 급성 + 활동성 환자, 만성 재발: <b>SPR 재건술/봉합술</b><br>- Fibular groove deepening 동반 가능<br><br><b>해부학</b><br>- SPR: peroneal tendon을 fibular groove 내에 잡아주는 1차 안정화 구조<br>- 외측 malleolus 후방에 부착","reference":"","section":"유니온 3권","chapter":"족부","question_images":["images/유니온_3권_q062.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e062.jpg?v=1776535000"]},{"num":68,"question":"다음 중 골절 치유 기전(healing mechanism)이 다른 것은?","question_images":["images/유니온_3권_q100.jpg?v=1776535000"],"choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":1,"explanation":"","explanation_images":["images/유니온_3권_e100.jpg?v=1776535000"],"reference":"정형외과학 8th. 2권. P1495. / Saikia et al. 2011.","section":"유니온 3권","chapter":"외상"},{"num":69,"question":"원위 상환골, 간부 골절로 보존적 치료 중 우측 엄지손가락의 신진 재한이 발생하였 다. 손상된 신경으로 가장 가능성이 높은 것은?","choices":["근피신경","액와신경","요골신경","정중신경","척골신경"],"answer":3,"explanation":"","reference":"","section":"유니온 3권","chapter":"외상","question_images":["images/유니온_3권_q063.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e063.jp 명하기에 가장 적절한 물성은?","choices":["인성(toughness)","응력 집중(stress concentration)","취성(brittleness)","탄성 (elasticity)","포복(creep)"],"answer":5,"explanation":"","reference":"","section":"유니온 3권","chapter":"총론","question_images":["images/유니온_3권_q093.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e093.jpg?v=1776535000"]},{"num":100,"question":"개방성 골절로 입원한 환자에게 항생제 피부검사를 시행하여 적절한 예방적 항생제 를 투여하였으나, 약물 알레르기 과거력을 확인하지 않고 tramadol을 통증 조절을 위해 투여한 다음 과민성 쇼크(anaphylactic shock)가 발생하였다. 법적 분쟁이 발 생하였다면 의료진은 어떠한 의무를 다하지 못한 것에 대한 책임을 져야 하는가?","choices":["기록 의무","동의 의무","설명 의무","주의 의무","지도 의무"],"answer":4,"explanation":"","reference":"","section":"유니온 3권","chapter":"총론","question_images":["images/유니온_3권_q094.jpg?v=1776535000"],"explanation_images":["images/유니온_3권_e094.jpg?v=1776535000"]},{"num":1,"question":"37세 남자가 1년 전 낙상하여 발생한 우측 손목관절 통증을 호소하며 내원하였다. 내원 시 방사선 사진 및 수술장 소견은 다음과 같았고, 주상골 정복이 가능하였다. 가 장적절한치료는?","choices":["경피적 핀 고정술","근위 수근골 절제술","수근관절 유합술","주상월상골간 인대 제건술","후방 관절낭 봉합술"],"answer":4,"explanation":"","reference":"","section":"유니온 4권","chapter":"수부","question_images":["images/유니온_4권_q001.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e001.jpg?v=1776535000"]},{"num":2,"question":"20세 남자 환자가 1일 전 넘어지며 손바닥을 짚었다. 손목 통증을 호소하여 촬영한 방사선 사진 소견이다. Percutaneous screw fixation을 어느 방향으로 하는가?","choices":["1","2","3","4","5"],"answer":2,"explanation":"","reference":"","section":"유니온 4권","chapter":"수부","question_images":["images/유니온_4권_q002.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e002.jpg?v=1776535000"]},{"num":3,"question":"68세 여자 환자가 2년 전 원위 요골 골절로 보존적 치료를 받았다. 방사선 사진은 아 래와 같았다. 70세 여자가 3년 전부터 손목 통증이 있었다. 보존적 치료에도 통증이 지속되었고 영상 검사가 다음과 같을 때 가장 적절한 치료는?","choices":["원위 요골 교정 절골술","사중관절 유합술","척골 단축술","유두골 단축술","Sauve-kapandji procedure"],"answer":3,"explanation":"","reference":"","section":"유니온 4권","chapter":"수부","question_images":["images/유니온_4권_q003.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e003.jpg?v=1776535000"]},{"num":4,"question":"68세 남자가 넘 AL</b>: Achilles tendon Z-plasty 또는 percutaneous triple hemisection (Hoke)","reference":"","section":"유니온 4권","chapter":"소아","question_images":["images/유니온_4권_q086.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e086.jpg?v=1776535000"]},{"num":87,"question":"3시간 전 주관절 외상으로 7세 남아가 방문하였다. 원위 골편이 전위되고 50도 각형 성을 이루었다. 원위 요골동맥 맥박은 정상이었다. 도수정복을 2회 시도한 후 원위 요골동맥 맥박이 사라졌으며 ok signO| 되지 않았다. 이에 대한 적절한 치료는?","choices":["도수정복 후 핀고정","전방접근으로 관혈적 정복 후 핀고정","후방접근으로 관혈적 정복 후 핀고정","장상지 석고고정","외고정기 삽입"],"answer":2,"explanation":"","reference":"","section":"유니온 4권","chapter":"소아","question_images":["images/유니온_4권_q087.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e087.jpg?v=1776535000"]},{"num":88,"question":"60세 여자가 우측 무릎 통증으로 촬영한 MRI에서 종양이 발견되었다. 조직검사 상 osteosarcoma로 진단되었다. Bone scan에서 multiple vertebra와 humerus에 전 이 소견이 있었다. Chest CT에서 폐전이는 발견되지 않았다. 환자의 AJCC 병기는","choices":["I","II","III","IV A","IV B"],"answer":5,"explanation":"정답: 5번 (Stage IV B)<br><br><b>AJCC Bone Sarcoma Staging (8th edition) — 사지 골종양</b><br>- <b>T 분류</b><br>&nbsp;&nbsp;Tx: primary tumor 평가 불가<br>&nbsp;&nbsp;T0: primary tumor 증거 없음<br>&nbsp;&nbsp;T1: tumor ≤ 8 cm<br>&nbsp;&nbsp;T2: tumor > 8 cm<br>&nbsp;&nbsp;T3: discontinuous tumors in primary bone site (skip metastasis)<br>- <b>N 분류</b>: N0 (regional LN metastasis 없음), N1 (있음)<br>- <b>M 분류</b><br>&nbsp;&nbsp;M0: distant metastasis 없음<br>&nbsp;&nbsp;<b>M1a: lung metastasis만</b><br>&nbsp;&nbsp;<b>M1b: 다른 distant site (bone, liver, brain 등)</b><br>- <b>G 분류</b>: G1 (low grade), G2/G3 (high grade)<br><br><b>Stage 분류</b><br>- IA: T1 N0 M0 G1<br>- IB: T2/T3 N0 M0 G1<br>- IIA: T1 N0 M0 G2/G3<br>- IIB: T2 N0 M0 G2/G3<br>- III: T3 N0 M0 G2/G3<br>- <b>IVA: Any T, N0, M1a (lung met만)</b><br>- <b>IVB: Any T, N1 또는 M1b (다른 distant met)</b><br><br><b>본 케이스 분석</b><br>- Multiple vertebra + humerus metastases = <b>bone metastasis (M1b)</b><br>- Chest CT에서 폐전이 없음 → 그래도 M1b이므로 stage 결정<br>- → <b>Stage IV B</b> 정답","reference":"","section":"유니온 4권","chapter":"종양","question_images":["images/유니온_4권_q088.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e088.jpg?v=1776535000"]},{"num":89,"question":"다음 종양(tumor) 중 악성도가 가장 높을 것으로 생각되는 종양은?","question_images":["images/유니온_4권_q100.jpg?v=1776535000"],"choices":["enchondroma","simple bone cyst","non-ossifying fibroma","fibrous dysplasia","chondrosarcoma"],"answer":5,"explanation":"","explanation_images":["images/유니온_4권_e100.jpg?v=1777966647"],"reference":"정형외과학 8th. 1권. P.542.","section":"유니온 4권","chapter":"종양"},{"num":90,"question":"74세 남자가 허벅지 종괴가 만져져서 내원하였다. MRI 사진과 조직검사 사진이다. 적절한 진단은?","choices":["Well differentiated liposarcoma","Myxoid liposarcoma","Dedifferentiated liposarcoma","Myxofibrosarcoma","Leiomyosarcoma"],"answer":3,"explanation":"","reference":"","section":"유니온 4권","chapter":"종양","question_images":["images/유니온_4권_q089.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e089.jpg?v=1776535000"]},{"num":91,"question":"다음 종양 중 예방적 내고정술이 필요한 종양은?","choices":["1","2","3","4","5"],"answer":1,"explanation":"","reference":"","section":"유니온 4권","chapter":"종양","question_images":["images/유니온_4권_q090.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e090.jpg?v=1776535000"]},{"num":92,"question":"타원에서 발목에 만져진 연부조직 종양에 대해 marginal excision을 시행하였다. 조 직 검사에서 myxofibrosarcoma, grade 3로 결과가 나왔다. 향후 치료 계획으로 옳 은 것은?","choices":["경과 관찰","방사선 치료","화학적 항암 치료","광범위 절제술","Marginal excision 재수술"],"answer":4,"explanation":"","reference":"","section":"유니온 4권","chapter":"종양","question_images":["images/유니온_4권_q091.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e091.jpg?v=1776535000"]},{"num":93,"question":"13세 환아가 원위 대퇴골에 골육종으로 neoadjuvant chemotherapy를 시행하였다. 현재 다른 부위로의 전이는 없었다. 환자에게 적절한 치료는?","choices":["Intercalary resection 후 radiation therapy","Intercalary resection 후 chemotherapy","경과관찰","Amputation","Marginal resection"],"answer":2,"explanation":"","reference":"","section":"유니온 4권","chapter":"종양","question_images":["images/유니온_4권_q092.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e092.jpg?v=1776535000"]},{"num":94,"question":"35세 남자가 요통 및 엉치 통증을 호소하여 촬영한 방사선 사진이다. 아침에 일어나 면 요통이 심하고, 활동하면 요통이 호전되었다. 혈액 검사상 rheumatoid factor는 음성, HLA-B27은 양성이었다. 이 환자의 가장 흔한 골격 외 증상은?","choices":["급성 전방포도막염","만성 빈혈","요로 결석","심부전","폐쇄성 폐질환"],"answer":1,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q093.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e093.jpg?v=1776535000"]},{"num":95,"question":"룬 31세의 류마티스 여자 환자가 양쪽 무릎과 발목을 포함한 여려 관절에 부종을 동반 한 통증이 있다. 혈액검사 상 rheumatoid factor는 음성, anti-CCP는 양성이었다. Methotraxate와 leflunomide를 적정 용량으로 6개월 사용중인데 효과가 없었다. 다음으로 사용할 수 있는 약제와 사용 전 필요한 검사는?","choices":["Abatacept / 잠복 결핵 검사","Sulfasalazine / 복부 검사","Celecoxib / 신장 검사","Sulfasalazine / 간수치 검사","Sulfasalazine / 간수치 검사 임상적 적용을 위한 관해의 정의를 미국 및 유럽 류마티스 학회가 다음과 같이 정의하였다."],"answer":1,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q094.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e094.jpg?v=1776535000"]},{"num":96,"question":"53세 남자가 수 일전부터 우측 슬관절 통증 및 부종이 심해 내원하였다. 혈액검사 상 백혈구는 13,200/mm3（정상 4,000-10,000/mm3）였고, ESR 20mm/h（정상 0-10mm/h）, CRP 1.9mg/dl（정상＜0.5mg/dl）, Uric acid 4.2.5mg/dl_ （정상 3.5- 7.2mg/dL） 였다. 관절천자액을 현미경을 봤을 때 아래와 같았다. 원인이 되는 물질 은?","choices":["Uric acid","Calcium pyrophosphate","Xanthine oxide","Calcium oxalate","Steroid"],"answer":2,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q095.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e095.jpg?v=1776535000"]},{"num":97,"question":"57세 환자가 6개월 전부터 허리통증을 호소하여 내원하였다. 체온은 37.5도 이고, 혈액검사에서 ESR 52mm/hr, CRP 2.5mg/dL（정상 : 0.5 이하）, 백혈구 12,800/ mm3, 다형핵호중구 18% 이다. MRI 검사 결과는 아래와 같다. 현재 양측 하지의 감 각 저하와 발목 족배굴곡 근력이 약화되어 있었다. 적절한 치료는?","choices":["경과 관찰","항생제 투여","항결핵제","항결핵제 + 수술적 치료","경막외 스테로이드 주사"],"answer":4,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q096.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e096.jpg?v=1776535000"]},{"num":98,"question":"70세 여자가 골다공증으로 진단받고 3년 전부터 bisphosphonate! 투약하였다. 1 년 전 대퇴 골두 골절이 발생하여 인공 고관절 전치환술을 시행하였다. 수술 당시 골 다공증 검사에서 T-scre -3.1 이여, romosozumab으로 바꾸어 투여 하였다. 금번 외 래 추시에서 골다공증 검사 결과가 T-scre -3.0 이었다. 향후 투약해야 할 골다공증 약은?","choices":["Ca + Vit D","Calcitonin","Denosumab","Teriparitide","Romosozumab"],"answer":3,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q097.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e097.jpg?v=1776535000"]},{"num":99,"question":"K그» ；—~F 자가 건 이식편을 사용하여 관찰 인대 재건술을 시행하였다. 수술 후 관절 사용이 증 가하면서 건 이식편의 길이가 늘어나, 수술직후 보다 관절 안정성이 감소하는 현상 을 설명하기에 가장 적절한 물성은?","choices":["인성(toughness)","응력 집중(stress concentration)","취성(brittleness)","탄성(elasticity)","포복(creep)"],"answer":5,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q098.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e098.jpg?v=1776535000"]},{"num":100,"question":"개방성 골절로 입원한 환자에게 항생제 피부검사를 시행하여 적절한 예방적 항생제 를 투여하였으나, 약물 알레르기 과거력을 확인하지 않고 tramad이을 통증 조절을 위해 투여한 다음 과민성 쇼크(anaphylactic shock)가 발생하였다. 법적 분쟁이 발 생하였다면 의료진은 어떠한 의무를 다하지 못한 것에 대한 책임을 져야 하는가?","choices":["기록 의무","동의 의무","설명 의무","주의 의무","지도 의무"],"answer":4,"explanation":"","reference":"","section":"유니온 4권","chapter":"총론","question_images":["images/유니온_4권_q099.jpg?v=1776535000"],"explanation_images":["images/유니온_4권_e099.jpg?v=1776535000"]},{"num":1,"question":"골다공증 약제 중 조골세포(Osteoblast)의 골형성을 가장 촉진시키는 약제는?","choices":["Bisphosphonate","Estrogen","Romosozumab","SERM","Vitamin D"],"answer":3,"explanation":"골형성을 촉진하는 약제는 PTH, Romosozumab 2가지 입니다. 이전에 Romosozumab에 대해서는 형성 촉진과 흡수 억제를 하는 약물을 묻는 문제가 출제된적 있습니다","reference":"2022 ELITE 총론 329p","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e001.jpg?v=1776535000"]},{"num":2,"question":"금속 삽입물 삽입이 되어있는 상태에서 감염이 일어나면 삽입물 주변으로 ECM(Extracellular matrix)를 형성하여 항생제 치료가 잘 되지 않는 이유는?","choices":["세균 밀도 증가","세균 활성도 증가","세균 독성 증가","항생제 내성","항생제 침투 제한"],"answer":5,"explanation":"21년도 문제로 ELITE 해설 첨부하였습니다.","reference":"2022 ELITE 총론 433p","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e002.jpg?v=1776535000"]},{"num":3,"question":"골다공증 약물 효과에 대한 평가, 다음 중 골흡수 표지자는?","choices":["bone specific ALP","CTX","PINP","osteocalcin","PICP"],"answer":2,"explanation":"","reference":"2022 ELITE, 총론, 292P","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e003.jpg?v=1776535000"]},{"num":4,"question":"20세 남자 무릎의 종창을 주소로 내원하였다. 평소에도 멍이 잘 들었으며 내원하여 시행한 방사선 사진상 연부조직의 종창과 대퇴 과간 절흔이 넓어져 있었다. 질환은?","choices":["류마티스 관절염","골화석증","통풍","신경병성 관절병증","혈우병성 관절염"],"answer":5,"explanation":"","reference":"2023 UNION 1권, 9P","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e004.jpg?v=1776535000"]},{"num":5,"question":"여자 65세 류마티스로 약물 복용 중인 환자로 2주뒤 슬관절 전치횐술 예정이다. 수술을 준비할 때 감염의 위험성이 있어서 수술 전 중단을 고려 해야 하는 약물은?","choices":["Etanercept","Sulfasalazine","Methotrexate","NSAID","Hydroxyquinolone"],"answer":1,"explanation":"","reference":"2023 UNION, 1권 13p","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e005.jpg?v=1776535000"]},{"num":6,"question":"38세 환자 3일전부터 갑작스러운 1st MTP joint의 pain과 swelling이 발생했다. 혈액 검사 상 uric acid 9.1(정상, 3.4-7.2), BUN 25(정상, 8~22), creatinine 1.4(정상, 0.7-1.3) 확인되었다. 현재 환자의 증상을 완화하기 위한 약물은?","choices":["Allopurinol","Febuxostat","Colchicine","Probenecid","Benzbromarone"],"answer":3,"explanation":"30세 남자, 1st MTP joint pain<br>Hyperuricemia<br>Mild azotemia<br>-> Acute gouty attack에서의 치료를 묻는 문제로 Creatinine 1.4로 정상치보다 조금 높은 azotemia로 정상에 가깝습니다. 또한 보기 다) Colchicine 외의 다른 보기는 요산 농도를 조절하는 약물로 급성기에는 오히려 증상을 악화시킬 수 있습니다.<br>유사 문제 2022 Elite vol 2. 총론 p.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e006.jpg?v=1776535000"]},{"num":7,"question":"요양병원에 입원중인 당뇨 기왕력이 있는 70세 남자 환자가 1주 전부터 우측 슬관절 종창 및 열감으로 내원하였다. 2일 전부터는 전신 발열이 있다. 최근 1개월간 우측 슬관절 통증으로 관절 천자술 및 관절강내 주사를 수차례 시행받았다. 관절 천자 상 turbid 한 양상이었고, WBC 80000 (90%) 소견. 혈액 검사상 ESR 40, CRP 14 관찰되었다. 가장 적절한 치료는?","choices":["균주 동정 전까지 cefazolin 정주","균주 동정 전까지 vancomycin 정주","관절 천자 후 관절강내 cefazolin 주사","관절경하 세척술 및 cefazolin 정주","관절경하 세척술 및 vancomycin 정주"],"answer":5,"explanation":"MRSA risk factor 를 보유한 (recent hospitalization, diabetes) 환자의 knee pyogenic arthritis<br>‘세균성 관절염은 급속하게 진행하여 관절을 파괴하고 골수염이 발생할 수 있으므로 관절천자하여 미생물 검사를 시행한 이후에, 원인균이 확인되기 전에 경험적으로 초기 항생제 치료를 시작한다.<br>이는 즉시 변연절제술 및 세척술을 시행해야 하는 정형외과적 응급질환이다.’","reference":"정형외과학 8판 p468-469 Campbell 14판 Ch 22, p845-846","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e007.jpg?v=1776535000"]},{"num":8,"question":"수술실에서 사용하는 손 소독제이다. 그람 양성균, 그람 음성균, enveloped virus, non-enveloped virus 및 진균 등에도 우수한 효과를 보이고, 효과가 가장 빨리 나타나는 약물은?","choices":["alcohol","chloroxylenol","chlorhexidine","hexachlorophene","Iodophors"],"answer":1,"explanation":"Alcohol 이 보기 중에서 그람 양성, 그람 음성 bacteria, enveloped / non-enveloped virus, mycobacterium, fungus 에 모두 effect 가 있으면서 speed of action 이 fast 인 유일한 약제이다","reference":"Elite 2022 p.432","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e008.jpg?v=1776535000"]},{"num":9,"question":"12세 여아가 연소기 tillaux fx. 가 있다. CT 상 2mm 전위가 관찰될 때 골절부위에 감입된 구조물은?","choices":["전경골건 tibialis anteior","장무지신전건 Extensor hallucis longus","장족지신전건 Extensor digitorum longus","전방 관절막 anterior capsule","전하방경비인대 anterior inferior tiofibular ligament"],"answer":4,"explanation":"","reference":"대한정형외과학 8판 p1955","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e009.jpg?v=1776535000"]},{"num":10,"question":"8세 여아가 보행장애를 주소로 내원하였다. myelomeningocele 로 출생 시 수술받았던 과거력이 있는 환자로 이에 관여하는 예후 인자는?","choices":["meningomielocele 발생 위치","진단 시기","임신 당시 folate 복용 여부","임신 당시 valproate 복용 여부","임신 중 AFP 수치"],"answer":1,"explanation":"2021년 야마와 동일합니다.<br>22년도 elite 총론 p533","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e010.jpg?v=1776535000"]},{"num":11,"question":"8세 남자 환아 좌측 견관절이 우측에 비해 위로 올라가 있다. 견관절 외전이 감소되었고 근력은 정상이었다. 척추 측만각은 9도 이며, 다른검사상 이상소견은 없었다. 환자의 진단명으로 가장 적합한 것은?","choices":["유소년 특발성 측만증","선천성 견갑골 상승","익상 견갑골","근무력증","상완신경총 마비"],"answer":2,"explanation":"(21B 문제와 거의 유사합니다)<br>엘리트 (총론) Congenital anomaly of neck and scapular<br>2차 대비 사진","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e011.jpg?v=1776535000"]},{"num":12,"question":"우측 선천성 근성 사경으로 SCM muscle에 bipolar release를 시행한 환아에서 우측 견관절의 외전이 제한되었다. 가장 의심되는 신경 손상은?","choices":["근피 신경","견갑상 신경","액와 신경","장흉 신경","척추 부 신경"],"answer":5,"explanation":"(10년도 엘리트 문제와 거의 비슷)<br>엘리트 (척추) Pediatric cervical spine<br>선천성 근성 사경<br>환측 얼굴 발달 지연, 환측 후두부 돌출, 종괴덩어리 SCM 하방 1/3, 굴신은 제한 X, 약 20%에서 DDH 동반<br>1세 이전의 보존적 치료는 우수한 결과 (고개를 건측으로 기울이고, 환측으로 얼굴을 돌려서 stretching, 수술은 bioplar release)<br>OP시 spinal accessory nerve 조심 (SCM 근위 mastoid 부착부 절개시 / SCM, trapezius / 견갑골 외측과 하방으로 전위, 90도 이상의 외전과 굴곡이 어려움)<br>2차대비 사진","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e012.jpg?v=1776535000"]},{"num":13,"question":"생후 2개월 남아 족부변형으로 내원하였다. 진단 위하여 최대 족저굴곡, 족배굴곡 족부 측면 촬영을 시행하였다. 족저굴곡 사진 상에 거골의 축이 제 1중족골의 축 아래로향하였으며, 족배굴곡 사진에서는 거골과 종굴이 족저굴곡 되어있었다. 다음 중 진단은?","choices":["선천성 만곡족","선천성 수직 거골","선천성 종외반족","선천성 중족골 내전","유연성 편평족"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e013.jpg?v=1776535000"]},{"num":14,"question":"생후 2개월 남아가 발달성 고관절 이형성증으로 진단받아 파블릭 보장구 치료시작하였다. 착용 후 고관절을 내전하여 무릎을 맞닿으려고 했을 때 양쪽 무릎이 붙었다. 보조기를 어떻게 조절해야하는가?","choices":["anteromedial strap을 길게","anteromedial strap을 짧게","posterolateral strap을 길게","posterolateral strap을 짧게","shoulder strap을 짧게"],"answer":4,"explanation":"Union 2022년도 BOARD 1 차 11번 문제 거의 그대로 나왔습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e014.jpg?v=1776535000"]},{"num":15,"question":"18개월 환아가 DDH로 내원하였다. 관혈적 정복술 계획 시 변형된 비구로 인해 좁아진 비구 내 용적을 넓히기 위해 절개하는 해부학적 구조물은?","choices":["내전근","봉공근","서혜인대","횡비구인대","장요근"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e015.jpg?v=1776535000"]},{"num":16,"question":"5개월 환아가 clubfoot 재발하여 내원하였다. 태생 직 후 ponseti 도수정복술로 교정하였으나 Dennis Browne 보조기를 잘 착용하지 않았다고 한다. 적절한 치료는?","choices":["광범위 후방 유리술","후내방 유리술","전경골근건 이전술","Ponseti 도수정복술 재시도","Dennis Browne 보조기 착용"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e016.jpg?v=1776535000"]},{"num":17,"question":"골형성부전증 환아 대퇴이 수차례 골절로 금속정과 금속판으로 수술 받았습니다 골 유합 후 조치는??","choices":["금속정만 제거","금속판만 제거","둘다제거","둘다 제거 후 보조기","제거하지 않는다"],"answer":2,"explanation":"?? (부정확)<br>논문 찾아보다가 이 구절을 통해서 plate 만 removal 하면 되지 않을까 생각해봤습니다<br>추가로 더 찾아 보겠습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e017.jpg?v=1776535000"]},{"num":18,"question":"가성 연골 무형성증 환아에서 신연골 성형술시 발생할 문제점은?","choices":["관절면 퇴행성변화","신체 불균형 악화","신전 변화","외반 변화","외회전 변화"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e018.jpg?v=1776535000"]},{"num":19,"question":"골화석증(osteopetrosis) 환자의 근위 대퇴골 골절에서 발생하는 흔한 기형은?","choices":["전반고(coxa flexa)","내반고(coxa vara)","거대고(coxa magna)","외반고(coxa valga)","편평고(coxa plana)"],"answer":2,"explanation":"2021 엘리트 총론 – osteopetrosis : 병적 골절이 발생할 수 있으며, coxa vara가 가장 흔한기형이라고 나옵니다.<br>관련문제 첨부 : 2021 엘리트 – osteopetrosis : page 344<br>ELITE 문제에 대한 해설 : 보기 (다)는 틀린 항목으로 가장 흔한 변형은 coxa vara이다.<br>관련문제 : 2021 엘리트 – osteopetrosis , page 341","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e019.jpg?v=1776535000"]},{"num":20,"question":"LCP 방사선 검사에서 가정먼저 나타나는 소견?","choices":["crescent sign","gage sign","sagging rope sign","bicompartementation","diffuse metaphyseal reaction"],"answer":1,"explanation":"2022 elite 소아 p74 문제 변형. 답 : 1<br>편집자 : 보기 지문이 한글로 나왔던걸로 기억합니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e020.jpg?v=1776535000"]},{"num":21,"question":"13세 남아 2개월전부터 고관절 통증 호소, 2일전부터 목발을 짚고서도 체중부하를 할수 없을정도의 통증 호소, 대퇴골두 골단 분리증이 확인되었으며, 정복없이 골단에 수직으로 핀고정술을 시행했다. 이 환아에서 대태골두 무혈성 괴사 발생 가능성의 가장 중요한 위험인자는 무엇인가.","choices":["남아","13세","in situ pinnging","체중부하 불가능","onset(2개월 경과)"],"answer":4,"explanation":"2022 elite 소아 p115 문제 변형, 뚱뚱이 아기에서 보통 아기가 됐네요.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e021.jpg?v=1776535000"]},{"num":22,"question":"12세 여아가 다리가 휘어보이고 걸을 때 무릎이 부딪힌다. 신체검사상 대퇴골 내회전 80/80, 외회전 15/15, 대퇴-족부각(thigh-foot angle) 10/10 측정되었고, 발뒤꿈치 이분선(heel bisector line)이 제2-3족지 사이를 통과하였다. 적절한 치료는?","choices":["경골 외회전 절골술","내측 설상골 절골술","대퇴골 감염 절골술(femoral derotation osteotomy)","입방골 쐐기 절골술","종골 연장 절골술"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e022.jpg?v=1776535000"]},{"num":23,"question":"17세 flexible flatfoot인 환자 Heel valgus & tarsonavicular joint subluxation시 수술은?","choices":["Gleich operation","Medial calcaneal sliding osteotomy","Muiller operation","Subtalar arthrodesis","거골하 관절 후방에서 절골하여 후방 골편을 하방으로 내려 궁을 재건"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e023.jpg?v=1776535000"]},{"num":24,"question":"7세 남아 후외측 완전 전위 상완골 골절이 있다. 신체검사에서 제 2수지 원위지골 굴곡이 안되었다. 손상된 신경은?","choices":["근피신경","요골신경","전방골간신경","척골신경","후방골간신경"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e024.jpg?v=1776535000"]},{"num":25,"question":"8세 남아 6개월 전 과상부 외과 골절로 8주 부목 고정을 시행하였다. 주관절을 움직일 때 통증이 있으며, 방사선 검사에서 주관절 외과 불유합이 관찰되었다. 가장 적절한 치료는?","choices":["관혈적 정복 + 내고정","관혈적 정복 + 내고정 + 골이식","석고 고정","정복 없이 내고정","정복 없이 내고정 + 골이식"],"answer":5,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e025.jpg?v=1776535000"]},{"num":26,"question":"10살 남아가 다친 후 발생한 요골 원위부 골절 (S-H type 2) 로 도수정복 및 석고고정을 시행하였다. 3주간 추시 후 시행한 방사선 검사 상 전후방 10도 측방 15도 각형성이 되었을때 치료로 옳은 것은?","choices":["관혈적 정복술 및 금속판 고정술","관혈적 정복술 및 핀고정술","도수정복 및 석고 고정술","도구정복 및 핀고정술","경과 관찰"],"answer":5,"explanation":"작년, 14년도 기출.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e026.jpg?v=1776535000"]},{"num":27,"question":"하지 골단부 손상으로 성장장애 중 하지 길이 차이가 가장 많이 생기는 부위는?","choices":["경골 근위부","경골 원위부","대퇴골 근위부","대퇴골 원위부","비골 근위부"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e027.jpg?v=1776535000"]},{"num":28,"question":"후관절 증후군 환자에서 신경차단술 시행시 목표하는 신경으로 후관절 관절막을 지배하는 신경은?","choices":["branch of sympathetic ramus","gray ramus communicans","medial branch of dorsal ramus","sinuvertebral nerve","ventral primary ramus"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e028.jpg?v=1776535000"]},{"num":29,"question":"측만증 정도를 확인하려 한다. Cobb’s angle 을 이용하여 확인하려 할때, 가장 먼저 확인해야 하는 것은?","choices":["apical vertebra(e)","C7 plumb line","Central Sacral Vertebral line","End Vertebra(e)","Stable Vertebra(e)"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e029.jpg?v=1776535000"]},{"num":30,"question":"정상 요추 전만에 가장 크게 기여하는 분절은?","choices":["제 1-2 요추간","제 2-3 요추간","제 3-4 요추간","제 5요추- 제1 천추간","[보기 5 - 누락]"],"answer":5,"explanation":". 기출","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e030.jpg?v=1776535000"]},{"num":31,"question":"눈물 모양 골절 (Teardrop fracture)이 나타나는 하위 경추 손상 기전은?","choices":["수직 압박","신연 굴곡","신연 신전","압박 굴곡","압박 신전"],"answer":4,"explanation":"엘리트 문제, 정확히는 13년도 intraining 복붙 문제입니다. 경추에서 Teardrop fracture을 유발하는 손상 기전은 Compressive flexion type 3입니다.","reference":"엘리트 척추 p. 443","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e031.jpg?v=1776535000"]},{"num":32,"question":"50세 여자 환자 요추 5번 - 천추 1번 협부형 전방전위증 및 협착으로 하지저림 및 근위약 발생하였다. 약화되었을 가능성이 가장 높은 근육은?","choices":["대퇴사두근","슬괵근","전경골근","중둔근","항문괄약근"],"answer":4,"explanation":"엘리트 문제 변형입니다. SPLT 협부형의 경우 위엣 level nerve root가 눌리게 되는데, 본 문제에서는 L5에 해당하게 되겠습니다. L5 nerve root 이환 시 마비되는 근육에는 gluteus medius, EHL, EDL이 있습니다.","reference":"엘리트 문제변형 (Elite 척추 p. 192)","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e032.jpg?v=1776535000"]},{"num":33,"question":"보상기전 되는 숨겨진 시상 불균형 (hidden saggital imbalance)에서 정상적인 radiologic 소견은?","choices":["Long femur axis","Pelvic tilt","Sagittal axial line","Lumbar lordosis","Thoracic kyphosis"],"answer":3,"explanation":"편집자 : 3번 보기가 C7 sagittal vertical axis라고 기억합니다..<br>척추외과학 2권","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e033.jpg?v=1776535000"]},{"num":34,"question":"선천성 scoliosis 에서 신경학적 증상 나타날 가능성 큰 임상양상은?","choices":["미분절 척추","단분절 반척추","말발굽 모양의 신장기형","척추 배부 털이 있는 모반","심장중격기형"],"answer":4,"explanation":"< 해설 추가>","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e034.jpg?v=1776535000"]},{"num":35,"question":"흉추 황색인대 골화증으로 척수증이 발생한 환자에서 감압술(후궁 절제술) 수술을 시행하였다. 수술 중 척수 마비 감시를 위하여 시행할 수 있는 검사는 무엇인가?","choices":["운동 신경 속도 검사","감각 신경 속도 검사","SSEP","MEP","needle"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e035.jpg?v=1776535000"]},{"num":36,"question":"골성장이 2년 이상 남은 청소년 특발성 흉추 측만증 환자에서 보조기 치료의 좋은 예후 인자는 무엇인가?","choices":["이중 흉추 만곡","유연성 30퍼센트 만곡","만곡 첨부가 5번 흉추 이상의 측만","흉요추 25도 측만","흉추 전만 15도인 단독 측만"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e036.jpg?v=1776535000"]},{"num":37,"question":"골다공증이 있는 75세 여자가 낙상하면서 흉추 12번과 요추1번 압박골절이 발생해서 추체성형술을 받았다. 술 후 2일째 흉통과 함께 심근효소수치가 상승하여 시행한 심장초음파에서 심장내 이물질이 보였다. 가장 가능성이 높은 원인은?","choices":["골시멘트의 세포독성","골시멘트의 동맥내 누출","골시멘트의 신경관내 누출","골시멘트의 정맥내 누출","골시멘트의 추간판내 누출"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e037.jpg?v=1776535000"]},{"num":38,"question":"54세 남자가 10개월 전부터 손놀림이 어눌해지고 걸음이 불안정해졌다. 이두근 및 상완요골근 심부건반사가 항진되고 hoffman sign 양성이다. 영상검사에서 제 4 경추부터 제 6 경추까지 퇴행성 척추증(spondylosis)으로 척수압박이 있었고 해당 분절에 15도의 후만변형이 있었다. 가장 적절한 치료는?","choices":["신경차단술","약물치료","전방 감압 및 유합술","후궁 성형술","후방 감압 및 유합술"],"answer":3,"explanation":"2022 엘리트 척추 245-246p<br>->C4-5, C5-6 2분절 경추 척수 압박있고 cervical myelopathy 증상있어 수술적 치료 필요. 2 분절이고 10도 이상의 kyphosis가 동반되어 후궁성형술 및 후방 감압, 유합술은 할 수 없어 전방 감압술 및 유합술 이라 생각됩니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e038.jpg?v=1776535000"]},{"num":39,"question":"60세 여환 제3-6 황색인대 골화증으로 인한 척수증에 대해 후궁성형술 예정이다. 술 후 발생할 수 있는 근력 저하 소견 중 가능성이 높은 것은?","choices":["견관절 외전력","견관절 외회전력","수근관절 신전력","주관절 굴곡력","주관절 신전력"],"answer":1,"explanation":"견관절 외전력<br>→후방 접근 치료의 합병증으로 C5 root palsy가 가장 흔하게 발생한다. C5 nerve가 Deltoid m. Innervation 하기에 견관절 외전 제한을 유발한다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e039.jpg?v=1776535000"]},{"num":40,"question":"35세 남환 2일전부터 하지 감각 이상, 심한 방사통, 대소변 장애 발생하였다. 이학적 검사상 trendelenberg gait 및 trunk tilt 소견 보인다. MRI 상 L4-5 추간판 탈출증 확인된다. 응급수술이 필요한 소견은?","choices":["대소변 장애","하지 감각 이상","심한 방사통","Trendelenberg gait","Trunk tilt"],"answer":1,"explanation":"대소변 장애<br>이전 족보 문제는 아닌 듯 합니다. 다른 증상들은 추간판 탈출증 만으로도 발생 가능하지만 대소변 장애는 Cauda equina synd.과 관련된 증상으로 이에 응급 수술이 필요할 것으로 사료됩니다.<br>엘리트에서 L-spine HNP 파트 참고하였습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e040.jpg?v=1776535000"]},{"num":41,"question":"제6,7번 경추 골절 탈구 수상 후 24시간 뒤 하지마비, 혈압 70 맥박45회 수액치료 후 중심정맥압은 회복되었으나 수축기혈압은 지속 낮을때 다음처치는?","choices":["수혈","스타킹","아트로핀","도부타민","메틸프레드니솔론"],"answer":4,"explanation":"Elite 척추 172p 비슷한 문제 첨부합니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e041.jpg?v=1776535000"]},{"num":42,"question":"하부 요추 동적 안정화 구조물 중 단일면적당 근섬유 갯수가 가장많은것은?","choices":["multifidus","quadratus lumborum","Rectus abdominis","transeverse abdominis","longisimus"],"answer":1,"explanation":"엘리트에스 정확한 reference를 찾지 못했습니다 ㅠㅠ<br>논문중에 아래 도표가있어 첨부합니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e042.jpg?v=1776535000"]},{"num":43,"question":"61세 남자 8개월간 점점 악하되는 손의 운동 장애 및 보행장애로 병원에 왔다 진찰 소견상 감각이상은 없었으나 혀의 섬유속성 연축(fasciculation) 이 관찰되었다. 가장 가능성 높은 진단은?","choices":["경추 척수증","경추 추간판 탈출증","근위축성 외측 경화증","다발성 경화증","다발성 골수종"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e043.jpg?v=1776535000"]},{"num":44,"question":"경추 경막외 스테로이드 주사시 사지마비 등 심각한 신경학적 합병증이 보고된 방법 (A)과 손상되는 구조물 (B) 이 가장 적절한것은?","choices":["A: interlaminar inj. B: Dura","A: interlaminar inj. B: epidural vein 3 A: interlaminar inj. B: cervical root","A: Transforaminal inj. B: radicular artery","A: Transforminal inj. B: symphathetic chain 답","T1 coronal"],"answer":4,"explanation":"족보와 엘리트 문제와 보기 모두 동일하게 나왔습니다. C-spine epidural inj.에선 transforaminal inj.시 radicular & vertebral a. 의 손상이 될수 있기때문에 후하방으로","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e044.jpg?v=1776535000"]},{"num":45,"question":"Lumbar MRI에서 foraminal stenosis를 가장 잘 보여주는 영상은?","choices":["T1 saggital","T1 coronal","T2 coronal","T2 saggital","T2 axial"],"answer":1,"explanation":"Ref)Campbell 14th, Chapter 39 1775p<br>Sagittal T1-weighted images are evaluated with particular attention focused on the foramen. An absence of normal fat around the root indicates foraminal stenosis.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e045.jpg?v=1776535000"]},{"num":46,"question":"Patrick test 시행 시 고관절 굴곡에서 신전 과정에서 통증 발생은 무엇이 변하기 때문인가?","choices":["관절낭 두께","관절 내 압력","연골 압력","비구순 단면적","원형인대 긴장도"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e046.jpg?v=1776535000"]},{"num":47,"question":"대퇴근막 장근 – 봉공근 사이로 접근하여 인공 고관절 치환술을 할 때 주의해야 되는 신경은?","choices":["Femoral nerve","Lateral femoral cutaneous nerve","Sciatic nerve","Obturator nerve","Peroneal nerve"],"answer":2,"explanation":"작년 기출 문제, 엘리트 첨부합니다","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e047.jpg?v=1776535000"]},{"num":48,"question":"고도 결합 폴리에틸렌 제조과정에서 유리기를 제거할 수 있으나, 결정화를 감소하여 파괴인성을 약화시켜 비구컵 마모와 같은 합병증을 유발할 수 있는 것은?","choices":["Annealing","Electron-beam irradiation","Gamma irradiation","Remelting","Vit E soaking"],"answer":4,"explanation":"작년 기출문제, Union 첨부합니다","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e048.jpg?v=1776535000"]},{"num":49,"question":"32세 여자환자가 고관절 통증을 호소하였다. X-ray상 Lateral center edge angle 10도, Tonnis angle 20도, False profile view상 anterior center edge angle 10도 였다. 비구 절골술을 시행할 때 회전 방향은?","choices":["전방","전내방","전외방","후방","후외방"],"answer":3,"explanation":"전외방 (보기 순서는 바뀔 수 있겠습니다)<br>*3가지 지표들이 anterior & lateral coverage가 부족함을 나타내고 있습니다. 원래는 32세이므로 먼저 좀더 congruent하게 만들 수 있는지를 확인해서 reconstructive osteotomy or salvage osteotomy를 선택해야겠지만 문제에서는 reconstructive ostomy의 방향을 묻고 있습니다. Ganz osteotomy가 해당되겠습니다.","reference":"2022 Elite 고관절 p123","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e049.jpg?v=1776535000"]},{"num":50,"question":"다음 X-ray view중 Femur head – neck junction에서 spherecity를 평가하기 위한 view는?","choices":["Modified Dunn view","Frog leg view","IR 15도 Hip AP view","False profile view","Lowen lateral view"],"answer":1,"explanation":"Anterior head-neck offset ratio는 cross-table lateral에서 구하지만 head and neck junction에서spherecity를 판단할 때 Dunn view를 봅니다","reference":"2022 Elite 고관절 p43 Pascual-Garrido, Cecilia et al. “Arthroscopic Fixation of Os Acetabuli Technique: When to Resect and When to Fix.” Arthroscopy techniques vol. 5,5 e1155-e1160. 10 Oct. 2016,","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e050.jpg?v=1776535000"]},{"num":51,"question":"50세 남자환자로 주로 오랫동안 앉아있을때, 차에서 내릴때 발생사는 서혜부 통증으로 내원하였다. 신체검진에서 고관절 굴곡 내회전 내전시에 서혜부통증 악화되었다. 진단은?","choices":["대퇴비구충돌증후군","이상근 증후군","External snapping hip","대전자 점액낭염","중둔근 건염"],"answer":1,"explanation":"Femoroacetabular impingement syndrome<br>2022 ELITE p.55(다빈도 기출)","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e051.jpg?v=1776535000"]},{"num":52,"question":"서혜부 통증을 주소로 내원한 환자, 고관절의 굴곡 외전 외회전 상태에서 신전 내전 할때 탄발음과 함께 통증이 발생하였다. 이 통증의 원인이 되는 근육은?","choices":["대퇴직근","봉공근","대둔근","장경대","장요근"],"answer":5,"explanation":"Internal snapping<br>2022 기출문제(2022년도에는 시행해야할 검사는? -> 초음파 로 나옴)<br>2022 ELITE p.150","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e052.jpg?v=1776535000"]},{"num":53,"question":"40세 여자환자 6주전부터 우측 고관절통증이 있었다. 계단 오르내릴 때 악화되었으며 x-ray상 이상소견 없었고 MRI에서 골두에서 전자간까지 골수부종 있었으며 연골하 골절은 없었다. 올바른 치료는?","choices":["경과관찰","관절강내 약물주사","근위 대퇴 절골술","대퇴골두 감압술",""],"answer":1,"explanation":"Transient osteoporosis of hip. 연골하 골절(subchondral fracture)이 없고 BME만 있는 경우 자연 회복되므로 경과관찰이 답이다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e053.jpg?v=1776535000"]},{"num":54,"question":"고관절 관절경에서 중심구획과 주변구획으로 나뉜다. 중심구획에서 관찰되는 구조물은?","choices":["medial synovial fold","femur neck","zona orbicularis","retinacular artery","transverse acetabular ligament"],"answer":5,"explanation":"5번","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e054.jpg?v=1776535000"]},{"num":55,"question":"좌측 고관절 골관절염으로 인공관절 전치환술을 받은 환자분입니다. 수술 후 우측의 하지 부동의 불편감을 호소하고 있어 시행한 wood block 검사상 우측 2cm의 wood block을 apply하였을 때 불편감이 해소 되었다. 수술 전 시행한 엑스레이 검사상 다리 길이의 차이는 보이지 않았으나, 수술 3개월째 시행한 엑스레이 검사상 pelvic obliquity와 좌측 하지의 3mm 하지 길이 차이 소견이 보였다. 다리길이 차이에 대한 적절한 처치는 무엇인가?","choices":["우측 10mm 깔창","우측 20mm 신발굽","대전자 이전술","좌측 abductor muscle stretching","좌측 short neck으로 변경"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e055.jpg?v=1776535000"]},{"num":56,"question":"8년전 우측 고관절 전치환술을 시행받은 환자로 46mm 비구컵은 유지한 채로 femoral component만 revision을 예정이다. 대퇴 스템 치환시 탈구를 막기 위하여 가장자리가 둘출된 비구 라이너 (elevated liner), 스커트형 대퇴골두, high offset 의 긴neck의 28mm head를 사용하였으며, 대퇴 경부 단면은 circular한 stem을 상요하려고 한다. 이때, 충돌을 줄일 수 있는 인자와 관련된 것은 무엇인가?","choices":["Elevated liner","Skirted femoral head","Long neck","대퇴 경부단면이 circular 한 stem","28mm head"],"answer":3,"explanation":"2022 ELITE P.442 : 매우 유사한 문제가 있습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e056.jpg?v=1776535000"]},{"num":57,"question":"금속 골두를 이용한 인공 고관절 전치환술에서 탈구 감소와 수술 후 관절 운동 범위 증가를 위한 변화이다. 다음 변화 시에 문제점은? 인공골두 크기 증가 대퇴 경부 테이퍼 길이 감소 대퇴 경부 테이퍼 직경 감소","choices":["비구컵 충돌","라이너 마모","스템 골절","스퀴킹","간극 부식"],"answer":5,"explanation":"Taper가 짧고 얇을수록","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e057.jpg?v=1776535000"]},{"num":58,"question":"인공고관절 전치환술 후 근위개톼부에 응력방패 발생 가능성이 가장 높은 대퇴 스템은?","choices":["Single wedge stem","Distal fitting stem","Short stem","Modular stem","Anatomical stem"],"answer":2,"explanation":"2022 기출문제<br>고관절학 2판 p.461~462","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e058.jpg?v=1776535000"]},{"num":59,"question":"8년전 좌측 고관절 인공관절 전치환술 시행하였다. 발생한 좌측 고관절 통증으로 영상 검사 시행하였다. 영상검사 상 세라믹 라이너의 골절이 확인되었다. 이에 시행할 가장 적절한 관절면 조합은?","choices":["ceramic on ceramic","ceramic on metal","ceramic on polyethylene","metal on metal","metal on polyethylene"],"answer":1,"explanation":"ELITE MATERIAL PART.<br>ceramic fracture 에서 stem을 재치환하지 않고 revision 시 관절면 내의 남아있는 ceramic 입자에 의해 3rd body wear 유발할 수 있으므로 metal 과 Polyethylene은 금기.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e059.jpg?v=1776535000"]},{"num":60,"question":"15년 전 고관절인공관절 치환술 치르고 최근 발생한 고관절부 통증으로 시행한 방사선검사상 비구컵과 대퇴스템의 이완 발견되어 재치환술 계획하였다. 옳은 순서는? (① 비구컵 제거 ② 비구컵 치환 ③ 대퇴스템 제거 ④ 대퇴스템 치환)","choices":["①-②-③-④","①-③-②-④","③-①-②-④","③-④-①-②","③-①-④-②"],"answer":3,"explanation":"기출. 기존 다섯개 보기에서 네개 보기로 바뀌었습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e060.jpg?v=1776535000"]},{"num":61,"question":"건강한 78세 여환으로, 낙상 후 발생한 우측 고관절 통증으로 시행한 방사선 검사상 우측 대전자부 골절과 소전자부의 큰 견열골절과 후내방피질골의 분쇄가 확인되는 불안정골절 소견이 있었다. 수술시 해부학적 정복 불가하였다. 적절한 처치는?","choices":["근위골편 전내측 피질 정복","근위골편 후외측 피질 정복","내반 고정","외반 고정","소전자 정복"],"answer":1,"explanation":"기출. 소전자 견열골절은 불안정이 아니라는 것이 포인트인 것 같습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e061.jpg?v=1776535000"]},{"num":62,"question":"골다공증 병력의 78세 여자환자, 낙상 후 발생한 우측 고관절 통증으로 시행한 방사선검사상 안정형 전자골절 확인되었다. 압박고나사 고정 술 시행 중 외측 피질부 분쇄 발생하였다. 적절한 처치는?","choices":["환형나사 고정","골이식","관혈적 정복술","대퇴내정 삽입","다발성핀고정술"],"answer":4,"explanation":"기출. Trochanteric stabilizing plate도 사용 가능함을 알고 계시면 좋겠습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e062.jpg?v=1776535000"]},{"num":63,"question":"슬관절 관절경 후내측 삽입구를 만드려고 한다, 슬관절 전외측 삽입구를 통해 후내측 구획으로 진입한다. 슬관절 굴곡 각도(A)와 진입하는 구획의 구조물(B)의 조합은?","choices":["50도 / 대퇴 내과 연골과 후방십자인대 사이","50도 / 전방십자인대와 대퇴 외과 연골 사이","100도 / 대퇴 내과 연골과 후방십자인대 사이","100도 / 전방십자인대와 대퇴 외과 연골 사이","100도 / 전방십자인대와 후방십자인대 사이"],"answer":1,"explanation":"Psteromedial portal(PM)<br>표준 위치는 슬관절을 90º 굴곡시키고 관절강을 최대한 팽창시킨 상태에서 대퇴 내과 후내측 연 가까이에서 경골 후내측 관절면의 1 cm 상방 1cm 후방에 위치한다. 관절경을 전외측 삽입구로 삽입한 이후 슬관절을 45-60º 굴곡시킨 상태에서 대퇴 내과와 후방십자인대 사이로 과간 절흔을 경유하여 관절경을 후내측 구획으로 통과시킨다. 골극, 활액막염이나 반흔 조직은 관절경의 진입을 방해할 수 있으며 제한된 과간 절흔 성형술(notchplasty)이 필요할 수도 있다. 관절경이 후내측 구획으로 들어간 후에는 슬관절을 90º로 굴곡시키고 투시(transillumination)방법으로 복재 정맥(saphenous vein)을 확인한다.","reference":". 슬관절 관절경의 삽입구, 대한관절경학회지 제 16 권 제 1 호 2012, Journal of Korean Arthroscopy Society abbreviation(by Index Medicus): J Korean Arthrosc Soc Volume 16, Number 1, February, 2012","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e063.jpg?v=1776535000"]},{"num":64,"question":"한달 전 항법장치를 이용한 슬관절 전치환술을 시행한 환자가 넘어진 후 대퇴골 통증이 발생했다. 방사선 검사 상 항법장치를 고정한 핀 삽입 부위에서 대퇴 원위부 횡골절이 발생하였다. 골절과 관련된 생역학적 특성은?","choices":["등방성 (Isotropy)","연성 (Ductility)","응력집중 (Stress Concentration)","점탄성 (Viscoelasticity)","취성 (Britleness)"],"answer":3,"explanation":"ELITE 총론 1.Mechanical properties of materials<br>유사문제 p24","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e064.jpg?v=1776535000"]},{"num":65,"question":"TKA 시행 후 슬관절 외측 부위의 감각 저하 소견이 관찰되었다. 손상된 신경은?","choices":["Tibial nerve","Anterior branch of femoral nerve","Infrapatellar branch of saphenous nerve","Lateral cutaneous branch of sural nerve","common peroneal nerve"],"answer":3,"explanation":"Ref)슬관절학 3판 2권. P1116~1117<br>슬개골 상부로 절개선이 길수록 대퇴부의 피부신경 분지가 손상을 많이 받아 수술 후 감각저하가 올 가능성이 크다. 한편, 복재신경의 슬개하분지(infrapatellar branch of saphenous nerve)는 경골결절까지 절개선을 넣는 경우 손상이 불가피하다. 간혹 수술 후 피부감각 저하를 호소하지 않는 환자들도 있는데, 이는 신경 분포의 변이성 때문이거나 하퇴의 외측피부신경(lateral cutaneus nerve)과 지배 영역이 겹쳐지기 때문이다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e065.jpg?v=1776535000"]},{"num":66,"question":"TKA 시행하는 도중 Anterior referencing으로 측정하였을 때 femur compenent가 2번이랑 3번 중간에 위치하였을 때 2번으로 resection 시행하였다. 이 때 발생할 수 있는 문제를 해결할 수 있는 방법은?","choices":["경골 후방경사 증가","근위 경골 추가 절제","얇은 폴리에틸렌","원위 대퇴골 금속 보강물","후방 관절막 절제"],"answer":5,"explanation":"Ant. referencing에서 2번을 선택하면 Flexion gap이 loose하게 됩니다. 이를 해결하는 방법으로 flexion gap이 loose한 것을 맞추려고 PE를 두꺼운 것을 선택할 때 extension gap이 tight해지므로 이를 해결해주어야 합니다. 후방관절막 절제만 가능한 보기였습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e066.jpg?v=1776535000"]},{"num":67,"question":"70세 여자환자 1년 전 양측 슬관절 전치환술 시행 받았다. 우측 무릎 불안정성 호소하며 관절운동범위는 0-135도 였다. 전후방 방사선 검사에서 좌측에 비해 작은 대퇴 삽입물과 두꺼운 폴리에틸렌 삽입물을 사용하였다. 우측 무릎 관절면은 대퇴골 외상과에서 15mm 원위부에 위치하였다. 무릎 굴곡 30도 위치의 측면 방사선 사진에서 관찰되는 소견은?","choices":["Insall-Salvati ratio 감소 Blackburne-Peel ratio 감소","Insall-Salvati ratio 감소 Blackburne-Peel ratio 정상","Insall-Salvati ratio 정상 Blackburne-Peel ratio 감소","Ins/all-Salvati ratio 정상 Blackburne-Peel ratio 증가","Insall-Salvati ratio 증가 Blackburne-Peel ratio 정상"],"answer":1,"explanation":"? (잘 모르겠습니다. 아시는 분 도움 부탁 드립니다.)<br>joint line 상승으로 patella baja 생겨 Insall-Salvati ratio 감소 Blackburne-Peel ratio 감소한다고 생각했습니다.<br>편집자 해설 : 3<br>Pseudo-patella-baja<br>작은 대퇴삽입물과 두꺼운 폴리에틸렌 삽입물로 인해 Joint line elevation 되어있는 상태<br>Insall-Salvati ratio = patella inf tip~tibial tuberosity 거리 / patella 길이<br>Blackburne-Peel ratio = patella articular surface inferior tip~joint line/patella 길이<br>I-S ratio는 해부학적 구조물에 의해 만들어지는 비율로 변하지 않겠지만 B-P ratio는 TKA로 인하여 joint line elevation이 되었으므로 감소할거라 생각합니다..<br>위 내용을 요약하자면 IS ratio로만 patella baja를 계산하니 위음성이 있었고, BP index를 사용하니 이러한 측정오류가 감소하였다. 그러니 BP index도 같이 써야한다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e067.jpg?v=1776535000"]},{"num":68,"question":"무릎 관절에서 10도 과신전, 후방불안정성 있으며 단순 방사선 검사에서 Kellgren lawrence grade IV의 관절염 소견 보이는 환자에서 슬관절 전치환술 시행 계획이다. 과신전에 대한 대처 술식으로 가장 적절한 것은?","choices":["경골 후방 경사 증가","내반-외반 구속형 치환물 삽입","내측측부인대 유리술","대퇴골 후방 절제 증가 및 두꺼운 폴리에틸렌 삽입물 사용","대퇴골 원위 절제 감소"],"answer":5,"explanation":"2022 1차 기출문제 그대로 나왔습니다. 유니온 해설입니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e068.jpg?v=1776535000"]},{"num":69,"question":"슬관절 치환술 시행한 후 3주째 슬관절 동통 및 종창이 발생하였다. 혈액학적 검사상 ESR 35 (0-25), CRP 3.2 (0-0.5) duTrh, 관절천자 검사상 WBC 5400, PMN 70% leukocyte esterase +1이었다. 적절한
