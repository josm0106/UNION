dial intermuscular septum, osbone lig., FCU two head & deep fascia 로서, 해당 부위를 전부 release 해줘야 한다.<br>편집자 추가 : Arcade of strutcher 였다는 의견도 있음, 시험장 사진을 보고 판단해야할 필요가 있음, 출제자의 의도를 생각했을 때 Proximal에서 가장 잘 눌리는 구조물을 표현하려고 했다면 Arcade of strutchers가 답이 될수 있음.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q028.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e028.jpg?v=1776535000"],"chapter":"수부"},{"num":29,"question":"31세 남자가 3개월 전 야구 선수로 운동 중에 수부 통증 발생하였고 2개월 전부터 소지의 굴곡이 약해졌다(그림 A). 다음으로 시행할 적절한 검사는?","choices":["Carpal tunnel view","External oblique view","Internal oblique view","Lateral view","Posteroanterior view"],"answer":1,"explanation":"Hamate hook fracture 로 인한 5th flexor tendon rupture 의심되는 상황<br>유사문제 2022 ELITE 수부 p.185 16년도 2차, 16년도 인트레이닝","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q029.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e029.jpg?v=1776535000"],"chapter":"수부"},{"num":30,"question":"Tendon 이 파열되어 봉합하는 과정(A-F)이다. Core suture의 strand의 개수는? (그림은 Single cross grasping 6-strand가 나왔습니다.)","choices":["1","2","3","4","5"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q030.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e030.jpg?v=1776535000"],"chapter":"수부"},{"num":31,"question":"13세 남자환아가 갑자기 2수지에 종괴가 있어서 수술을 시행하였다. MRI는 T1 high T2 low 소견, gross photo는 갈색의 round mass. 진단은?","choices":["건 거대세포종 (Giant cell tumor of tendon sheath)","섬유종 (Fibroma)","지방종 (Lipoma)","혈관종 (Hemangioma)","신경초종 (Schwannoma)"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q031.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e031.jpg?v=1776535000"],"chapter":"수부"},{"num":32,"question":"축전성 다지증 중 가장 흔한 유형은?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q032.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e032.jpg?v=1776535000"],"chapter":"수부"},{"num":33,"question":"58세 2년전 요골 골절 치료 후, 통증 지속되었다. 환자의 방사선 사진이다. 이 환 단순방사선 소견은 아래와 같을때 적절한 치료는 무엇인가? (druj arthritis 엘리트 이문제와 사진 거의 유사했습니다)","choices":["관절경적 tfcc 봉합술","관절경적 wafer","요골 교정절골술","척골 단축술","sauve kapandji"],"answer":5,"explanation":"2022 엘리트 65p 기출문제","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q033.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e033.jpg?v=1776535000"],"chapter":"수부"},{"num":34,"question":"60세 남환 2년전 원위 요골 골절에 대하여 보전적 치료 시행 후 지속되는 척측부 통증을 주소로 내원하였다. 손목 신전, 회전시 통증이 악화된다 하였다. 단순방사선 소견은 아래와 같을때 적절한 치료는 무엇인가? *편집자 : 2022 인트레이닝 기출과 동일한 문제였습니다(편집하면서 보니 ICL 사진이랑 똑같네요)","choices":["AS TFCC repair","Wafer procedure","Distal radius corrective osteotomy","Darrach procedure","Ulnar shortening osteotomy"],"answer":3,"explanation":"2022 ICL 연수강좌<br>Ulnar shortening osteotomy의 경우 20’ 이상의 dorsal tilt나 10’ 이상의 volar tilt가 있으면 금기로 Radial corrective ostetomy 시행해야함.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q034.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e034.jpg?v=1776535000"],"chapter":"수부"},{"num":35,"question":"40세 남환 지속되는 손목 척측 통증을 주소로 내원하였다. 엑스레이 소견상 아래와 같으며 신체검진상 소견은 동영상과 같다. 적합한 진단은 무엇인가? (비슷한 사진) Wrist AP : DRUJ의 slight widening 되어 있는 소견이 보이나 이외 특이 골절 소견은 없었음 Wrist lateral : ulnar의 dorsal subluxation 소견은 보이지 않음. 동영상 : wrist pronation 시에 ECU tendon의 popping 되는 소견이 확인됨.","choices":["DRUJ instability","ECU instability","Scapholunate dissociation","FCU instability","Ulnar impaction syndrome"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q035.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e035.jpg?v=1776535000"],"chapter":"수부"},{"num":36,"question":"Distal radius volar 에서 골편 당기는 힘 제거하는 과정은?(동영상 보기, Henry approach)","choices":["SubQ incision(동영상)","지방제거(동영상)","지방 및 fascia 제거(동영상)","PQ incision(동영상)","Brachioradialis 제거(동영상)"],"answer":5,"explanation":"2022 Elite 수부파트 146페이지 참고","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q036.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e036.jpg?v=1776535000"],"chapter":"수부"},{"num":37,"question":"60세 남환 2년 전부터 시작되고 3개월 전부터 악화된 손목 통증으로 내원하였다. 손목 요측 주상골 돌기 부위에 통증 발생하였고 환자의 방사선 사진 및 MRI 는 다음과 같다. 적절한 진단은? ( UNION 기출문제집 5번 문제와 유사한 문제로 x-ray 상 distal scaphoid 부위에 sclerotic lesion 관찰되며 joint space narrowing 관찰되었고 MRI 상 scaphoid 주변 부위로 signal 증가된 소견 관찰됨)","choices":["Scaphoid nonunion","Ganglion cyst","Scapholunate dissociation","Scaphotrapeziotrapezoidal arthritis","Wrist infection"],"answer":4,"explanation":"Wrist AP 상에서 scaphoid-trapezium-trapezoid articular surface 에 sclerotic change 및 joint space narrowing 소견 관찰되어 전형적인 degenerative osteoarthritis 소견 관찰됩니다<br><척추>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q037.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e037.jpg?v=1776535000"],"chapter":"수부"},{"num":38,"question":"45세 남자가 경부 통증 및 상지 방사통이 심하지만, (A) 와 같은 자세를 취할 때 증상이 호전되었다. MRI 사진이 (B) 와 같을 때 다음 환자에서 나타날 수 있는 감각 이상 분절은?","choices":["C5","C6","C7","C8","T1"],"answer":3,"explanation":"(A)는 shoulder abduction relief sign (Bakody sign) — 주로 C6-C7 추간판 탈출 시 C7 neural foramen 압박이 완화되면서 증상 호전. MRI (B)에서 C6-7 레벨 탈출로 C7 root 영향 → C7 감각 분절 이상.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q038.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e038.jpg?v=1776535000"],"chapter":"척추"},{"num":39,"question":"요통과 둔부 통증, 하지 방사통으로 20m도 걷지 못하는 환자의 단순 방사선(A) 및 MRI 사진(B)이다. 수술 3개월 후 단순 방사선 사진(C)이 다음과 같을 때, 보행 시 증가하는 분절 각은? (A) (B) (C) (사진은 구글에서 퍼왔고, 술전에도 Loss of lordosis 가 있었으나, L3-S1 PLIF 후에도 Lordosis 소실되어 있었고, Pelvic Retroversion 되어 있었음.)","choices":["Lordosis angle","Pelvic incidence","Pelvic tilt","Sacral slope","L4-5 wedge angle"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q039.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e039.jpg?v=1776535000"],"chapter":"척추"},{"num":40,"question":"55세 남자 환자가 교통 사고 후 신경학적 증상은 없었으나 경부 통증이 지속되었다. 단순 방사선 사진과 CT 사진이 다음과 같을 때 하부 경추 손상으로 알맞은 것은? <Rt> <Lt>","choices":["수직 압박 손상","신연 신전 손상","신연 굴곡 손상","굴곡 압박 손상","굴곡 신전 손상"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q040.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e040.jpg?v=1776535000"],"chapter":"척추"},{"num":41,"question":"우하지 방사통, 족하수 있는 환자. MRI 소견은 다음과 같다. 미세현미경적 수술시 접근 경로는?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q041.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e041.jpg?v=1776535000"],"chapter":"척추"},{"num":42,"question":"L4/5 후관절 병증으로 내분지 차단술 시행예정, 적절한 경로는?","choices":["가","가+나","가+나+다","나","나+다"],"answer":2,"explanation":"L4/5는 L3, L4 ramus의 medial branch innervation을 받는다. L3, L4 medial branch는 각각 L4, L5의 transverse process 위로 pass over 하므로 그림에서 위치는 가, 나에 해당한다. 정답은 가+나(2번).","reference":"ELITE 척추 6p","section":"2023년 2차","question_images":["images/2023_2차_q042.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e042.jpg?v=1776535000"],"chapter":"척추"},{"num":43,"question":"65세 여자. 넘어지면서 머리를 부딪힘. 상지 근력 2, 하지 근력 4 확인됨. 근력 약화를 설명할 수 있는 척수 경로는? (이런 느낌? Central lesion에 국한된 signal change 있었습니다.)","choices":["lateral spinothalamic tract","lateral corticospinal tract","vestibulospinal tract","Ant corticospinal tract","Ant spinothalamic tract"],"answer":2,"explanation":"","reference":"ELITE 척추 11p, 382p","section":"2023년 2차","question_images":["images/2023_2차_q043.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e043.jpg?v=1776535000"],"chapter":"척추"},{"num":44,"question":"우측 전방 접근법으로 수술한 환자 이다. 쉰 목소리가 발생했을 때 손상된 구조물로","choices":["가","나","다","라","마"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q044.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e044.jpg?v=1776535000"],"chapter":"척추"},{"num":45,"question":"57세 남성, 3주전 교통 사고 후 경부 통증으로 내원. 시행한 영상 검사는 다음과 같다. 원인이 되는 구조물은?","choices":["횡인대(Transverse ligament)","익상인대(Alar ligament)","첨인대(Apical ligament)","전종인대(ALL)","후종인대(PLL)"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q045.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e045.jpg?v=1776535000"],"chapter":"척추"},{"num":46,"question":"27세 남 10m 낙상 후 발생한 요통. 수술 전 신경학적 증상 없었고 수술은 후방 고정 시행함. 정복은 잘 되었다. 수술 후 항문주위 통증, 괄약근 위약감 생겼는데 그 원인은?","choices":["L2 방출된 골편","척추체의 시상면 전위","후궁골절 및 경막 손상","L12 전위","T12 극상인대 파열"],"answer":3,"explanation":"후궁부위 골절에 더불어 경막 손상이 발생한 환자로 답은 3","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q046.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e046.jpg?v=1776535000"],"chapter":"척추"},{"num":47,"question":"척추관 협착증으로 척추후방유합술(PLIF) 시행 하였다. 경막을 내측으로 당기면서 L4-5 cage 삽입하였다. 술 후 신경손상이 관찰되었다. 손상가능성이 있는 근육은?","choices":["가자미근","장요근","대퇴사두근","중둔근","비복근"],"answer":4,"explanation":"(출제위원 피셜)<br>지금까지 L4-5 PLIF시 L5 는 눈으로 보고 있기 때문에 손상이 적고 그 상위 L4 root가 stretching 되어 손상 가능성이 있다는 해설은 틀렸다고 합니다. TLIF 시행시에는 L4 root 손상 가능성이 높지만 PLIF 시행시에는 ‘경막을 내측으로 당기면서’ L5 root가 손상될 가능성이 높다고 합니다. 그래서 답은 L5 가 innervation 하는 중둔근입니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q047.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e047.jpg?v=1776535000"],"chapter":"척추"},{"num":48,"question":"18세 여자가 갑자기 골반 통증을 동반한 scoliosis가 진행하였다. 이환자에서 양성으로 발견 될 수 있는 신체검사는? * 실제 시험 사진은 일반적인 scoliosis 양상이 아닌 L4-5 쯤에서 vertebra가 틀어지면서 보상없이 우측으로 전반적으로 기울어진 사진이었습니다.","choices":["SLRT","Babinski sign","Patrick test","Thomas test","Adams forward bending test"],"answer":1,"explanation":"Sciatic scoliosis","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q048.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e048.jpg?v=1776535000"],"chapter":"척추"},{"num":49,"question":"요추부 최소 침습적 극외측 추체간 유합술에서 다음 부위에 케이지를 삽입할 때 가장 손상되기 쉬운 신경은?","choices":["Genitofemoral nerve","Lateral femoral cutaneous nerve","Ilioinguinal nerve","Obturator nerve","Hypogastric nerve"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q049.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e049.jpg?v=1776535000"],"chapter":"척추"},{"num":50,"question":"55세 남자 환자가 수상 후 내원하였다. 시행한 X-ray와 CT는 다음과 같다. 평소 고관절 통증이나 보행장애는 없었다. 적절한 치료는? 그림 설명 X-ray : Jensen 5 intertrochanteric fx. both femoral head necrotic segment (+), no collapse coronal CT : X-ray 와 동일 *편집자 추가 : CT coronal view에서 AVN 은 양측 모두 있었고 head의 약 20%정도? 였습니다. Collapse는 없었습니다.","choices":["다발성 나사 고정","비골 골이식 후 나사 고정","골수강 내 금속정 삽입","고관절 전 치환술","고관절 반 치환술"],"answer":3,"explanation":"교수님께서는 4가 답일거라고 하셨다고 함","reference":"Campbell p392 무증상 ONFH 는 경과관찰하고 대정 8판 p1826 intertrochanteric fx. 에 대해서는 unstable 하므로 IM nail fixation 시행함","section":"2023년 2차","question_images":["images/2023_2차_q050.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e050.jpg?v=1776535000"],"chapter":"고관절"},{"num":51,"question":"고관절의 후외측 접근법(Posterolateral approach)을 통해 관절 내로 접근 시 내측대퇴회선 동맥의 출혈 가능성이 있어 주의를 요하는 근육은?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":5,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q051.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e051.jpg?v=1776535000"],"chapter":"고관절"},{"num":52,"question":"다음과 같은 보행을 하는 환자의 기립 시 X-ray 는? 동영상 : waddling gait 동영상 설명 : 한국인 할머니가 엉덩이를 뒤로 쭉 빼고 hip knee 모두 flexion 한 채로 걷는 모습 왼쪽이 좀 더 심해보이나 trendelenburg gait 보다는 waddling gait 에 가까움","choices":["[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]"],"answer":2,"explanation":"대정 8판 p261 (DDH 내용)<br>https://www.youtube.com/watch?v=b5rIEx9SsCo<br>문제 보기는 다음과 같다.<br>1) Rt hip OA c acetabular dysplasia<br>2) Both hip dislocation<br>3) Lt fused hip<br>4) Lt hip OA c dysplasia<br>5) Both hip OA","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q052.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e052.jpg?v=1776535000"],"chapter":"고관절"},{"num":53,"question":"32세 남자로 우측으로 넘어지면서 수상하여 다음과 같은 소견이 발생하였다. 치료는? <femur neck fx, Pauwel’s type 3 양상이었습니다. CT까지 있었으나 x-ray만으로도 충분히 판단가능하였습니다.>","choices":["다발성 핀 고정술","활강 압박고 나사 고정술","금속판 내고정술","고관절 반치환술","고관절 전치환술"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q053.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e053.jpg?v=1776535000"],"chapter":"고관절"},{"num":54,"question":"고관절 전치환술 후 10년 뒤 소견이다. 다음 중 대퇴스템 loosening 소견으로 바른 것?","choices":["cement crack & subsidence","pedestal sign","physiologic change","[보기 4 - 이미지]","Cortical hypertrophy"],"answer":1,"explanation":"1) cement crack & subsidence<br>2) pedestal sign<br>3) physioloci change<br>4)<br>5) Cortical hypertrophy","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q054.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e054.jpg?v=1776535000"],"chapter":"고관절"},{"num":55,"question":"hip scope 시 다음과 같은 portal을 만들 때 주의해야하는 신경은? <anterior portal 만드는 장면>","choices":["상둔신경","외대퇴피신경","sciatic n","femoral n","Obturator n"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q055.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e055.jpg?v=1776535000"],"chapter":"고관절"},{"num":56,"question":"다음 고관절 방사선 사진 중 전방 피복 및 후방 충돌을 볼 수 있는 방사선 사진을 고르시오","choices":["Frog Leg","Lowenstein","Cross table Lateral","False Profile","Abd AP view"],"answer":4,"explanation":"고관절학 p.48, 1250","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q056.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e056.jpg?v=1776535000"],"chapter":"고관절"},{"num":57,"question":"ONFH 괴사 범위 계산 coronal A/A’/A’’. sagittal B,B’,B’’ , axial C, C’,C’’ 조합해서 계산","choices":["A'/A * B'/B * 100","A'/A * C'/C * 100","B'/B * C'/C * 100","A’'/A * B'/B * 100","A’/A * B'’/B * 100"],"answer":1,"explanation":"","reference":"> Measurement of Necrotic Lesion in Osteonecrosis of Femoral Head Joon Soon Kang, MD, Kyong Ho Moon, MD, Ryuh Sup Kim, MD, Suk In Na, MD","section":"2023년 2차","question_images":["images/2023_2차_q057.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e057.jpg?v=1776535000"],"chapter":"고관절"},{"num":58,"question":"다음과 같은 Type의 femur에 Type 1 stem을 이용하여 THA 시행 할 때, rasping entry point는?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q058.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e058.jpg?v=1776535000"],"chapter":"고관절"},{"num":59,"question":"고관절에 가장 압력을 많이 줄 수 있어 연골의 경한 손상도 detect 가능한 검사는?","choices":["[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]"],"answer":5,"explanation":"대정 pg 1226","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q059.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e059.jpg?v=1776535000"],"chapter":"고관절"},{"num":60,"question":"이전에 THRA을 시행했던 환자로, 수상 후 발생한 다음 손상에 대해 수술 예정이다. 우선적으로 해야할 조치는? (bone stock very poor. Loosening 동반. Vancouver B3)","choices":["1과2 고정","2와3 고정","stem 근위부 부분 제거","stem 완전 제거","비구 치환"],"answer":4,"explanation":"? (교수님께서는 1이 답일거라고 하셨다고 함)<br>편집자 추가 : 실제로는 modular long stem 이었음, 그래서 보기에 stem 근위부 부분제거가 등장할수 있었다고 생각합니다.<br>Bone stock 이 안좋고, loosening 이 있어 revision이 필요한 환자입니다. Vancouver B3 로써 strut 이나 prosthesis composite 등을 생각할수 있으며, 기존에 frag가 displace 되어 있던 환자로 fx를 통한 stem 제거를 시도해 볼수 있습니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q060.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e060.jpg?v=1776535000"],"chapter":"고관절"},{"num":61,"question":"세라믹 on 세라믹 THRA 후 10년 뒤 상기 현상(방사선 사진상 taper에 denting 소견) 이 발생하였다. 그림 A는 수술 중 확인한 육안소견이다. 이러한 현상을 발생시키는 상기 물질의 물성은?","choices":["경성(hardness)","취성(brittleness)","흡습성","거칠기 (surface roughness)","생체적합성(biocompatibility)"],"answer":1,"explanation":"기출 변형입니다. Titanium과 세라믹 간의 경성 차이로 인해 taper에 abrasive wear를 발생시켰습니다.<br><슬관절>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q061.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e061.jpg?v=1776535000"],"chapter":"고관절"},{"num":62,"question":"지속적인 슬개골 탈구로 수술적 치료 예정이다. 다음과 같을 때 치료는?","choices":["MPFL reconstruction","TT anterormedialization","TT anterormedialization + MPFL reconstruction","TT anteromedialization + distalization","TT anteromedialization + distalization + MPFL reconstruction"],"answer":4,"explanation":"Patella alta (Insall ratio >1.2) 및 TT-TG >20 mm 소견 → distalization과 medialization이 모두 필요. 제시된 보기 중 TT anteromedialization + distalization(4번)이 가장 적합.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q062.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e062.jpg?v=1776535000"],"chapter":"슬관절"},{"num":63,"question":"다음과 같은 환자에서 슬관절 전치환술 시행시 femur nail의 방향은?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q063.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e063.jpg?v=1776535000"],"chapter":"슬관절"},{"num":64,"question":"상환 17년 전 슬관절 전치환술 받은 환자로 3년 전부터 통증 및 불안정성 호소하였고 최근 악화되었다. 증상의 원인이 되는 기전은? 실제 사진은 TKA post op 1년째 PE Insert intact 한 사진, 15년 뒤, 17년뒤 시행한 사진이 각각 ap, lat 로 출제 되었습니다. 15년째 찍은 x-ray부터 medial space가 좁아지는 것을 확인할 수 있었습니다. (위 사진은 구글링해서 검색한 사진입니다.","choices":["마모","감염","Patellofemoral instability","신전기전 저하","해리"],"answer":1,"explanation":"5가 답이라는 해설 : 신출문제로, 이전에 파열음과 함께 탈구가 답이 된적 있습니다. 실제 시험장에서는 alignment가 탈구된것까진 아니지만 약간 어긋나 있어 dissociation 되어있음을 쉽게 알수 있고, 나머지 보기에 탈구가 없어서 쉽게 고를수 있었습니다. 해당 ELITE 문제와 슬관절학 교과서 첨부합니다.","reference":"ELITE 497p 슬관절학 868p 2022 ELITE 총론 329p 1이 답이라는 해설) Post op X-ray에서 Tibia가 femur 에 비해 앞쪽으로 translation 되어보였고, 17년때는 괜찮아 보였는데 19년째에 Tibia가 뒤로 밀려남. Femur component bone contact 부위에 일부 osteolysis 소견은 보이는 것 같았지만 loosening의 정의에는 맞지 않았음.","section":"2023년 2차","question_images":["images/2023_2차_q064.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e064.jpg?v=1776535000"],"chapter":"슬관절"},{"num":65,"question":"50세 여자 6개월전 좌측 슬관절 가벼운 수상. 1개월전부터 슬관절 통증. 이학적 검사상 내측 압통 및 관절범위 5-110. 관절범위 늘리기위한 치료는?","choices":["마취하 도수조작","비관혈적 정복술","안정","외과적 절제","TPI"],"answer":3,"explanation":"레퍼런스 : campbell, Insall, 대정, 슬관절학에 chronic MCL injury에서 ossification 이 보이는 Pellegrini Stida lesion 의 치료에 대한 부분은 없습니다.<br>슬관절학 1권 510p<br>MCL injury 후 femur attach 부위 calcification 소견으로 보아 Pellegrini-stieda lesion으로 보이나 교과서에 치료 부분은 찾지 못하였습니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q065.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e065.jpg?v=1776535000"],"chapter":"슬관절"},{"num":66,"question":"20세 남자 2주전 운동중에 수상. 슬관절 통증 및 불안정증. 신전 15 굴곡 100 제한. 치료는? <그림> MRI sagittal view 1장 : bone bruise (kissing lesion) 및 effusion 보이지 않았음. PCL buckling 및 tibia ant. translation + double PCL sign (MM bucket handle tear) MRI coronal view 1장 : intercondylar space로 flipped 된 MM bucket handle tear 보였고 cut 이 정확하지 않으나 lFC empty wall sign 처럼 ACL은 보이지 않았습니다.","choices":["관절범위 회복후 ACL recon","관절범위 회복후 ACL recon. MM repair","조기 MCL repair","조기 ACL recon","조기 ACL recon, MM repair"],"answer":5,"explanation":"레퍼런스 : Elite 슬관절 p127","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q066.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e066.jpg?v=1776535000"],"chapter":"슬관절"},{"num":67,"question":"25세 남환이 이전에 축구 중 무릎을 수상하였으나 이후 특별한 문제 없이 지내었다. 최근 운동 후 무릎에 힘이 풀리는 증상 이후 통증이 심해져 내원하였다. 다음은 시행한 MRI 이다. ACL은 언제 손상되었으며 동반 손상은? (A) coronal knee MRI. Joint 내에 effusion 일부 보이며, bone marrow edema 등 acute injury를 생각할수 있는 소견은 보이지 않았음.. (B) sagittal knee MRI. ACL injury 소견., MM posterior ramp lesion 관찰됨. (C) axial knee MRI : 무슨 소견을 보여주려고 했던건지 아시는분 답변주세요!","choices":["ACL acute injury + LM tear","ACL acute injury + MM tear","ACL acute injury + LM, MM tear","ACL chronic injury + MM tear","ACL chronic injury + LM tear"],"answer":4,"explanation":"MRI 상 kissing contusion 등 bone edema 보이지 않고 hemarthrosis도 없어서 만성 파열일 것으로 생각됩니다. Coronal cut 상 MM injury도 있어 보이는데, ACL chronic injury의 경우 MM tear가 동반될 수 있고, sagittal MRI 상 MM의 ramp lesion이 보였다는 의견이 많았다고 합니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q067.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e067.jpg?v=1776535000"],"chapter":"슬관절"},{"num":68,"question":"TKRA 후 상기 증상을 호소하였다. 이를 해소하기 위한 대퇴치환물의 디자인은? 동영상 1 개 – knee extension 되있는 상태에서 flexion 시킬때 lateral subluxation 되있던 patella가 덜컥거리면서 medial 로 움직이는 장면 ( -> patella clunk syn. 으로 이해하였습니다.) *편집자가 발로 그린 그림","choices":["양측 trochlea groove 높이 다름, box는 narrow & high","양측 trochlea groove 높이 다름, box는 wide & low","양측 trochlea groove 높이 다름, box는 narrow & low","양측 trochlea groove 높이 같음, box는 narrow & high","양측 trochlea groove 높이 같음, box는 narrow & low"],"answer":5,"explanation":"보기는 위와 같이 femur implant 들을 나열하고 intercondylar notch size와 medial & lateral height 차이를 둔 implant 들로 노란색 부분 처럼 되있었습니다.<br>Elite에서 보시는 바와 같이 notch 가 narrow 하고 low 한게 유리하다고 하며 medial lateral heigth 는 잘몰라서 논문올려드립니다. ML 높이 차이 없는게 더 유리하다고 하여 답은 5번 같습니다.<br>* 편집자가 고른 답 : 3<br>*편집자 해설 : patella malalignment를 해결하기 위한 femur component의 box는 narrow, low 이며, 실제 trochlea groove와 비슷하게 lateral이 더 높아야 합니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q068.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e068.jpg?v=1776535000"],"chapter":"슬관절"},{"num":69,"question":"30세 여자환자로 수차례의 슬개골 탈구로 석고상 고정 치료 2차례 시도하였으나 실패하였다. 수술적 치료를 고려할 때 이식건의 위치로 적절한 곳은?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q069.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e069.jpg?v=1776535000"],"chapter":"슬관절"},{"num":70,"question":"65세 환자. 2년 전부터 좌측 슬관절 통증이 있었고, 3개월 전부터 통증이 악화되었다. 외반 스트레스 검사 시행하였다. 치료는?","choices":["사진(A) Lt knee AP 사진. Medial condyle에 SONK lesion 있고, 그외 OA change 등은 관찰되지 않음.","사진(B) Lt knee valgus stress 사진. valgus instability는 보이지 않음.","감압술","골다공증 치료","부분치환술"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q070.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e070.jpg?v=1776535000"],"chapter":"슬관절"},{"num":71,"question":"A 와 같은 X-ray의 환자의 우]측 무릎에 대해 TKA 시행하는 도중 B,C 소견이 관찰되었다. 유리해야할 구조물은? B (Intra op photo) : Flexion gap N-S C (Intra op photo) : Extension gap lateral tight A : Rt knee 심한 valgus alignment","choices":["biceps femoris tendon","POL","popliteus","LCL","posterolateral capsule"],"answer":5,"explanation":"(고시위원 피셜)<br>출제하신 교수님께서 답 5번이라고 합니다. 1번은 biceps aponeurosis가 아니라서 그런듯 하네요…<br>원래 ITB가 왕야마 였는데 살짝 변형하셨네요","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q071.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e071.jpg?v=1776535000"],"chapter":"슬관절"},{"num":72,"question":"55세 남자환자, 수년 전 스포츠 활동을 하다 우측 슬관절 수상, 6개월전부터 지속되는 통증 및 불안정성으로 내원. 다음과 같은 검사 소견이며 가장 우선 시행할 처치는? (posterior sagging, genu varum, 걷는 동영상에서 varus thrust, MRI에서 mFC의 chondral wear 소견)","choices":["근위 경골 절골술","인공관절 부분치환술","후방십자인대 재건술","후외측 복합체 재건술","후방십자인대 + 후외측 복합체 재건술"],"answer":1,"explanation":"(elite 205pg 문제와 동일)<br>2022 Elite 슬관절 p.206<br>보행 시 슬관절의 lateral thrust가 나타나는 경우 연부조직 재건술만으로는 실패할 수 있어 경골의 외반 절골술이 동반되어야 한다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q072.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e072.jpg?v=1776535000"],"chapter":"슬관절"},{"num":73,"question":"60세 남자, X-ray는 다음과 같다. Knee medial OA에서 어떠한 술식을 할 것인가? aLDFA : 83’ MPTA : 81’ Tibia post slope : 15’ *내측 연골상태에 대해 비교적 양호했다는 식의 표현이 있었던걸로 기억함","choices":["근위경골 외측 폐쇄절골술","근위경골 내측 개방절골술","원위대퇴 내측 개방절골술","원위대퇴 외측 폐쇄절골술","근위경골 전방 개방절골술"],"answer":1,"explanation":"유사기출 ELITE 2022 슬관절 p.288<br><족부>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q073.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e073.jpg?v=1776535000"],"chapter":"슬관절"},{"num":74,"question":"57세 남자환자, 외상없이 점차 진행되는 발목 통증으로 시행한 영상 검사이다. 발목의 심한 외측 불안정성이 보이고 있었고, dorsiflexion 및 valgus의 근력은 Gr3 (fair)를 보이고 있었다. 적절한 치료로 올바른 것은?","choices":["관절경적 골극제거술","원위경골절골술 및 후경골건 이전술","외측인대 봉합술 및 골극 제거","유합술","인공관절 치환술"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q074.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e074.jpg?v=1776535000"],"chapter":"족부"},{"num":75,"question":"64세 여자가 6개월 전 아킬레스건 손상으로 일차 봉합술을 받았고 이후 감염이 생겨 변연절제술을 시행받았다. 변연 절제술 후 9cm 정도의 결손이 생겨 건 보강술을 계획할 때 공여건으로 제일 적절한 것은?","choices":["보기 1","보기 2","보기 3","보기 4","보기 5"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q075.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e075.jpg?v=1776535000"],"chapter":"족부"},{"num":76,"question":"무지외반증 수술 시행 3개월 후 1-2족지가 벌어지기 시작했다. 무지 외반증 수술 후 발생한 다음의 소견에 대한 적절한 수술적 치료는?","choices":["건막절제술","근위지골 교정 절골술","내측 관절막 유리술","중족굴 교정 절골술","중족지간 관절 유합술"],"answer":4,"explanation":"무지외반증 수술 후 1-2족지 벌어짐 + 1st MT의 과도한 varus(hallux varus) 발생 시 중족골 교정 절골술로 교정. 답은 중족굴 교정 절골술(4번).","reference":"2022 Elite p277","section":"2023년 2차","question_images":["images/2023_2차_q076.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e076.jpg?v=1776535000"],"chapter":"족부"},{"num":77,"question":"20대 여성 제1족지 변형에 대해 다음과 같은 수술을 시행하였다. 다음 수술 후 발생하는 가장 흔한 합병증은?","choices":["골수염","관절강직","나사못 파손","재골절","부정정렬"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q077.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e077.jpg?v=1776535000"],"chapter":"족부"},{"num":78,"question":"26살 여자 육상선수가 3개월전 원위경골 1/3 부위 통증 있어 내원하였다. 훈련 시작할 때 훈련중에는 오히려 통증이 감소하였고, 휴식시 통증 호전되었다. 진단은? x-ray : normal?(아래 사진은 shin splint X-ray) / Bone scan : mild uptake on distal tibia","choices":["Shin splint (경부목)","Chronic compartment syndrome (만성 구획중후군)","Achilles tendinitis (아킬레스 힘줄염)","Delayed muscle pain (지연 근육통)","Fatigue fracture (피로골절)"],"answer":1,"explanation":"신출입니다. 환자 증상으로 진단을 해야하는 문제로 사료됩니다.<br>**편집자 추가 해설 : 대정 8판 p.1965","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q078.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e078.jpg?v=1776535000"],"chapter":"족부"},{"num":79,"question":"남환 원위 경골 수술 후 발생한 다음과 같은 합병증이 발생하였다. (Clinical photo, 동영상 주어짐). 치료 방법은? *Ankle DF/PF에 따라 2-5th toe는 움직이는데 1st toe는 dorsiflexion 되어있는 상태로 유지됨.","choices":["장무지굴근 단축술","장무지굴근 연장술","장무지신근 단축술","장무지신근 연장술","하퇴부 심부 후방 구획 유리술"],"answer":4,"explanation":"기존 Checkrein deformity 에 대한 기출문제 변형입니다 기존에는 FHL 구축으로 인한 plantarflexion이 유지되는 변형이라면 이번 문제는 그 반대의 경우를 보여줌","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q079.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e079.jpg?v=1776535000"],"chapter":"족부"},{"num":80,"question":"34세 남자 교통사고로 족부 통증으로 내원하였다. 진단시 촬영한 x-ray 사진은 다음과 같다. 족부의 부종이 심한 상태였다. 올바른 치료는? X-ray : comminution 이 심한 cuboid fracture","choices":["골절 정복 및 외고정기기 고정술","경피적 핀 고정술","단하지 부목 고정술","골편 제거술","관절유합술"],"answer":1,"explanation":"(출제위원피셜)<br>Nutcracker fracture 대정 8판 p1920 해설 : 대정 8판 p1920<br>Xray 및 CT 있었는데, 복원인원마다 communited 소견인지 아닌지 의견이 분분 하였으나, 대정책 보다 심한 사진이었습니다. 대정 책에 따르면 lateral column이 shortenning된 경우 외고정술을 고려할 수 있겠습니다.<br><소아>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q080.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e080.jpg?v=1776535000"],"chapter":"족부"},{"num":81,"question":"8세 환아가 다음과 같은 손상으로 석고 고정을 하려한다. 변형 교정을 위해 적절한 방법은?","choices":["내반 몰딩/족관절 중립","내반 몰딩/족저굴곡 20도","외반 몰딩 / (미상)","외반 몰딩/족관절 중립","외반 몰딩/족저굴곡 20도"],"answer":2,"explanation":"Short leg cast는 골절의 pattern 및 alignment에 따라 varus 혹은 valgus molding을 한다.<br>위 환자처럼 tibia와 fibular shaft 동시 골절 시 valgus angulation이 흔하다.<br>발목은 middle – distal 1/3 골절의 경우 20도 족저굴곡을, proximal 1/3 골절의 경우 10도 족저굴곡을 해서 posterior angulation을 방지한다.<br>엘리트 소아 p.399","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q081.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e081.jpg?v=1776535000"],"chapter":"소아"},{"num":82,"question":"9세 남자 환아가 발목을 수상하여 내원하였다. 초기 방사선 사진에서 (가)로 관찰되어 도수정복을 시도하였으나 실패하였다. 전신마취하 도수정복 및 k-강선을 이용한 내고정술 (나)을 시행하였다. 방사선 추시 9개월 째 (다)와 같은 소견이 관찰되었을 때 추후에 필요한 처치는? (가) (나) (다)","choices":["경과관찰","CT","Bone scan","MRI","enhanced MRI"],"answer":1,"explanation":"","reference":"정형외과학 7판 p.1541","section":"2023년 2차","question_images":["images/2023_2차_q082.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e082.jpg?v=1776535000"],"chapter":"소아"},{"num":83,"question":"주관절 통증으로 내원한 2세 환아. posterolateral 로 distal이 빠져있고, 관절 조영술 상 epiphysis를 포함하여 dislocation된 것이 확인되며, Supracondylar area는 smooth한 border를 보임. 다음 중 손상 부위는? X-ray : RC line normal, UH line displaced Arthrogram","choices":["상완골 과상부 골절","상완골 외과 골절","상완골 원위 성장판 분리","요골두 탈구","주관절 탈구"],"answer":3,"explanation":"< 동일 문제 >","reference":"ELITE 소아 p.261 왕야마 arthrogram사진까지 주어졌습니다.","section":"2023년 2차","question_images":["images/2023_2차_q083.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e083.jpg?v=1776535000"],"chapter":"소아"},{"num":84,"question":"환아가 팔꿈치 수상 후 해당 동작을 하지 못했다. 수상 골절은?","choices":["[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]"],"answer":1,"explanation":"Supracondylar fracture early complication – 신경손상<br>PM type 되면 beak가 lateral side : radial nerve injury<br>PL type 되면 beak가 medial side : median or AIN injury<br>Flexion type : ulnar nerve injury","reference":"Elite 소아 p. 276","section":"2023년 2차","question_images":["images/2023_2차_q084.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e084.jpg?v=1776535000"],"chapter":"소아"},{"num":85,"question":"12세 우완투수가 견관절 불편감을 호소하여 내원하였으며 영상 검사를 시행했다. 해당 병변을 유발하는 요인은?","choices":["상완골의 외반","상완골의 내반","상완골두의 anteversion","상완골두의 retroversion","상완골의 overgrowth"],"answer":4,"explanation":"소아 야구 견 (Little league shoulder)<br>발생에 가장 중요한 요인은 투구시 발생하는 외회전력이라 할 수 있다.<br>Murachovsky 등은 근위 상완골 성장판의 확장은 상완골의 후굴 (Retroversion)이 증가된 것에 의한 적응된 변화라고 보고하였다.<br>Elite 소아 p.451","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q085.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e085.jpg?v=1776535000"],"chapter":"소아"},{"num":86,"question":"선천성 만곡족으로 Ponseti casting 치료를 받은 15세 남자 환아의 보행 영상이다. 이 환아의 보행에서 발견되는 문제점에 대한 치료로 가장 올바른 것은? (보행영상) Swing phase에서 forefoot supination되는 모습 관찰됨. 아래 사진보다 supination이 확실히 저명하게 보였습니다. 1)","choices":["[보기 1 - 이미지]","전경골근 이전","족저근막 절제술","후경골근 이전","후외측 유리술"],"answer":2,"explanation":"","reference":"정형외과학 7th 1권 p.204","section":"2023년 2차","question_images":["images/2023_2차_q086.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e086.jpg?v=1776535000"],"chapter":"소아"},{"num":87,"question":"좌측 외전 제한이 있는 6개월 환아이다. 90도 굴곡 도수정복 후 안전 범위 30~70도로 확인되었다. 이에 캐스트 시행후 MRI를 시행하였다. 이 환아에게 시행할 치료는?","choices":["도수 정복 후 보조기","도수 정복 후 캐스트","관혈적 정복 후 캐스트","관혈적 정복 후 대퇴내반 절골술","관혈적 정복 및 골반 절골술"],"answer":3,"explanation":"","reference":"ELITE 소아 p.33-34 문제는 arthrogram 상에서 정복이 잘 된 것을 확인한 후 cast를 감았고, 그 후에 시행한 MRI 상에서 탈구가 된 모습을 보였습니다. 이는 도수 정복술이 실패한 경우로 봐야할 것 같습니다.","section":"2023년 2차","question_images":["images/2023_2차_q087.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e087.jpg?v=1776535000"],"chapter":"소아"},{"num":88,"question":"6세 환아의 영상검사이다. 의심되는 질환은? *편집자 추가 X-ray 하지 전장사진을 주었는데 우측이 약간 LLD가 있고 prox fibular ossification center가 안보였음 발가락은 우측이 하나가 없었던걸로 기억. (3번째 사진은 원래 주어지진 않았고 전장 사진을 봤을 때 우측 fibula head가 저렇게 보였음)","choices":["Congenital hemihyperplasia","Congenital tibia hemimelia","Congenital fibula hemimelia","Proximal femur focal deficiency","[보기 5 - 이미지]"],"answer":3,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q088.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e088.jpg?v=1776535000"],"chapter":"소아"},{"num":89,"question":"Ankle PF+ Back knee gait를 보이는 환아에서 수술 후 보행 장애가 호전된 양상. 어떤 수술을 하고 호전되었나? 동영상 1 : Ankle equinus deformity 를 보이며 Ankle PF 상태로 Back knee gait를 보이는 남아 동여상 2 : (수술 후) Ankle equinus가 호전되어 비교적 정상적으로 보행하고 있음","choices":["아킬레스건 연장술","대퇴골 감염 절골술","햄스트링 연장술","장요건 연장술","biceps femoris 연장술"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q089.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e089.jpg?v=1776535000"],"chapter":"소아"},{"num":90,"question":"12세 환아 수년간 다발성 골절과 함께 다음과 같은 변형이 관찰되었다. 하지 변형에 대한 치료는?","choices":["경과 관찰","외고정 장치를 이용한 교정","절골술 후 plate","절골술 후 pinning","절골술 후 IM nail"],"answer":5,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q090.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e090.jpg?v=1776535000"],"chapter":"소아"},{"num":91,"question":"8세 환아 내반슬로 내원하여 촬영한 사진으로 진단은?? 편집자 : 이것보다 훨씬더 저명하게 medial beak 가 보였던걸로 기억합니다.","choices":["Achondroplasia","rickets","Fibrous dysplasia","Blount's disease","MCD"],"answer":4,"explanation":"근위부 골간단 내측에 새 주둥이 모양의 부리화가 보였음. 다른 이상 소견은 없었음.","reference":"elite 소아 175 page,","section":"2023년 2차","question_images":["images/2023_2차_q091.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e091.jpg?v=1776535000"],"chapter":"소아"},{"num":92,"question":"10세 환아 지속적인 고관절 통증으로 촬영한 고관절 조영술이다. 이에 E와 같은 술식을 진행하였을 때 이 수술의 목적으로 가장 적절한 것을 고르시오.","choices":["Congruency","Containment","Revascularization","Anterior coverage","Varus correction"],"answer":1,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q092.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e092.jpg?v=1776535000"],"chapter":"소아"},{"num":93,"question":"다음 환자 다음과같은 수술을 한다. axis 변화중 맞는것은? *편집자 추가 사진 : IM nail rod과 EF를 이용한 femoral lengthening 이었고 축이 anatomical axis를 따라 lengthening 되고 있었음","choices":["mechanical axis 내측 이동","mechanical axis 외측 이동","mechanial axis, anatomical axis 변화 없음","anantomical axis 내반","anatomical axis 외반"],"answer":2,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q093.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e093.jpg?v=1776535000"],"chapter":"소아"},{"num":94,"question":"슬관절 굴곡 보행을 하는 환아로 신체검진에서 Popliteal angle은 양측 모두 60도였으며 knee flexion contracture는 관찰되지 않았다. 신체검진에서 다음과 같은 소견 보였다. 보행검사 상 다음과 같은 소견 보였다. 치료는? 동영상 : Duncan-Ely test (+) 보행검사(편집자가 그림.. 대략 이런 느낌으로 정상(검은색 선)보다 전반적으로 flexion 된 상태가 유지되었음)","choices":["Rectus femois transfer","RF transfer + Hamstring release","Hamstring release","Femur extension osteotomy","Hamstring release + Femur extension osteotomy"],"answer":2,"explanation":"대정을 보면, 교정을 요하는 모든 부분에 대해서 한 번에 교정을 하는 것이 바람직하다고 되어 있으며 Ely 검사 양성시 시행할 수 있는 대퇴 직근 이전술 시에 슬관절 굴곡 구축은 교정된 상태이거나 같이 교정되어야 한다고 되어 있다. 슬와 각도 모두 증가해있는 상태로 슬관절 굴곡 보행에 대해 Hamstring이 원인으로 생각되며 release를 같이 해주는 것이 좋을듯)<br>대정 8판 p. 640 대정 8판 p. 645.<br><외상>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q094.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e094.jpg?v=1776535000"],"chapter":"소아"},{"num":95,"question":"차에 깔리면서 발생한 골반환 손상으로 내원한 환자로, 응급 외고정술 후 혈역학적으로 안정된 소견 보였다. 회음부 개방성 창상에 대해 변연 절제 및 세척술을 시행하였고, 괄약근 손상이 확인되었다. 추후 시행할 처치는? ￼￼","choices":["결장조루술","금속판 고정술 (Plate fixation)","골반 내 거즈 충전 (Pelvic gauze packing)","일차봉합술 (Primary closure)","피판술 (Flap)"],"answer":1,"explanation":"(출제위원피셜)","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q095.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e095.jpg?v=1776535000"],"chapter":"외상"},{"num":96,"question":"대퇴골 간부 비전형 골절에 대해 예방적 골수강 내 금속정 삽입술 시행 예정인 환자의 방사선학적 검사 사진이다. 금속정의 entry point를 후방으로 삽입할 경우 발생할 수 있는 합병증으로 옳은 것은? Femur anterolateral bowing은 이것보다 훨씬 심했음","choices":["대퇴골 근위부 방출성 골절","내반 변형","외반 변형","대퇴골 원위부 전방 피질 골절","회전 변형"],"answer":4,"explanation":"><br>위의 ELITE 해설대로 풀면안된다.<br>처음에는 후방이라고 해서 proximal fixation loss로 회전 변형이 답인 것으로 생각했으나 이것 보다는 다른 야마 인 bowing 이 심한 환자에서 nail insertion 시 발생할 수 있는 합병증으로 보는 게 맞을 것 같습니다","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q096.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e096.jpg?v=1776535000"],"chapter":"외상"},{"num":97,"question":"대퇴골 간부 골절에 대해 골수 _q099.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e099.jpg?v=1776535000"],"chapter":"외상"},{"num":100,"question":"SI joint를 전방 도달법으로 금속판을 이용하여 내고정할 때 손상 받을 수 있는 구조물은?","choices":["대퇴신경","폐쇄신경","LFCN","제1 천추 신경","제 5 요추 신경"],"answer":5,"explanation":"(10년도 기출과 거의 비슷하였습니다.<br>아래는 ELITE hip pelvic bone fracture treatment part","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q100.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e100.jpg?v=1776535000"],"chapter":"외상"}];

let currentQ=null,currentQIdx=-1,currentSectionIdx=-1,wrongNotes=[],memoNotes=[],viewData={},answerData={},currentMemoTab='wrong',currentMemoFilter='all',appInitialized=false;
let viewMode='welcome'; // welcome | grid | quiz

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function timeAgo(ts){const d=Date.now()-ts,s=Math.floor(d/1000);if(s<60)return'방금 전';const m=Math.floor(s/60);if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';const dy=Math.floor(h/24);if(dy<30)return dy+'일 전';return new Date(ts).toLocaleDateString('ko-KR');}
function getQKey(q){return q.section+'_'+(q.chapter||'')+'_'+q.num;}

function migrateAnswerData(){let changed=0;const qMap={};QUESTIONS.forEach(q=>{qMap[getQKey(q)]=q;});Object.keys(answerData).forEach(k=>{const q=qMap[k];if(!q)return;const a=answerData[k];const qAns=parseInt(q.answer,10);const shouldBeCorrect=a.selected===qAns;if(a.correct!==shouldBeCorrect){a.correct=shouldBeCorrect;changed++;}});if(changed>0){console.log('[Migration] Fixed '+changed+' answer records');syncToCloud();}return changed;}
function initApp(){
  if(appInitialized)return;appInitialized=true;
  const ub=document.getElementById('userBar');ub.style.display='flex';
  if(offlineMode){document.getElementById('userDisplayName').textContent='오프라인 모드';document.querySelector('.user-icon').textContent='📴';document.getElementById('logoutBtn').textContent='로그인 전환';document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem(PREFIX+'_mode');location.reload();};}
  migrateAnswerData();
  buildBookList();updateStats();updateMemoCount();renderMemoPanel();initMemoResize();
}

function buildBookList(){
  const list=document.getElementById('bookList');list.innerHTML='';
  SECTIONS.forEach((sec,si)=>{
    const qs=sec.questions;
    const done=qs.filter(q=>answerData[getQKey(q)]).length;
    const correct=qs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
    const wrong=done-correct;
    const pct=qs.length?Math.round(done/qs.length*100):0;
    const item=document.createElement('div');
    item.className='book-item'+(currentSectionIdx===si?' active':'');
    item.onclick=()=>showGrid(si);
    item.innerHTML='<div class="book-icon">'+sec.icon+'</div><div class="book-title">'+sec.name+'</div><div class="book-stats"><span class="book-stat-total">'+qs.length+'문제</span>'+(correct?'<span class="book-stat-done">✓'+correct+'</span>':'')+(wrong?'<span class="book-stat-wrong">✗'+wrong+'</span>':'')+'</div><div class="book-progress"><div class="book-progress-bar" style="width:'+pct+'%"></div></div>';
    list.appendChild(item);
  });
}

function showGrid(si){
  currentSectionIdx=si;viewMode='grid';currentQ=null;
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('quizContainer').style.display='none';
  document.getElementById('gridContainer').style.display='block';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('headerTitle').textContent=SECTIONS[si].name;
  document.getElementById('headerProgress').textContent='';
  buildBookList();
  // Close mobile sidebar
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
  renderGrid(si);
  document.getElementById('contentArea').scrollTop=0;
}

function renderGrid(si){
  const sec=SECTIONS[si],qs=sec.questions;
  const done=qs.filter(q=>answerData[getQKey(q)]).length;
  const correct=qs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
  let h='<div class="grid-view"><h2>'+sec.icon+' '+sec.name+'</h2>';
  h+='<div class="grid-sub">'+qs.length+'문제 · '+done+'문제 풀이 완료 (정답 '+correct+', 오답 '+(done-correct)+')</div>';
  h+='<div class="grid-controls"><button class="active" onclick="gridFilter(\'all\',this)">전체</button><button onclick="gridFilter(\'unsolved\',this)">안 푼 문제</button><button onclick="gridFilter(\'wrong\',this)">오답만</button></div>';
  // Check if questions have chapter info
  const hasChapters=qs.some(q=>q.chapter&&q.chapter!=='일반');
  if(hasChapters){
    // Group by chapter
    const chapterOrder=[];const chapterMap={};
    qs.forEach((q,qi)=>{
      const ch=q.chapter||'기타';
      if(!chapterMap[ch]){chapterMap[ch]=[];chapterOrder.push(ch);}
      chapterMap[ch].push({q,qi});
    });
    chapterOrder.forEach(ch=>{
      const items=chapterMap[ch];
      const gDone=items.filter(it=>answerData[getQKey(it.q)]).length;
      const gCorrect=items.filter(it=>{const a=answerData[getQKey(it.q)];return a&&a.correct;}).length;
      h+='<div class="q-group"><div class="q-group-title"><span>📂 '+ch+' ('+items.length+')</span><span class="q-group-stats">'+gDone+'/'+items.length+' 풀이'+(gCorrect?' · ✓'+gCorrect:'')+'</span></div>';
      h+='<div class="q-grid">';
      items.forEach(it=>{
        const q=it.q,qi=it.qi,k=getQKey(q),a=answerData[k],v=viewData[k];
        let cls='q-card';
        if(a){cls+=a.correct?' answered-correct':' answered-wrong';}
        if(wrongNotes.some(n=>n.qKey===k))cls+=' has-note';
        const views=v?v.count+'회':'';
        h+='<div class="'+cls+'" data-qkey="'+k+'" data-status="'+(a?(a.correct?'correct':'wrong'):'unsolved')+'" data-noted="'+(wrongNotes.some(n=>n.qKey===k)?'1':'0')+'" onclick="loadQuestion(SECTIONS['+si+'].questions['+qi+'])"><div class="q-card-num">'+q.num+'</div>'+(views?'<div class="q-card-views">'+views+'</div>':'')+'</div>';
      });
      h+='</div></div>';
    });
  } else {
    // Chunk by 30
    const CHUNK=30;const numGroups=Math.ceil(qs.length/CHUNK);
    for(let g=0;g<numGroups;g++){
      const start=g*CHUNK,end=Math.min((g+1)*CHUNK,qs.length);
      const groupQs=qs.slice(start,end);
      const gDone=groupQs.filter(q=>answerData[getQKey(q)]).length;
      const gCorrect=groupQs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
      const label=groupQs[0].num+'~'+groupQs[groupQs.length-1].num+'번';
      h+='<div class="q-group"><div class="q-group-title"><span>📂 '+label+'</span><span class="q-group-stats">'+gDone+'/'+groupQs.length+' 풀이'+(gCorrect?' · ✓'+gCorrect:'')+'</span></div>';
      h+='<div class="q-grid">';
      groupQs.forEach((q,gi)=>{
        const qi=start+gi,k=getQKey(q),a=answerData[k],v=viewData[k];
        let cls='q-card';
        if(a){cls+=a.correct?' answered-correct':' answered-wrong';}
        if(wrongNotes.some(n=>n.qKey===k))cls+=' has-note';
        const views=v?v.count+'회':'';
        h+='<div class="'+cls+'" data-qkey="'+k+'" data-status="'+(a?(a.correct?'correct':'wrong'):'unsolved')+'" data-noted="'+(wrongNotes.some(n=>n.qKey===k)?'1':'0')+'" onclick="loadQuestion(SECTIONS['+si+'].questions['+qi+'])"><div class="q-card-num">'+q.num+'</div>'+(views?'<div class="q-card-views">'+views+'</div>':'')+'</div>';
      });
      h+='</div></div>';
    }
  }
  h+='</div>';
  document.getElementById('gridContainer').innerHTML=h;
}

function gridFilter(mode,btn){
  document.querySelectorAll('.grid-controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach(c=>{
    const status=c.getAttribute('data-status'),noted=c.getAttribute('data-noted');
    let show=true;
    if(mode==='unsolved')show=status==='unsolved';
    else if(mode==='wrong')show=status==='wrong';
    else if(mode==='noted')show=noted==='1';
    c.style.display=show?'':'none';
  });
  document.querySelectorAll('.q-group').forEach(g=>{
    const cards=g.querySelectorAll('.q-card');
    const anyVisible=Array.from(cards).some(c=>c.style.display!=='none');
    g.style.display=anyVisible?'':'none';
  });
}

function goBack(){
  if(viewMode==='quiz'&&currentSectionIdx>=0){showGrid(currentSectionIdx);}
  else{viewMode='welcome';document.getElementById('welcomeScreen').style.display='';document.getElementById('gridContainer').style.display='none';document.getElementById('quizContainer').style.display='none';document.getElementById('backBtn').style.display='none';document.getElementById('headerTitle').textContent='문제를 선택하세요';document.getElementById('headerProgress').textContent='';currentSectionIdx=-1;buildBookList();}
}

function openLightbox(src){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML='<img src="'+src+'">';document.body.appendChild(lb);}

function loadQuestion(q){
  currentQ=q;currentQIdx=QUESTIONS.indexOf(q);viewMode='quiz';
  const k=getQKey(q);
  if(!viewData[k])viewData[k]={count:0,lastViewed:0};
  viewData[k].count++;viewData[k].lastViewed=Date.now();syncToCloud();
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('gridContainer').style.display='none';
  document.getElementById('quizContainer').style.display='block';
  document.getElementById('backBtn').style.display='inline-block';
  document.getElementById('headerTitle').textContent=q.section+' · Q'+q.num;
  const secQs=SECTIONS.find(s=>s.name===q.section);
  const doneInSec=secQs?secQs.questions.filter(qq=>answerData[getQKey(qq)]).length:0;
  const totalInSec=secQs?secQs.questions.length:0;
  document.getElementById('headerProgress').textContent=doneInSec+'/'+totalInSec+' 풀이 완료';
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
  renderQuiz();buildBookList();
  document.getElementById('contentArea').scrollTop=0;
}

function renderQuiz(){
  const q=currentQ,k=getQKey(q),c=document.getElementById('quizContainer');
  const v=viewData[k];let vh='';
  if(v&&v.count>0)vh='<div class="meta-views">👁 '+v.count+'회 조회 · '+timeAgo(v.lastViewed)+' <button class="meta-minus-btn" onclick="decrementView(\''+k+'\')">−1</button><button class="meta-reset-btn" onclick="resetView(\''+k+'\')">✕ 초기화</button></div>';
  let h='<div class="quiz-card"><div class="quiz-meta"><div class="meta-section">'+q.section+'</div><div class="meta-num">문제 '+q.num+'</div>'+vh+'</div>';
  h+='<div class="quiz-question">'+escapeHtml(q.question);
  if(q.question_images&&q.question_images.length)q.question_images.forEach(img=>{h+='<br><img src="'+img+'" onclick="openLightbox(\''+img+'\')" loading="lazy">';});
  h+='</div>';
  const ea=answerData[k];
  h+='<div class="quiz-choices" id="choicesArea">';
  const qAns=parseInt(q.answer,10);q.choices.forEach((ch,i)=>{const n=i+1;let cls='choice-btn';if(ea){cls+=' disabled';if(n===qAns)cls+=' correct';else if(n===ea.selected)cls+=' wrong';else cls+=' dimmed';}h+='<button class="'+cls+'" data-choice="'+n+'" onclick="selectAnswer('+n+')"><span class="choice-num">'+n+'</span><span class="choice-text">'+escapeHtml(ch)+'</span></button>';});
  h+='</div>';
  if(ea)h+=renderResult(q,ea.selected);
  h+=renderNoteSection(q);
  // Nav: within same section
  const secQs=SECTIONS.find(s=>s.name===q.section);
  if(secQs){
    const qi=secQs.questions.indexOf(q);
    h+='<div class="quiz-nav">';
    if(qi>0)h+='<button onclick="loadQuestion(SECTIONS['+SECTIONS.indexOf(secQs)+'].questions['+(qi-1)+'])">← 이전</button>';else h+='<div></div>';
    if(qi<secQs.questions.length-1)h+='<button class="primary" onclick="loadQuestion(SECTIONS['+SECTIONS.indexOf(secQs)+'].questions['+(qi+1)+'])">다음 →</button>';
    h+='</div>';
  }
  h+='</div>';c.innerHTML=h;
}

function selectAnswer(num){const q=currentQ,k=getQKey(q);if(answerData[k])return;const qAns=parseInt(q.answer,10);const ic=num===qAns;answerData[k]={selected:num,correct:ic,timestamp:Date.now()};syncToCloud();document.querySelectorAll('.choice-btn').forEach(b=>{const n=parseInt(b.getAttribute('data-choice'));b.classList.add('disabled');if(n===qAns)b.classList.add('correct');else if(n===num&&!ic)b.classList.add('wrong');else b.classList.add('dimmed');});document.getElementById('choicesArea').insertAdjacentHTML('afterend',renderResult(q,num));buildBookList();updateStats();updateMemoCount();}
function renderResult(q,sel){const qAns=parseInt(q.answer,10);const ic=sel===qAns;let h='<div class="result-banner '+(ic?'correct':'wrong')+'"><span style="flex:1"><span class="result-icon">'+(ic?'✅':'❌')+'</span> '+(ic?'정답입니다!':'오답 — 정답은 '+qAns+'번입니다')+'</span><button class="retry-btn" onclick="resetOneAnswer()">🔄 다시 풀기</button></div>';if(q.explanation||q.reference||(q.explanation_images&&q.explanation_images.length)){h+='<div class="explanation-box"><h3>📖 해설</h3>';if(q.explanation)h+='<div class="expl-text">'+q.explanation+'</div>';if(q.reference)h+='<div class="expl-ref">📚 '+escapeHtml(q.reference)+'</div>';if(q.explanation_images&&q.explanation_images.length){h+='<div class="expl-images">';q.explanation_images.forEach(img=>{h+='<img src="'+img+'" onclick="openLightbox(\''+img+'\')" loading="lazy">';});h+='</div>';}h+='</div>';}return h;}
function renderNoteSection(q){const k=getQKey(q);let h='<div class="note-section"><div class="note-input-row"><textarea class="note-input" id="memoNoteInput" placeholder="메모 작성... (외워야 할 내용)"></textarea><button class="note-add-btn memo-btn" onclick="addMemoNote()">📝 메모</button></div>';const mn=memoNotes.filter(n=>n.qKey===k);if(mn.length){h+='<div class="note-list">';mn.forEach(n=>{h+='<div class="note-item memo-note"><div>'+escapeHtml(n.text)+'</div><div class="note-time">'+timeAgo(n.created)+'</div><button class="note-del" onclick="deleteNote(\'memo\','+n.id+')">×</button></div>';});h+='</div>';}h+='</div>';return h;}
function decrementView(k){if(viewData[k]&&viewData[k].count>0){viewData[k].count--;if(viewData[k].count===0)delete viewData[k];syncToCloud();buildBookList();if(currentQ&&getQKey(currentQ)===k)renderQuiz();}}
function resetView(k){delete viewData[k];syncToCloud();buildBookList();if(currentQ&&getQKey(currentQ)===k)renderQuiz();}
function resetAllViews(){if(!confirm('전체 조회수를 초기화하시겠습니까?'))return;viewData={};syncToCloud();buildBookList();updateStats();}
function resetOneAnswer(){if(!currentQ)return;const k=getQKey(currentQ);if(!answerData[k])return;delete answerData[k];syncToCloud();renderQuiz();buildBookList();updateStats();updateMemoCount();}
function resetAllAnswers(){if(!confirm('모든 풀이 기록을 초기화하시겠습니까?'))return;answerData={};syncToCloud();buildBookList();updateStats();if(viewMode==='grid'&&currentSectionIdx>=0)renderGrid(currentSectionIdx);}
function addWrongNote(){const i=document.getElementById('wrongNoteInput'),t=i.value.trim();if(!t||!currentQ)return;const k=getQKey(currentQ);wrongNotes.push({id:Date.now(),qKey:k,section:currentQ.section,qNum:currentQ.num,qText:currentQ.question.substring(0,50),text:t,created:Date.now()});i.value='';syncToCloud();renderQuiz();buildBookList();updateStats();updateMemoCount();renderMemoPanel();}
function addMemoNote(){const i=document.getElementById('memoNoteInput'),t=i.value.trim();if(!t||!currentQ)return;const k=getQKey(currentQ);memoNotes.push({id:Date.now(),qKey:k,section:currentQ.section,qNum:currentQ.num,qText:currentQ.question.substring(0,50),text:t,created:Date.now()});i.value='';syncToCloud();renderQuiz();updateMemoCount();renderMemoPanel();}
function deleteNote(type,id){if(type==='wrong')wrongNotes=wrongNotes.filter(n=>n.id!==id);else memoNotes=memoNotes.filter(n=>n.id!==id);syncToCloud();if(currentQ)renderQuiz();buildBookList();updateStats();updateMemoCount();renderMemoPanel();}
function updateStats(){const wc=Object.values(answerData).filter(a=>!a.correct).length;document.getElementById('statTotal').textContent=QUESTIONS.length;document.getElementById('statCorrect').textContent=Object.values(answerData).filter(a=>a.correct).length;document.getElementById('statWrong').textContent=wc;document.getElementById('statNotes').textContent=wc;document.getElementById('wrongCount').textContent=wc;}
function updateMemoCount(){document.getElementById('memoCount').textContent=memoNotes.length;}
function toggleMemo(){const p=document.getElementById('memoPanel');p.classList.toggle('open');if(p.classList.contains('open'))switchMemoTab('memo');}
function closeMemo(e){if(e){e.stopPropagation();e.preventDefault();}document.getElementById('memoPanel').classList.remove('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function switchMemoTab(t){currentMemoTab=t;document.getElementById('memoTabWrong').style.display=t==='wrong'?'':'none';document.getElementById('memoTabWrong').classList.toggle('active',t==='wrong');document.getElementById('memoTabMemo').style.display=t==='memo'?'':'none';document.getElementById('memoTabMemo').classList.toggle('active',t==='memo');document.getElementById('memoPanelTitle').innerHTML=t==='wrong'?'❌ 오답노트':'📝 메모';const prev=document.getElementById('memoWrongPreview');if(t!=='wrong')prev.style.display='none';const cb=document.getElementById('clearTabBtn');if(cb)cb.innerHTML=t==='wrong'?'🗑 오답 전체 초기화':'🗑 메모 전체 삭제';renderFilterChips();renderMemoPanel();}
function renderFilterChips(){const b=document.getElementById('memoFilterBar');b.innerHTML='';const a=document.createElement('button');a.className='memo-filter-chip'+(currentMemoFilter==='all'?' active':'');a.textContent='전체';a.onclick=()=>{currentMemoFilter='all';renderFilterChips();renderMemoPanel();};b.appendChild(a);SECTIONS.forEach(s=>{const c=document.createElement('button');c.className='memo-filter-chip'+(currentMemoFilter===s.name?' active':'');let cnt=0;if(currentMemoTab==='wrong'){cnt=QUESTIONS.filter(q=>q.section===s.name&&answerData[getQKey(q)]&&!answerData[getQKey(q)].correct).length;}else{cnt=memoNotes.filter(n=>n.section===s.name).length;}c.textContent=s.name+' ('+cnt+')';c.onclick=()=>{currentMemoFilter=s.name;renderFilterChips();renderMemoPanel();};b.appendChild(c);});}
function renderMemoPanel(){renderFilterChips();if(currentMemoTab==='wrong'){renderWrongList();return;}const ns=memoNotes;const f=currentMemoFilter==='all'?ns:ns.filter(n=>n.section===currentMemoFilter);const l=document.getElementById('memoList');if(!f.length){l.innerHTML='<div class="memo-empty">메모가 없습니다</div>';return;}let h='';f.sort((a,b)=>b.created-a.created).forEach(n=>{h+='<div class="memo-item note" onclick="jumpToQ(\''+n.qKey+'\',\''+String(n.section).replace(/\x27/g,"\\\x27")+'\','+n.qNum+')" title="클릭 → 문제로 이동"><div class="memo-q">'+n.section+' Q'+n.qNum+' · '+escapeHtml(n.qText)+'...</div><div class="memo-text">'+escapeHtml(n.text)+'</div><button class="memo-del" onclick="event.stopPropagation();deleteNote(\'memo\','+n.id+')">×</button></div>';});l.innerHTML=h;}
function renderWrongList(){const wrongQs=QUESTIONS.filter(q=>{const a=answerData[getQKey(q)];return a&&!a.correct;});const f=currentMemoFilter==='all'?wrongQs:wrongQs.filter(q=>q.section===currentMemoFilter);const l=document.getElementById('wrongList');if(!f.length){l.innerHTML='<div class="memo-empty">오답이 없습니다</div>';document.getElementById('memoWrongPreview').style.display='none';return;}let h='';f.forEach(q=>{const k=getQKey(q);const a=answerData[k];const txt=q.question.substring(0,60);h+='<div class="memo-item wrong" data-qkey="'+k+'" onclick="jumpToQ(\''+k+'\',\''+String(q.section).replace(/\x27/g,"\\\x27")+'\','+q.num+')" title="클릭 → 문제로 이동"><div class="memo-q">'+q.section+' Q'+q.num+'</div><div class="memo-text" style="font-size:12px;color:var(--text2);margin-top:2px">'+escapeHtml(txt)+'...</div><div style="font-size:11px;color:#f87171;margin-top:3px">내 답: '+a.selected+'번 → 정답: '+q.answer+'번</div><button class="memo-del" style="right:28px" title="미리보기" onclick="event.stopPropagation();previewWrongQ(\''+k+'\')">👁</button><button class="memo-del" title="이 오답 기록 삭제(재풀이 가능)" onclick="event.stopPropagation();deleteWrongOne(\''+k+'\')">×</button></div>';});l.innerHTML=h;}
function deleteWrongOne(qKey){if(!confirm('이 문제의 오답 기록을 삭제할까요? (다시 풀 수 있습니다)'))return;delete answerData[qKey];syncToCloud();renderMemoPanel();updateMemoCount();updateStats();buildBookList();if(currentQ&&getQKey(currentQ)===qKey)renderQuiz();}
function previewWrongQ(qKey){const q=QUESTIONS.find(q=>getQKey(q)===qKey);if(!q)return;const a=answerData[qKey];const prev=document.getElementById('memoWrongPreview');document.querySelectorAll('#wrongList .memo-item').forEach(el=>el.classList.toggle('selected',el.getAttribute('data-qkey')===qKey));let h='<div class="preview-header"><span>'+q.section+' Q'+q.num+'</span><button onclick="document.getElementById(\'memoWrongPreview\').style.display=\'none\'">×</button></div>';h+='<div class="preview-q">'+q.question+'</div>';h+='<div class="preview-choices">';const qAnsP=parseInt(q.answer,10);for(let i=1;i<=5;i++){if(!q['choice'+i])continue;let cls='';if(i===qAnsP)cls='correct-choice';else if(a&&i===a.selected)cls='wrong-choice';h+='<div class="'+cls+'">'+i+'. '+escapeHtml(q['choice'+i])+'</div>';}h+='</div>';h+='<button class="preview-go" onclick="jumpToQ(\''+qKey+'\',\''+String(q.section).replace(/\x27/g,"\\\x27")+'\','+q.num+')">문제로 이동 →</button>';prev.innerHTML=h;prev.style.display='block';}
function jumpToQ(qKey,fbSection,fbNum){let q=QUESTIONS.find(q=>getQKey(q)===qKey);if(!q&&fbSection!=null&&fbNum!=null){q=QUESTIONS.find(qq=>qq.section===fbSection&&String(qq.num)===String(fbNum));}if(!q){alert('해당 문제를 찾을 수 없습니다. 문항이 재정비되어 키가 달라졌을 수 있어요.');return;}const si=SECTIONS.findIndex(s=>s.name===q.section);if(si>=0)currentSectionIdx=si;if(window.innerWidth<=900){const p=document.getElementById('memoPanel');if(p)p.classList.remove('open');}loadQuestion(q);}
function showWrongNote(){const p=document.getElementById('memoPanel');if(!p.classList.contains('open'))p.classList.add('open');switchMemoTab('wrong');document.getElementById('memoWrongPreview').style.display='none';}
function showWrongReview(){showWrongNote();}
function exportNotes(){let t='===== 정형외과 전문의 시험 노트 =====\n\n';const wrongQs=QUESTIONS.filter(q=>{const a=answerData[getQKey(q)];return a&&!a.correct;});if(wrongQs.length){t+='[ 오답노트 ]\n\n';wrongQs.forEach(q=>{const a=answerData[getQKey(q)];t+='['+q.section+' Q'+q.num+'] '+q.question.substring(0,80)+'\n  내 답: '+a.selected+'번 / 정답: '+q.answer+'번\n\n';});}if(memoNotes.length){t+='\n[ 메모 ]\n\n';memoNotes.forEach(n=>{t+='['+n.section+' Q'+n.qNum+'] '+n.text+'\n\n';});}const b=new Blob([t],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='오답노트_메모.txt';a.click();}
function clearCurrentTab(){if(currentMemoTab==='wrong'){if(!confirm('모든 오답 기록을 초기화하시겠습니까?'))return;answerData={};syncToCloud();renderMemoPanel();updateMemoCount();updateStats();if(currentQ)renderQuiz();buildBookList();return;}if(!confirm('현재 탭의 모든 메모를 삭제하시겠습니까?'))return;memoNotes=[];syncToCloud();renderMemoPanel();updateMemoCount();if(currentQ)renderQuiz();}
function initMemoResize(){const p=document.getElementById('memoPanel'),h=document.getElementById('memoResizeHandle');if(!h||!p)return;let sx,sw,r=false;h.addEventListener('mousedown',e=>{e.preventDefault();r=true;sx=e.clientX;sw=p.offsetWidth;h.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});document.addEventListener('mousemove',e=>{if(!r)return;p.style.width=Math.max(280,Math.min(800,sw+(sx-e.clientX)))+'px';p.style.minWidth=p.style.width;});document.addEventListener('mouseup',()=>{if(!r)return;r=false;h.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';});}
document.addEventListener('keydown',e=>{
  if(!currentQ||viewMode!=='quiz')return;
  if(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT')return;
  const k=getQKey(currentQ);
  if(answerData[k]){
    if(e.key==='ArrowRight'){const sec=SECTIONS.find(s=>s.name===currentQ.section);if(sec){const qi=sec.questions.indexOf(currentQ);if(qi<sec.questions.length-1)loadQuestion(sec.questions[qi+1]);}}
    if(e.key==='ArrowLeft'){const sec=SECTIONS.find(s=>s.name===currentQ.section);if(sec){const qi=sec.questions.indexOf(currentQ);if(qi>0)loadQuestion(sec.questions[qi-1]);}}
    if(e.key==='Escape'||e.key==='Backspace')goBack();
    return;
  }
  const n=parseInt(e.key);if(n>=1&&n<=currentQ.choices.length)selectAnswer(n);
});
</script>
</body>
</html>
