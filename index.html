<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2023 정형외과 전문의 시험</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sidebar-w:240px;--memo-w:340px;
  --dark:#181b20;--dark2:#1f2329;--dark3:#282d36;--dark4:#323844;
  --accent:#4a90d9;--accent2:#6cb2f7;--accent-glow:rgba(74,144,217,.12);
  --text:#d8dce4;--text2:#8b919e;--text3:#5c6370;
  --border:rgba(255,255,255,.06);
  --content-bg:#f8f9fb;--card-bg:#fff;
  --heading1:#1a2332;--heading2:#243044;--heading3:#344256;--body-text:#3a4553;
  --correct:#4caf50;--wrong:#f44336;--correct-bg:rgba(76,175,80,.08);--wrong-bg:rgba(244,67,54,.06)
}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;background:var(--content-bg);color:var(--body-text);display:flex;height:100vh;overflow:hidden}

/* ====== SIDEBAR (간소화) ====== */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--dark);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;border-right:1px solid rgba(255,255,255,.03)}
.sidebar-header{padding:22px 20px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(74,144,217,.08) 0%,transparent 100%)}
.sidebar-header h1{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sidebar-header .sub{font-size:10.5px;color:var(--text2);margin-top:5px}
.user-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--dark2)}
.user-bar .user-info{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.user-bar .user-icon{width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.user-bar .logout-btn{padding:3px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text3);font-size:10.5px;cursor:pointer;font-family:inherit;transition:all .15s}
.user-bar .logout-btn:hover{border-color:#f44;color:#f44}

/* 책 목록 */
.book-list{flex:1;overflow-y:auto;padding:12px}
.book-item{padding:14px 16px;margin-bottom:8px;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--dark2);position:relative}
.book-item:hover{background:var(--dark3);border-color:var(--dark4);transform:translateX(2px)}
.book-item.active{background:var(--accent-glow);border-color:var(--accent);box-shadow:0 0 12px rgba(74,144,217,.15)}
.book-item .book-icon{font-size:20px;margin-bottom:6px}
.book-item .book-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.book-item.active .book-title{color:var(--accent2)}
.book-item .book-stats{display:flex;gap:8px;margin-top:8px;font-size:10px}
.book-item .book-stats span{padding:2px 8px;border-radius:8px;font-weight:600}
.book-stat-total{background:var(--dark3);color:var(--text2)}
.book-stat-done{background:rgba(76,175,80,.15);color:var(--correct)}
.book-stat-wrong{background:rgba(244,67,54,.1);color:var(--wrong)}
.book-item .book-progress{margin-top:8px;height:3px;background:var(--dark4);border-radius:2px;overflow:hidden}
.book-item .book-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* 사이드 하단 버튼 */
.sidebar-bottom{padding:0 12px 12px;display:flex;flex-direction:column;gap:6px}
.sidebar-bottom button{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:var(--dark2);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;font-family:inherit;font-weight:600}
.sidebar-bottom button:hover{background:var(--dark3);border-color:var(--dark4)}
.sidebar-bottom .count{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700}
.sidebar-bottom .wrong-count{background:var(--wrong)}

/* ====== MAIN ====== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:10px 28px;border-bottom:1px solid #e5e8ed;background:#fff;font-size:13px;color:#555;display:flex;align-items:center;justify-content:space-between;min-height:44px;font-weight:500}
.main-header .back-btn{padding:5px 14px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#555;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;display:none}
.main-header .back-btn:hover{border-color:var(--accent);color:var(--accent)}
.content-area{flex:1;overflow-y:auto;padding:36px 52px 100px}
.content-area::-webkit-scrollbar{width:5px}
.content-area::-webkit-scrollbar-thumb{background:#d0d3d9;border-radius:3px}

/* ====== WELCOME ====== */
.welcome{text-align:center;padding-top:60px}
.welcome h2{font-size:26px;color:var(--heading1);margin-bottom:10px;font-weight:800}
.welcome p{color:var(--text2);font-size:13.5px;line-height:1.6}
.welcome .stats{display:flex;gap:48px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.welcome .stat-num{font-size:36px;font-weight:800;letter-spacing:-.5px}
.welcome .stat-num.blue{color:var(--accent)}.welcome .stat-num.green{color:var(--correct)}.welcome .stat-num.red{color:var(--wrong)}.welcome .stat-num.orange{color:#ff9800}
.welcome .stat-label{font-size:12px;color:var(--text2);margin-top:2px;font-weight:500}
.welcome .reset-views{margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.welcome .reset-views button{padding:8px 20px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#777;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.welcome .reset-views button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ====== QUESTION GRID ====== */
.grid-view{max-width:900px;margin:0 auto}
.grid-view h2{font-size:22px;font-weight:800;color:var(--heading1);margin-bottom:6px}
.grid-view .grid-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.grid-view .grid-controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.grid-controls button{padding:6px 14px;border:1px solid #d0d3d9;border-radius:8px;background:#fff;color:#777;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.grid-controls button:hover{border-color:var(--accent);color:var(--accent)}
.grid-controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.q-group{margin-bottom:24px}.q-group-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px;padding:8px 14px;background:rgba(74,144,217,.08);border-radius:8px;border-left:3px solid var(--accent);display:flex;align-items:center;justify-content:space-between}.q-group-stats{font-size:11px;color:var(--text2);font-weight:500}
.q-card{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #e0e3e8;background:#fff;transition:all .2s;position:relative;overflow:hidden}
.q-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,144,217,.15)}
.q-card .q-card-num{font-size:18px;font-weight:800;color:var(--heading2)}
.q-card .q-card-views{font-size:9px;color:var(--text2);margin-top:2px;font-weight:600}
.q-card.answered-correct{border-color:var(--correct);background:var(--correct-bg)}
.q-card.answered-correct .q-card-num{color:var(--correct)}
.q-card.answered-wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.q-card.answered-wrong .q-card-num{color:var(--wrong)}
.q-card.has-note::after{content:'';position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#ff9800}

/* ====== QUIZ CARD ====== */
.quiz-card{max-width:820px;margin:0 auto}
.quiz-meta{background:linear-gradient(135deg,#f0f4fa 0%,#e8edf6 100%);border-radius:12px;padding:20px 24px;margin-bottom:24px;border-left:5px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.quiz-meta .meta-section{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.quiz-meta .meta-num{font-size:13px;color:#6a7585;font-weight:600}
.quiz-meta .meta-views{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:3px 10px;background:rgba(74,144,217,.1);border-radius:12px;font-size:11px;color:var(--accent);font-weight:600}
.quiz-meta .meta-minus-btn,.quiz-meta .meta-reset-btn{background:none;border:1px solid rgba(74,144,217,.3);color:var(--accent);padding:1px 7px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;margin-left:4px;font-family:inherit}
.quiz-meta .meta-minus-btn:hover,.quiz-meta .meta-reset-btn:hover{background:var(--accent);color:#fff}
.quiz-question{font-size:16px;font-weight:700;color:var(--heading1);line-height:1.7;margin-bottom:24px;padding:18px 22px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #e8eaef}
.quiz-question img{max-width:100%;border-radius:8px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.quiz-question img:hover{transform:scale(1.02)}
.quiz-choices{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.choice-btn{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border:2px solid #e0e3e8;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;font-size:14.5px;line-height:1.6;color:var(--body-text)}
.choice-btn:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateX(4px)}
.choice-btn .choice-num{min-width:32px;height:32px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#666;flex-shrink:0;transition:all .2s}
.choice-btn:hover .choice-num{background:var(--accent);color:#fff}
.choice-btn .choice-text{padding-top:4px;flex:1}
.choice-btn.correct{border-color:var(--correct);background:var(--correct-bg)}
.choice-btn.correct .choice-num{background:var(--correct);color:#fff}
.choice-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.choice-btn.wrong .choice-num{background:var(--wrong);color:#fff}
.choice-btn.disabled{pointer-events:none;opacity:.85}
.choice-btn.dimmed{opacity:.5}
.result-banner{padding:16px 22px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:15px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.result-banner.correct{background:var(--correct-bg);color:var(--correct);border:1px solid rgba(76,175,80,.2)}
.result-banner.wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid rgba(244,67,54,.15)}
.result-banner .result-icon{font-size:24px}
.retry-btn{background:rgba(255,255,255,.85);color:#333;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s ease}
.retry-btn:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.explanation-box{background:#fff;border-radius:12px;padding:22px 24px;border:1px solid #e8eaef;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:20px;animation:slideIn .4s ease}
.explanation-box h3{font-size:15px;font-weight:800;color:var(--heading1);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.explanation-box .expl-text{font-size:14px;line-height:1.8;color:var(--body-text)}
.explanation-box .expl-ref{margin-top:12px;font-size:12px;color:var(--accent);font-weight:600;padding:6px 12px;background:var(--accent-glow);border-radius:8px;display:inline-block}
.explanation-box .expl-images{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.explanation-box .expl-images img{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:transform .2s}
.explanation-box .expl-images img:hover{transform:scale(1.02)}
.note-section{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.note-input-row{display:flex;gap:8px}
.note-input{flex:1;padding:10px 14px;border:1px solid #d0d3d9;border-radius:10px;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:120px;line-height:1.5;transition:border .2s}
.note-input:focus{border-color:var(--accent)}
.note-input::placeholder{color:#aaa}
.note-add-btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.note-add-btn.wrong-btn{background:var(--wrong);color:#fff}
.note-add-btn.wrong-btn:hover{background:#d32f2f}
.note-add-btn.memo-btn{background:var(--accent);color:#fff}
.note-add-btn.memo-btn:hover{background:#3a7bc8}
.note-list{margin-top:10px}
.note-item{background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:8px;border-left:4px solid;font-size:13px;line-height:1.6;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.note-item.wrong-note{border-color:var(--wrong);background:var(--wrong-bg)}
.note-item.memo-note{border-color:var(--accent);background:var(--accent-glow)}
.note-item .note-del{position:absolute;top:8px;right:10px;cursor:pointer;color:#ccc;font-size:16px;transition:color .15s;background:none;border:none}
.note-item .note-del:hover{color:var(--wrong)}
.note-item .note-time{font-size:10px;color:#999;margin-top:4px}
.quiz-nav{display:flex;gap:10px;margin-top:24px;justify-content:space-between}
.quiz-nav button{padding:10px 24px;border:1px solid #d0d3d9;border-radius:10px;background:#fff;color:#555;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.quiz-nav button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.quiz-nav button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.quiz-nav button.primary:hover{background:#3a7bc8}
.lightbox{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 4px 30px rgba(0,0,0,.5)}
/* Memo panel */
.memo-panel{width:0;min-width:0;background:var(--dark);color:var(--text);transition:all .3s ease;overflow:hidden;display:flex;flex-direction:column;height:100vh;border-left:1px solid var(--border);position:relative}
.memo-panel.open{width:var(--memo-w);min-width:var(--memo-w)}
.memo-panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.memo-panel-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.memo-close{cursor:pointer;color:var(--text2);font-size:20px;padding:4px;transition:color .15s;background:none;border:none}
.memo-close:hover{color:#fff}
.memo-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--dark2)}
.memo-tab-btn{flex:1;padding:9px 4px;border:none;background:none;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:inherit;font-weight:600;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.memo-tab-btn:hover{color:var(--text);background:var(--dark3)}
.memo-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.memo-filter-bar{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--dark)}
.memo-filter-chip{padding:4px 10px;border:1px solid var(--border);border-radius:12px;background:none;color:var(--text3);font-size:10.5px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.memo-filter-chip:hover{border-color:var(--text2);color:var(--text)}
.memo-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.memo-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.memo-tab-content{display:none;flex:1;flex-direction:column;overflow:hidden}
.memo-tab-content.active{display:flex}
.memo-list{flex:1;overflow-y:auto;padding:10px}
.memo-empty{text-align:center;padding:48px 18px;color:var(--text3);font-size:12.5px;line-height:1.7}
.memo-item{background:var(--dark2);border-radius:8px;padding:12px 14px;margin-bottom:8px;font-size:12.5px;line-height:1.55;position:relative;border-left:3px solid;transition:background .15s;cursor:pointer}
.memo-item:hover{background:var(--dark3)}
.memo-item.wrong{border-left-color:var(--wrong)}.memo-item.note{border-left-color:var(--accent)}
.memo-item .memo-q{font-size:10.5px;color:var(--accent2);margin-bottom:5px;font-weight:600}
.memo-item .memo-text{color:var(--text)}
.memo-item .memo-del{position:absolute;top:8px;right:10px;cursor:pointer;color:var(--text3);font-size:15px;transition:color .15s;background:none;border:none}
.memo-item .memo-del:hover{color:#f44}
.memo-export{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.memo-export button{width:100%;padding:9px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:12.5px;cursor:pointer;font-weight:700;font-family:inherit;transition:background .15s}
.memo-export button:hover{background:#3a7bc8}
.memo-export .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text2)}
.memo-export .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.memo-resize-handle{width:5px;cursor:col-resize;background:transparent;position:absolute;left:0;top:0;bottom:0;z-index:10;transition:background .2s}
.memo-resize-handle:hover,.memo-resize-handle.active{background:var(--accent)}
/* Login */
.login-overlay{position:fixed;inset:0;z-index:99999;background:var(--dark);display:flex;align-items:center;justify-content:center}
.login-box{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:40px 36px 32px;width:340px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-box h2{color:#fff;font-size:22px;text-align:center;margin-bottom:4px;font-weight:800}
.login-box .login-sub{color:var(--text2);font-size:12px;text-align:center;margin-bottom:24px}
.login-box label{display:block;color:var(--text2);font-size:11.5px;font-weight:600;margin-bottom:5px;margin-top:14px}
.login-box input[type="text"],.login-box input[type="password"]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--dark3);color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border .2s}
.login-box input:focus{border-color:var(--accent)}
.login-box .login-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit}
.login-box .login-btn:hover{background:#3a7bc8}
.login-box .login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-box .login-error{color:#f44;font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.sync-indicator{position:fixed;top:8px;right:8px;z-index:9999;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;display:none}
.sync-indicator.syncing{display:flex;background:var(--accent);color:#fff}
.sync-indicator.synced{display:flex;background:#4caf50;color:#fff}
.sync-indicator.error{display:flex;background:#f44;color:#fff}
@keyframes floatIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hamburger{display:none;position:fixed;top:8px;left:8px;z-index:200;width:40px;height:40px;border:none;border-radius:10px;background:var(--dark);color:#fff;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;backdrop-filter:blur(2px)}
.mobile-memo-fab{display:none;position:fixed;bottom:20px;right:20px;z-index:140;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(74,144,217,.4);align-items:center;justify-content:center}
@media(max-width:768px){
  .hamburger{display:flex}.mobile-memo-fab{display:flex!important}

function doLogin(){const i=document.getElementById('loginId').value.trim(),p=document.getElementById('loginPw').value,e=document.getElementById('loginError'),b=document.getElementById('loginBtn');e.textContent='';if(!i||!p){e.textContent='아이디와 비밀번호를 입력하세요';return;}const em=i.includes('@')?i:i+'@'+EMAIL_DOMAIN;b.disabled=true;b.textContent='로그인 중...';console.log('[Auth] 로그인 시도:',em);const loginTimeout=setTimeout(()=>{e.textContent='서버 응답 없음. 네트워크를 확인하세요.';b.disabled=false;b.textContent='로그인';},15000);auth.signInWithEmailAndPassword(em,p).then(()=>{clearTimeout(loginTimeout);console.log('[Auth] 로그인 성공');}).catch(err=>{console.log('[Auth] 로그인 실패:',err.code,err.message);if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential'){console.log('[Auth] 새 계정 생성 시도');auth.createUserWithEmailAndPassword(em,p).then(()=>{clearTimeout(loginTimeout);console.log('[Auth] 계정 생성 성공');}).catch(e2=>{clearTimeout(loginTimeout);console.log('[Auth] 계정 생성 실패:',e2.code,e2.message);let m='로그인 실패';if(e2.code==='auth/weak-password')m='비밀번호 6자 이상 입력하세요';else if(e2.code==='auth/email-already-in-use')m='비밀번호가 틀렸습니다';else if(e2.code==='auth/network-request-failed')m='네트워크 오류 — 인터넷 연결을 확인하세요';else m=e2.message;e.textContent=m;b.disabled=false;b.textContent='로그인';});}else{clearTimeout(loginTimeout);let m=err.message;if(err.code==='auth/wrong-password')m='비밀번호가 틀렸습니다';else if(err.code==='auth/network-request-failed')m='네트워크 오류 — 인터넷 연결을 확인하세요';else if(err.code==='auth/too-many-requests')m='로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요';e.textContent=m;b.disabled=false;b.textContent='로그인';}});}

function startOffline(){document.getElementById('loginOverlay').style.display='none';offlineMode=true;localStorage.setItem(PREFIX+'_mode','offline');loadLocalData();initApp();}
function loadLocalData(){wrongNotes=JSON.parse(localStorage.getItem(PREFIX+'_wrong')||'[]');memoNotes=JSON.parse(localStorage.getItem(PREFIX+'_memos')||'[]');viewData=JSON.parse(localStorage.getItem(PREFIX+'_views')||'{}');answerData=JSON.parse(localStorage.getItem(PREFIX+'_answers')||'{}');}
(function(){const s=localStorage.getItem(PREFIX+'_mode');if(s==='offline'){document.getElementById('loginOverlay').style.display='none';offlineMode=true;loadLocalData();if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>initApp());else setTimeout(()=>initApp(),0);}})();
function doLogout(){if(!confirm('로그아웃 하시겠습니까?'))return;localStorage.removeItem(PREFIX+'_mode');auth.signOut();location.reload();}
auth.onAuthStateChanged(u=>{console.log('[Auth] 상태 변경:',u?u.email:'로그아웃');if(offlineMode)return;if(u){currentUser=u;document.getElementById('loginOverlay').style.display='none';document.getElementById('userBar').style.display='flex';localStorage.setItem(PREFIX+'_mode','firebase');const n=u.email.replace(/@.*$/,'');document.getElementById('userDisplayName').textContent=n;document.querySelector('.user-icon').textContent=n.charAt(0).toUpperCase();loadFromFirestore().then(()=>{firestoreReady=true;initApp();}).catch(err=>{console.error('[Auth] Firestore 로드 실패:',err);firestoreReady=false;loadLocalData();initApp();});}else{currentUser=null;firestoreReady=false;document.getElementById('loginOverlay').style.display='flex';document.getElementById('userBar').style.display='none';document.getElementById('loginBtn').disabled=false;document.getElementById('loginBtn').textContent='로그인';}});
async function loadFromFirestore(){if(!currentUser)return;showSync('syncing','☁️ 동기화 중...');try{const d=await db.collection('users').doc(currentUser.uid).get();if(d.exists){const data=d.data();wrongNotes=data.wrongNotes||[];memoNotes=data.memoNotes||[];viewData=data.viewData||{};answerData=data.answerData||{};}else{loadLocalData();if(wrongNotes.length||memoNotes.length||Object.keys(viewData).length||Object.keys(answerData).length){await saveToFirestore();showSync('synced','✅ 기존 데이터 이전 완료');return;}}showSync('synced','✅ 동기화 완료');}catch(e){showSync('error','❌ 동기화 실패');loadLocalData();}}
function syncToCloud(){localStorage.setItem(PREFIX+'_wrong',JSON.stringify(wrongNotes));localStorage.setItem(PREFIX+'_memos',JSON.stringify(memoNotes));localStorage.setItem(PREFIX+'_views',JSON.stringify(viewData));localStorage.setItem(PREFIX+'_answers',JSON.stringify(answerData));if(!firestoreReady||!currentUser)return;clearTimeout(syncDebounceTimer);syncDebounceTimer=setTimeout(()=>saveToFirestore(),1500);}
async function saveToFirestore(){if(!currentUser)return;try{await db.collection('users').doc(currentUser.uid).set({wrongNotes,memoNotes,viewData,answerData,lastUpdated:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){showSync('error','❌ 저장 실패');}}
</script>

98: Elite 2022. Vol1. \uc885\uc591 pg90", "section": "1\ucc28 2\uad50\uc2dc", "question_images": [], "explanation_images": ["images/img_0132.jpg"]}, {"num": 15, "question": "60\uc138 \ub0a8\uc790 \ubc29\uc0ac\uc120 \uac80\uc0ac\uc5d0\uc11c \uc6d0\uc704\ub300\ud1f4\uace8\uc5d0 \uace8\uc218\uac15 \ub0b4 \uc74c\uc601\uac10\uc18c \ubc0f \uc11d\ud68c\ud654 \ubcd1\ubcc0\uc774 \uc6b0\uc5f0\ud788 \uad00\ucc30\ub418\uc5c8\ub2e4. MRI \uc5d0\uc11c \ud06c\uae30\ub294 6cm\uc600\uace0 \uace8\ub0b4\ub9c9\uc758 \uce68\uc2dd(endosteal scalloping) \ubc0f \ud53c\uc9c8\uace8 \ud33d\ub300\uac00 \uad00\ucc30\ub418\uc5c8\ub2e4. \uc801\uc808\ud55c \uce58\ub8cc\ub97c \uace0\ub974\uc2dc\uc624.", "choices": ["\uad11\ubc94\uc704\uc808\uc81c", "\uace0\uc8fc\ud30c \uc735\ud574\uc220", "\uacbd\uacfc\uad00\ucc30", "\ubc29\uc0ac\uc120\uce58\ub8cc", "\uc870\uc9c1\uac80\uc0ac"], "answer": 5, "explanation": "\ucca8\ubd80\ud55c \uc0ac\uc9c4\uc758 ELITE enchondroma\uc5d0\uc11c \uc545\uc131\uc744 \uc2dc\uc0ac\ud558\ub294 X-ray \uc18c\uacac\uc5d0\uc11c endosteal scalloping\uacfc \ud53c\uc9c8\uace8 \ud33d\ub300\uac00 \uc788\uc2b5\ub2c8\ub2e4. \uce58\ub8cc \ud30c\ud2b8\uc758 \uc0ac\uc9c4\uc744 \ubcf4\uba74 \ubc29\uc0ac\uc120 \uc0c1 \uc800\uc545\uc131\ub3c4\uc758 \uc885\uc591\uacfc \uac10\ubcc4\ud574\uc57c\ud560 \uacbd\uc6b0 \ubcd1\uc18c\ub97c \uc644\uc804\ud788 \uc18c\ud30c\ud558\uac70\ub098 \uc18c\ud30c\ud6c4 \uace8 \uc774\uc2dd\uc744 \ud558\uac70\ub098 \uc2dc\uba58\ud2b8\ub97c \ucda9\uc804\ud55c\ub2e4\uace0 \ub418\uc788\uc2b5\ub2c8\ub2e4. \ubcf4\uae30\uc5d0 \ud574\ub2f9 \ub2f5\uc774 \uc5c6\ub294\ub370 \uc545\uc131 \uac10\ubcc4\uc774 \ud544\uc694\ud558\uae30 \ub54c\ubb38\uc5d0 \uc18c\ud30c\ub97c \ud558\uba74\uc11c \uc870\uc9c1\uac80\uc0ac\ub97c \ud558\ub294\uac83\uc774 \uc801\uc808\ud560 \uac83\uc73c\ub85c \ubcf4\uc785\ub2c8\ub2e4.", "reference": "\ucd9c\ucc98: Elite 2022. Vol1. \uc885\uc591 pg80-81", "section": "1\ucc28 2\uad50\uc2dc", "question_images": [], "explanation_images": ["images/img_0133.jpg", "images/img_0134.jpg"]}, {"num": 16, "question": "\ub2e4\uc74c \uc124\uba85\uc5d0 \ud574\ub2f9\ud558\ub294 \uc5f0\ubd80\uc870\uc9c1 \uc885\uc591\uc740?", "choices": ["Undifferentiated pleomorphic sarcoma", "Myxoid fibrosarcoma", "Myxoid liposarcoma", "Leiomyosarcoma", "Rhabdomyosarcoma"], "answer": 3, "explanation": "", "reference": "> \ub300\uc815 pg 575 \ud574\ub2f9 \ub0b4\uc6a9 \uc810\uc561\uc131 \uc9c0\ubc29\uc721\uc885\uc740 \ub2e4\ub978 \uc5f0\ubd80\uc870\uc9c1 \uc721\uc885\ub4e4\uacfc \ub2ec\ub9ac \ubcf5\uac15 \ub0b4 \uc5f0\ubd80\uc870\uc9c1, \uc885\uaca9\uc774\ub098 \ucc99\ucd94 \ub4f1 \ud3d0 \uc678\uc758 \uc804\uc774(extra-pulmonary metastasis)\uac00 \ud754\ud788 \ubc1c\uc0dd\ud558\ubbc0\ub85c \ubcd1\uae30 \uacb0\uc815\uc774\ub098 \uc218\uc220 \ud6c4 \ucd94\uc801 \uac80\uc0ac \uc2dc \uc8fc\uc758\ud574\uc57c\ud55c\ub2e4.", "section": "1\ucc28 2\uad50\uc2dc", "question_images": [], "explanation_images": []}, {"num": 17, "question": "27\uc138 \ub0a8\uc790\uac00 \ud5c8\ubc85\uc9c0 \uc885\uad34\uac00 \uc788\ub2e4. \uc870\uc9c1\uac80\uc0ac\uc0c1 \uba5c\ub77c\ub2cc \uc0c9\uc18c \uce68\ucc29\uc744 \ubcf4\uc600\ub2e4. FISH \uac80\uc0ac\uc5d0\uc11c EWSR1-ATF1 \uc720\uc804\uc790 \uacb0\ud569\uc744 \ubcf4\uc600\ub2e4. \uc9c4\ub2e8\uc740?", "choices": ["\uace8\uc678\uc131 \uc720\uc775\uc721\uc885 (extraosseous Ewing sarcoma)", "\uace8\uc678\uc131 \uc810 extraosseous myxoid chondrosarcoma", "\uc545\uc131 \ud751\uc0dd\uc885(Malignant melanoma)", "\ud22c\uba85\uc138\ud3ec\uc885(Clear cell carcinoma)", "\ud3ec\uc0c1 \uc5f0\ubd80 \uc721\uc885(alveolar soft part sarcoma)"], "answer": 4, "explanation": "Clear cell carcinoma", "reference": "> \ub300\uc815 pg 557 Clear cell carcinoma EWS-ATF1 Pg 581 \ud574\ub2f9 \ub0b4\uc6a9. \ud22c\uba85\uc138\ud3ec\uc721\uc885(Clear cell sarcoma) \ub9e4\uc6b0 \ub4dc\ubb38 \uc885\uc591\uc73c\ub85c, 20,30\ub300\uc5d0 \ud638\ubc1c\ud55c\ub2e4. \ubc1c\uacfc \uc871\uad00\uc808\uc758 \uac74\ub9c9, \uac74\ucd08\uc5d0\uc11c \uc0dd\uaca8 \uadfc\ub9c9\uc744 \ub530\ub77c \ud37c\uc9c0\uba70 \ubb34\ub98e\uc774\ub098 \uc0c1\uc9c0\uc5d0\uc11c\ub3c4 \ubc1c\uc0dd\ud55c\ub2e4. \ub9bc\ud504\uc808 \uc804\uc774\ub97c \uc798\ud558\uba70, \uba5c\ub77c\ub2cc \uc0c9\uc18c\uac00 \uc874\uc7ac\ud558\uace0 \uba74\uc5ed\uc870\uc9c1\ud654\ud559\uac80\uc0ac\uc18c\uacac\uc774 \ud751\uc0c9\uc885\uacfc \ube44\uc2b7\ud55c \uc810 \ub4f1\uc73c\ub85c \uc778\ud558\uc5ec \uacfc\uac70\uc5d0\ub294 \uc5f0\ubd80\uc870\uc9c1\uc5d0 \uc0dd\uae30\ub294 \uc545\uc131\ud751\uc0c9\uc885\uc758 \ubcc0\uc885\uc774\ub77c\uace0 \uc54c\ub824\uc84c\ub358 \uc885\uc591\uc774\ub2e4. \ud22c\uba85\uc138\ud3ec\uc721\uc885\uc740 \ud751\uc0c9\uc885\uacfc \ub2ec\ub9ac \ud53c\ubd80\ub97c \uce68\ubc94\ud558\uc9c0 \uc54a\uc73c\uba70, t(12;22)(q13;q12) \uc5fc\uc0c9\uccb4 \uc804\uc704\ub85c \uc778\ud574 ESWR1-ATF1 \uc735\ud569\uc720\uc804\uc790\uac00 90% \uc774\uc0c1\uc758 \ud658\uc790\uc5d0\uc11c \ubc1c\ud604\ub41c\ub2e4. \uc808\ubc18 \uc774\uc0c1\uc5d0\uc11c \ub9bc\ud504\uc808 \uc804\uc774\ub97c \ud558\uba70, \ud3d0\uc640 \ubf08\uc5d0\ub3c4 \uc798 \uc804\uc774 \ub41c\ub2e4. 5\ub144, 10\ub144, 20\ub144 \uc0dd\uc874\uc728\uc740 \uac01\uac01 67%, 33%. 10%\uc815\ub3c4\ub85c 5\ub144 \uc774\ud6c4\uc5d0 \uc804\uc774\uc640 \uc7ac\ubc1c\uc774 \ubc1c\uc0dd\ud558\ub294 \uacbd\uc6b0\ub3c4 \ub9ce\ub2e4. \uce58\ub8cc\ub294 \uad11\ubc94\uc704 \uc808\uc81c\uc220 \ud6c4\uc5d0 \ubc29\uc0ac\uc120 \uce58\ub8cc\uc640 \ud654\ud559\uc694\ubc95\uc744 \ubcf4\uc870\uc801\uc73c\ub85c \uc2dc\ud589\ud55c\ub2e4. \ub9bc\ud504\uc808 \uc804\uc774\uac00 \uc788\uc744 \uacbd\uc6b0 \ub9bc\ud504\uc808\uacfd\uccad\uc220(lymph node dissection)\uc774 \ud544\uc694\ud560 \uc218 \uc788\ub2e4.", "section": "1\ucc28 2\uad50\uc2dc", "question_images": [], "explanation_images": ["images/img_0135.jpg"]}, {"num": 18, "question": "17\uc138 \uc5ec\uc790 \uc6b0\uce21 \ub300\ud1f4\ubd80\uc5d0 \ubb34\ud1b5\uc131 \uc885\uad34\uac00 \uc0dd\uaca8 \ub0b4\uc6d0\ud558\uc600\ub2e4. \ub9ce\uc774 \uac78\uc73c\uba74 \uc885\uad34\uac00 \uce   {name:"유니온 3권",icon:"📔",questions:QUESTIONS.filter(q=>q.section==="유니온 3권")},
  {name:"유니온 4권",icon:"📙",questions:QUESTIONS.filter(q=>q.section==="유니온 4권")}
];

let currentQ=null,currentQIdx=-1,currentSectionIdx=-1,wrongNotes=[],memoNotes=[],viewData={},answerData={},currentMemoTab='wrong',currentMemoFilter='all',appInitialized=false;
let viewMode='welcome'; // welcome | grid | quiz

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function timeAgo(ts){const d=Date.now()-ts,s=Math.floor(d/1000);if(s<60)return'방금 전';const m=Math.floor(s/60);if(m<60)return m+'분 전';const h=Math.floor(m/60);if(h<24)return h+'시간 전';const dy=Math.floor(h/24);if(dy<30)return dy+'일 전';return new Date(ts).toLocaleDateString('ko-KR');}
function getQKey(q){return q.section+'_'+q.num;}

function initApp(){
  if(appInitialized)return;appInitialized=true;
  const ub=document.getElementById('userBar');ub.style.display='flex';
  if(offlineMode){document.getElementById('userDisplayName').textContent='오프라인 모드';document.querySelector('.user-icon').textContent='📴';document.getElementById('logoutBtn').textContent='로그인 전환';document.getElementById('logoutBtn').onclick=()=>{localStorage.removeItem(PREFIX+'_mode');location.reload();};}
  buildBookList();updateStats();updateMemoCount();renderMemoPanel();initMemoResize();
}

function buildBookList(){
  const list=document.getElementById('bookList');list.innerHTML='';
  SECTIONS.forEach((sec,si)=>{
    const qs=sec.questions;
    const done=qs.filter(q=>answerData[getQKey(q)]).length;
    const correct=qs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
    const wrong=done-correct;
    const pct=qs.length?Math.round(done/qs.length*100):0;
    const item=document.createElement('div');
    item.className='book-item'+(currentSectionIdx===si?' active':'');
    item.onclick=()=>showGrid(si);
    item.innerHTML='<div class="book-icon">'+sec.icon+'</div><div class="book-title">'+sec.name+'</div><div class="book-stats"><span class="book-stat-total">'+qs.length+'문제</span>'+(correct?'<span class="book-stat-done">✓'+correct+'</span>':'')+(wrong?'<span class="book-stat-wrong">✗'+wrong+'</span>':'')+'</div><div class="book-progress"><div class="book-progress-bar" style="width:'+pct+'%"></div></div>';
    list.appendChild(item);
  });
}

function showGrid(si){
  currentSectionIdx=si;viewMode='grid';currentQ=null;
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('quizContainer').style.display='none';
  document.getElementById('gridContainer').style.display='block';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('headerTitle').textContent=SECTIONS[si].name;
  document.getElementById('headerProgress').textContent='';
  buildBookList();
  // Close mobile sidebar
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
  renderGrid(si);
  document.getElementById('contentArea').scrollTop=0;
}

function renderGrid(si){
  const sec=SECTIONS[si],qs=sec.questions;
  const done=qs.filter(q=>answerData[getQKey(q)]).length;
  const correct=qs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
  let h='<div class="grid-view"><h2>'+sec.icon+' '+sec.name+'</h2>';
  h+='<div class="grid-sub">'+qs.length+'문제 · '+done+'문제 풀이 완료 (정답 '+correct+', 오답 '+(done-correct)+')</div>';
  h+='<div class="grid-controls"><button class="active" onclick="gridFilter(\'all\',this)">전체</button><button onclick="gridFilter(\'unsolved\',this)">안 푼 문제</button><button onclick="gridFilter(\'wrong\',this)">오답만</button><button onclick="gridFilter(\'noted\',this)">오답노트</button></div>';
  // Check if questions have chapter info
  const hasChapters=qs.some(q=>q.chapter&&q.chapter!=='일반');
  if(hasChapters){
    // Group by chapter
    const chapterOrder=[];const chapterMap={};
    qs.forEach((q,qi)=>{
      const ch=q.chapter||'기타';
      if(!chapterMap[ch]){chapterMap[ch]=[];chapterOrder.push(ch);}
      chapterMap[ch].push({q,qi});
    });
    chapterOrder.forEach(ch=>{
      const items=chapterMap[ch];
      const gDone=items.filter(it=>answerData[getQKey(it.q)]).length;
      const gCorrect=items.filter(it=>{const a=answerData[getQKey(it.q)];return a&&a.correct;}).length;
      h+='<div class="q-group"><div class="q-group-title"><span>📂 '+ch+' ('+items.length+')</span><span class="q-group-stats">'+gDone+'/'+items.length+' 풀이'+(gCorrect?' · ✓'+gCorrect:'')+'</span></div>';
      h+='<div class="q-grid">';
      items.forEach(it=>{
        const q=it.q,qi=it.qi,k=getQKey(q),a=answerData[k],v=viewData[k];
        let cls='q-card';
        if(a){cls+=a.correct?' answered-correct':' answered-wrong';}
        if(wrongNotes.some(n=>n.qKey===k))cls+=' has-note';
        const views=v?v.count+'회':'';
        h+='<div class="'+cls+'" data-qkey="'+k+'" data-status="'+(a?(a.correct?'correct':'wrong'):'unsolved')+'" data-noted="'+(wrongNotes.some(n=>n.qKey===k)?'1':'0')+'" onclick="loadQuestion(SECTIONS['+si+'].questions['+qi+'])"><div class="q-card-num">'+q.num+'</div>'+(views?'<div class="q-card-views">'+views+'</div>':'')+'</div>';
      });
      h+='</div></div>';
    });
  } else {
    // Chunk by 30
    const CHUNK=30;const numGroups=Math.ceil(qs.length/CHUNK);
    for(let g=0;g<numGroups;g++){
      const start=g*CHUNK,end=Math.min((g+1)*CHUNK,qs.length);
      const groupQs=qs.slice(start,end);
      const gDone=groupQs.filter(q=>answerData[getQKey(q)]).length;
      const gCorrect=groupQs.filter(q=>{const a=answerData[getQKey(q)];return a&&a.correct;}).length;
      const label=groupQs[0].num+'~'+groupQs[groupQs.length-1].num+'번';
      h+='<div class="q-group"><div class="q-group-title"><span>📂 '+label+'</span><span class="q-group-stats">'+gDone+'/'+groupQs.length+' 풀이'+(gCorrect?' · ✓'+gCorrect:'')+'</span></div>';
      h+='<div class="q-grid">';
      groupQs.forEach((q,gi)=>{
        const qi=start+gi,k=getQKey(q),a=answerData[k],v=viewData[k];
        let cls='q-card';
        if(a){cls+=a.correct?' answered-correct':' answered-wrong';}
        if(wrongNotes.some(n=>n.qKey===k))cls+=' has-note';
        const views=v?v.count+'회':'';
        h+='<div class="'+cls+'" data-qkey="'+k+'" data-status="'+(a?(a.correct?'correct':'wrong'):'unsolved')+'" data-noted="'+(wrongNotes.some(n=>n.qKey===k)?'1':'0')+'" onclick="loadQuestion(SECTIONS['+si+'].questions['+qi+'])"><div class="q-card-num">'+q.num+'</div>'+(views?'<div class="q-card-views">'+views+'</div>':'')+'</div>';
      });
      h+='</div></div>';
    }
  }
  h+='</div>';
  document.getElementById('gridContainer').innerHTML=h;
}

function gridFilter(mode,btn){
  document.querySelectorAll('.grid-controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach(c=>{
    const status=c.getAttribute('data-status'),noted=c.getAttribute('data-noted');
    let show=true;
    if(mode==='unsolved')show=status==='unsolved';
    else if(mode==='wrong')show=status==='wrong';
    else if(mode==='noted')show=noted==='1';
    c.style.display=show?'':'none';
  });
  document.querySelectorAll('.q-group').forEach(g=>{
    const cards=g.querySelectorAll('.q-card');
    const anyVisible=Array.from(cards).some(c=>c.style.display!=='none');
    g.style.display=anyVisible?'':'none';
  });
}

function goBack(){
  if(viewMode==='quiz'&&currentSectionIdx>=0){showGrid(currentSectionIdx);}
  else{viewMode='welcome';document.getElementById('welcomeScreen').style.display='';document.getElementById('gridContainer').style.display='none';document.getElementById('quizContainer').style.display='none';document.getElementById('backBtn').style.display='none';document.getElementById('headerTitle').textContent='문제를 선택하세요';document.getElementById('headerProgress').textContent='';currentSectionIdx=-1;buildBookList();}
}

function openLightbox(src){const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML='<img src="'+src+'">';document.body.appendChild(lb);}

function loadQuestion(q){
  currentQ=q;currentQIdx=QUESTIONS.indexOf(q);viewMode='quiz';
  const k=getQKey(q);
  if(!viewData[k])viewData[k]={count:0,lastViewed:0};
  viewData[k].count++;viewData[k].lastViewed=Date.now();syncToCloud();
  document.getElementById('welcomeScreen').style.display='none';
  document.getElementById('gridContainer').style.display='none';
  document.getElementById('quizContainer').style.display='block';
  document.getElementById('backBtn').style.display='inline-block';
  document.getElementById('headerTitle').textContent=q.section+' · Q'+q.num;
  const secQs=SECTIONS.find(s=>s.name===q.section);
  const doneInSec=secQs?secQs.questions.filter(qq=>answerData[getQKey(qq)]).length:0;
  const totalInSec=secQs?secQs.questions.length:0;
  document.getElementById('headerProgress').textContent=doneInSec+'/'+totalInSec+' 풀이 완료';
  if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
  renderQuiz();buildBookList();
  document.getElementById('contentArea').scrollTop=0;
}

function renderQuiz(){
  const q=currentQ,k=getQKey(q),c=document.getElementById('quizContainer');
  const v=viewData[k];let vh='';
  if(v&&v.count>0)vh='<div class="meta-views">👁 '+v.count+'회 조회 · '+timeAgo(v.lastViewed)+' <button class="meta-minus-btn" onclick="decrementView(\''+k+'\')">−1</button><button class="meta-reset-btn" onclick="resetView(\''+k+'\')">✕ 초기화</button></div>';
  let h='<div class="quiz-card"><div class="quiz-meta"><div class="meta-section">'+q.section+'</div><div class="meta-num">문제 '+q.num+'</div>'+vh+'</div>';
  h+='<div class="quiz-question">'+escapeHtml(q.question);
  if(q.question_images&&q.question_images.length)q.question_images.forEach(img=>{h+='<br><img src="'+img+'" onclick="openLightbox(\''+img+'\')" loading="lazy">';});
  h+='</div>';
  const ea=answerData[k];
  h+='<div class="quiz-choices" id="choicesArea">';
  q.choices.forEach((ch,i)=>{const n=i+1;let cls='choice-btn';if(ea){cls+=' disabled';if(n===q.answer)cls+=' correct';else if(n===ea.selected)cls+=' wrong';else cls+=' dimmed';}h+='<button class="'+cls+'" data-choice="'+n+'" onclick="selectAnswer('+n+')"><span class="choice-num">'+n+'</span><span class="choice-text">'+escapeHtml(ch)+'</span></button>';});
  h+='</div>';
  if(ea)h+=renderResult(q,ea.selected);
  h+=renderNoteSection(q);
  // Nav: within same section
  const secQs=SECTIONS.find(s=>s.name===q.section);
  if(secQs){
    const qi=secQs.questions.indexOf(q);
    h+='<div class="quiz-nav">';
    if(qi>0)h+='<button onclick="loadQuestion(SECTIONS['+SECTIONS.indexOf(secQs)+'].questions['+(qi-1)+'])">← 이전</button>';else h+='<div></div>';
    if(qi<secQs.questions.length-1)h+='<button class="primary" onclick="loadQuestion(SECTIONS['+SECTIONS.indexOf(secQs)+'].questions['+(qi+1)+'])">다음 →</button>';
    h+='</div>';
  }
  h+='</div>';c.innerHTML=h;
}

function selectAnswer(num){const q=currentQ,k=getQKey(q);if(answerData[k])return;const ic=num===q.answer;answerData[k]={selected:num,correct:ic,timestamp:Date.now()};syncToCloud();document.querySelectorAll('.choice-btn').forEach(b=>{const n=parseInt(b.getAttribute('data-choice'));b.classList.add('disabled');if(n===q.answer)b.classList.add('correct');else if(n===num&&!ic)b.classList.add('wrong');else b.classList.add('dimmed');});document.getElementById('choicesArea').insertAdjacentHTML('afterend',renderResult(q,num));buildBookList();updateStats();updateMemoCount();}
function renderResult(q,sel){const ic=sel===q.answer;let h='<div class="result-banner '+(ic?'correct':'wrong')+'"><span style="flex:1"><span class="result-icon">'+(ic?'✅':'❌')+'</span> '+(ic?'정답입니다!':'오답 — 정답은 '+q.answer+'번입니다')+'</span><button class="retry-btn" onclick="resetOneAnswer()">🔄 다시 풀기</button></div>';if(q.explanation||q.reference||(q.explanation_images&&q.explanation_images.length)){h+='<div class="explanation-box"><h3>📖 해설</h3>';if(q.explanation)h+='<div class="expl-text">'+q.explanation+'</div>';if(q.reference)h+='<div class="expl-ref">📚 '+escapeHtml(q.reference)+'</div>';if(q.explanation_images&&q.explanation_images.length){h+='<div class="expl-images">';q.explanation_images.forEach(img=>{h+='<img src="'+img+'" onclick="openLightbox(\''+img+'\')" loading="lazy">';});h+='</div>';}h+='</div>';}return h;}
function renderNoteSection(q){const k=getQKey(q);let h='<div class="note-section"><div class="note-input-row"><textarea class="note-input" id="wrongNoteInput" placeholder="오답노트 작성..."></textarea><button class="note-add-btn wrong-btn" onclick="addWrongNote()">❌ 오답노트</button></div><div class="note-input-row"><textarea class="note-input" id="memoNoteInput" placeholder="메모 작성... (외워야 할 내용)"></textarea><button class="note-add-btn memo-btn" onclick="addMemoNote()">📝 메모</button></div>';const wn=wrongNotes.filter(n=>n.qKey===k),mn=memoNotes.filter(n=>n.qKey===k);if(wn.length||mn.length){h+='<div class="note-list">';wn.forEach(n=>{h+='<div class="note-item wrong-note"><div>'+escapeHtml(n.text)+'</div><div class="note-time">'+timeAgo(n.created)+'</div><button class="note-del" onclick="deleteNote(\'wrong\','+n.id+')">×</button></div>';});mn.forEach(n=>{h+='<div class="note-item memo-note"><div>'+escapeHtml(n.text)+'</div><div class="note-time">'+timeAgo(n.created)+'</div><button class="note-del" onclick="deleteNote(\'memo\','+n.id+')">×</button></div>';});h+='</div>';}h+='</div>';return h;}
function decrementView(k){if(viewData[k]&&viewData[k].count>0){viewData[k].count--;if(viewData[k].count===0)delete viewData[k];syncToCloud();buildBookList();if(currentQ&&getQKey(currentQ)===k)renderQuiz();}}
function resetView(k){delete viewData[k];syncToCloud();buildBookList();if(currentQ&&getQKey(currentQ)===k)renderQuiz();}
function resetAllViews(){if(!confirm('전체 조회수를 초기화하시겠습니까?'))return;viewData={};syncToCloud();buildBookList();updateStats();}
function resetOneAnswer(){if(!currentQ)return;const k=getQKey(currentQ);if(!answerData[k])return;delete answerData[k];syncToCloud();renderQuiz();buildBookList();updateStats();updateMemoCount();}
function resetAllAnswers(){if(!confirm('모든 풀이 기록을 초기화하시겠습니까?'))return;answerData={};syncToCloud();buildBookList();updateStats();if(viewMode==='grid'&&currentSectionIdx>=0)renderGrid(currentSectionIdx);}
function addWrongNote(){const i=document.getElementById('wrongNoteInput'),t=i.value.trim();if(!t||!currentQ)return;const k=getQKey(currentQ);wrongNotes.push({id:Date.now(),qKey:k,section:currentQ.section,qNum:currentQ.num,qText:currentQ.question.substring(0,50),text:t,created:Date.now()});i.value='';syncToCloud();renderQuiz();buildBookList();updateStats();updateMemoCount();renderMemoPanel();}
function addMemoNote(){const i=document.getElementById('memoNoteInput'),t=i.value.trim();if(!t||!currentQ)return;const k=getQKey(currentQ);memoNotes.push({id:Date.now(),qKey:k,section:currentQ.section,qNum:currentQ.num,qText:currentQ.question.substring(0,50),text:t,created:Date.now()});i.value='';syncToCloud();renderQuiz();updateMemoCount();renderMemoPanel();}
function deleteNote(type,id){if(type==='wrong')wrongNotes=wrongNotes.filter(n=>n.id!==id);else memoNotes=memoNotes.filter(n=>n.id!==id);syncToCloud();if(currentQ)renderQuiz();buildBookList();updateStats();updateMemoCount();renderMemoPanel();}
function updateStats(){document.getElementById('statTotal').textContent=QUESTIONS.length;document.getElementById('statCorrect').textContent=Object.values(answerData).filter(a=>a.correct).length;document.getElementById('statWrong').textContent=Object.values(answerData).filter(a=>!a.correct).length;document.getElementById('statNotes').textContent=wrongNotes.length;document.getElementById('wrongCount').textContent=wrongNotes.length;}
function updateMemoCount(){document.getElementById('memoCount').textContent=wrongNotes.length+memoNotes.length;}
function toggleMemo(){document.getElementById('memoPanel').classList.toggle('open');}
function closeMemo(e){if(e){e.stopPropagation();e.preventDefault();}document.getElementById('memoPanel').classList.remove('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function switchMemoTab(t){currentMemoTab=t;document.querySelectorAll('.memo-tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='wrong')||(i===1&&t==='memo')));document.getElementById('memoTabWrong').classList.toggle('active',t==='wrong');document.getElementById('memoTabMemo').classList.toggle('active',t==='memo');renderFilterChips();renderMemoPanel();}
function renderFilterChips(){const b=document.getElementById('memoFilterBar');b.innerHTML='';const a=document.createElement('button');a.className='memo-filter-chip'+(currentMemoFilter==='all'?' active':'');a.textContent='전체';a.onclick=()=>{currentMemoFilter='all';renderFilterChips();renderMemoPanel();};b.appendChild(a);SECTIONS.forEach(s=>{const c=document.createElement('button');c.className='memo-filter-chip'+(currentMemoFilter===s.name?' active':'');const items=currentMemoTab==='wrong'?wrongNotes.filter(n=>n.section===s.name):memoNotes.filter(n=>n.section===s.name);c.textContent=s.name+' ('+items.length+')';c.onclick=()=>{currentMemoFilter=s.name;renderFilterChips();renderMemoPanel();};b.appendChild(c);});}
function renderMemoPanel(){renderFilterChips();const ns=currentMemoTab==='wrong'?wrongNotes:memoNotes;const f=currentMemoFilter==='all'?ns:ns.filter(n=>n.section===currentMemoFilter);const lid=currentMemoTab==='wrong'?'wrongList':'memoList';const l=document.getElementById(lid);if(!f.length){l.innerHTML='<div class="memo-empty">'+(currentMemoTab==='wrong'?'오답노트가 없습니다':'메모가 없습니다')+'</div>';return;}let h='';f.sort((a,b)=>b.created-a.created).forEach(n=>{h+='<div class="memo-item '+(currentMemoTab==='wrong'?'wrong':'note')+'" onclick="jumpToQ(\''+n.qKey+'\')"><div class="memo-q">'+n.section+' Q'+n.qNum+' · '+escapeHtml(n.qText)+'...</div><div class="memo-text">'+escapeHtml(n.text)+'</div><button class="memo-del" onclick="event.stopPropagation();deleteNote(\''+currentMemoTab+'\','+n.id+')">×</button></div>';});l.innerHTML=h;}
function jumpToQ(qKey){const q=QUESTIONS.find(q=>getQKey(q)===qKey);if(q){const si=SECTIONS.findIndex(s=>s.name===q.section);if(si>=0)currentSectionIdx=si;loadQuestion(q);}}
function showWrongReview(){
  const wrongQs=QUESTIONS.filter(q=>{const a=answerData[getQKey(q)];return(a&&!a.correct)||wrongNotes.some(n=>n.qKey===getQKey(q));});
  if(!wrongQs.length){alert('오답 문제가 없습니다.');return;}
  loadQuestion(wrongQs[0]);
}
function exportNotes(){let t='===== 정형외과 전문의 시험 노트 =====\n\n';if(wrongNotes.length){t+='[ 오답노트 ]\n\n';wrongNotes.forEach(n=>{t+='['+n.section+' Q'+n.qNum+'] '+n.text+'\n\n';});}if(memoNotes.length){t+='\n[ 메모 ]\n\n';memoNotes.forEach(n=>{t+='['+n.section+' Q'+n.qNum+'] '+n.text+'\n\n';});}const b=new Blob([t],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='오답노트_메모.txt';a.click();}
function clearCurrentTab(){const lb=currentMemoTab==='wrong'?'오답노트':'메모';if(!confirm('현재 탭의 모든 '+lb+'를 삭제하시겠습니까?'))return;if(currentMemoTab==='wrong')wrongNotes=[];else memoNotes=[];syncToCloud();renderMemoPanel();updateMemoCount();updateStats();if(currentQ)renderQuiz();buildBookList();}
function initMemoResize(){const p=document.getElementById('memoPanel'),h=document.getElementById('memoResizeHandle');if(!h||!p)return;let sx,sw,r=false;h.addEventListener('mousedown',e=>{e.preventDefault();r=true;sx=e.clientX;sw=p.offsetWidth;h.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});document.addEventListener('mousemove',e=>{if(!r)return;p.style.width=Math.max(280,Math.min(800,sw+(sx-e.clientX)))+'px';p.style.minWidth=p.style.width;});document.addEventListener('mouseup',()=>{if(!r)return;r=false;h.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';});}
document.addEventListener('keydown',e=>{
  if(!currentQ||viewMode!=='quiz')return;
  if(document.activeElement.tagName==='TEXTAREA'||document.activeElement.tagName==='INPUT')return;
  const k=getQKey(currentQ);
  if(answerData[k]){
    if(e.key==='ArrowRight'){const sec=SECTIONS.find(s=>s.name===currentQ.section);if(sec){const qi=sec.questions.indexOf(currentQ);if(qi<sec.questions.length-1)loadQuestion(sec.questions[qi+1]);}}
    if(e.key==='ArrowLeft'){const sec=SECTIONS.find(s=>s.name===currentQ.section);if(sec){const qi=sec.questions.indexOf(currentQ);if(qi>0)loadQuestion(sec.questions[qi-1]);}}
    if(e.key==='Escape'||e.key==='Backspace')goBack();
    return;
  }
  const n=parseInt(e.key);if(n>=1&&n<=currentQ.choices.length)selectAnswer(n);
});
</script>
