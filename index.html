치료는?","choices":["경관관찰","관절경적 세척술","관혈적 변연 절제술","이단계 재치환술","일단계 재치환술"],"answer":3,"explanation":"이전 야마였습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e069.jpg?v=1776535000"]},{"num":70,"question":"건강한 60세 남자 환자 내원 2일전 우측 슬관절의 심한 통증과 종창이 발생하였다. 주사 시술등의 침습적인 치료를 시행한 적은 없다. 관절 천자 검사상 WBC 20000 PMN 80% glucose 130 이었으며, 혈액검사상 WBC 15000 CRP 12.3 uric acid 4.6 (정상) glucose 120 이었다. 방사선 검사상 관절강 내에 석회화 침착이 있었으며, 관절 액의 편광현미경 검사상 약한 이중양성 굴절성을 보이는 장사방형의 결정이 관찰되었다. 적절한 치료는?","choices":["경구 항생제 투여","관절내 희알루론산 투여","관절경적 변연절제술","비스테로이드 소염제 투여","콜키친 투여"],"answer":4,"explanation":"이전 야마였습니다.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e070.jpg?v=1776535000"]},{"num":71,"question":"21세 남자 농구선수로 3년 전부터 슬관절 통증과 불안감이 있었으며, patellar apprehension test 양성소견이었다. X-ray 상 하지정렬은 정상이었으며 TT-TG distance 11mm, Insall-Salvati ratio 1.2, congruency angle 13도, sulcus angle 140도 였다. MRI 상 MPFL의 전구성 파열 관찰되었으며, 관절 내 유리체는 없었다. 치료로 옳은 것은?","choices":["경골결절 내이전술","경골결절 전내이전술","내측대퇴슬개인대 재건술","석고고정 및 기능회복운동","외측지대유리술"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e071.jpg?v=1776535000"]},{"num":72,"question":"30세 남자환자 4주 전 슬관절 다친 후 15도의 굴곡 구축이 지속된다. MRI 상 double PCL sign 관찰되며 다른 이상소견은 없었다. 수술이 필요한 구조물은?","choices":["medial meniscus","MPFL","MCL","ACL","PCL"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e072.jpg?v=1776535000"]},{"num":73,"question":"슬관절 불안정성 검사 중 전방 십자인대에 특이도가 높은 검사이며, 수술 여부를 결정하는데 도움을 주는 검사?","choices":["External rotation rotation test","Anterior drawer test","Pivot shift test","Dial test","Lachman test"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e073.jpg?v=1776535000"]},{"num":74,"question":"전방십자인대 재건술 후3개월 된 환자가 슬관절 통증 및 관절운동 제한이 발생하여 내원하였다. 이학적 검사 상 전방 불안정성은 보이지 않았고 굴곡 제한은 30도, 후속 굴곡은 120도로 확인되었다. 원인은?","choices":["경골 터널 전방","경골 터널 후방","과도한 과간절흔 성형술","대퇴 터널 전방","대퇴 터널 후방"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e074.jpg?v=1776535000"]},{"num":75,"question":"35세 남자 1일전 축구차다 수상하여 발생한 심한 통증 및 부종 있었다. 굴곡구축 30도, 후속 굴곡 90도로되어있었다.MRI상 전방 십자인대 대퇴 부착부 완전 파열 소견과 내측 반월상 연골판의 비전위성 파열소견이 관찰되었다. 현시점에서 치료는?","choices":["연골판 봉합술","석고붕대","전방 십자인대 봉합술","통증 조절 및 관절운동 회복","전방 십자인대 재건술"],"answer":4,"explanation":"엘리트 슬관절학 125페이지<br>수상 후 1~3주 정도 지연하여 수술 전 rom 회복 되고, 심한 부종 등의 급성 염증 소견이 소실된 후에 수술적 처치를 시행해야한다<br>본 환자는 수상한지 1일째로 현 시점에서의 치료는 통증 조절 및 관절운동 회복","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e075.jpg?v=1776535000"]},{"num":76,"question":"25세 남자로, 1주일전 축구차다 수상하였다. 외반 불안정성 grade 3 및 통증이 지속되었으며 내측 측부인대 경골 부착부의 압통 있었다. MRI상 MCL tibial attach 부위에 stenar lesion이 관찰되었으며, 후방 십자인대의 부분 손상 관찰되었다. 치료는?","choices":["석고붕대","관절경적 평가 및 보조기 착용","내측측부인대 봉합술","후방십자인대 재건술","후방십자인대 재건술 및 내측측부인대 봉합술"],"answer":3,"explanation":"엘리트 슬관절학 2021 1차, 2020 2차 유사기출<br>내측측부인대 경골 부착부 stenar lesion은 수술적 처치를 시행한다","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e076.jpg?v=1776535000"]},{"num":77,"question":"20세 남자 2주전 교통사고시 좌측 경골결절 직접 수상하였다. 동요검사상 건측에 비해 후방 전위 5mm 더 발생했다. MRI상 PCL 연속성은 관찰되었으나, PCL 경골 부착부 5mm 크기의 골편 확인 되었다. 치료는?","choices":["관절경적 후방십자인대 재건술","관절경적 골편제거술","관절경적 정복 및 내고정","관혈적 정복 및 내고정","보조기 및 대퇴사두근 기능적 운동"],"answer":5,"explanation":"보조기 및 대퇴사두근 기능적 운동<br>‘후방십자인대 견열골절’로 전위가 있으며, 불안정성이 있을 때(10mm 이상 후방전위, grade II ) 수술적 처치를 고려 할 수 있겠으나, 문제 환자의 경우 수상 후 2주 경과 하였고 건측 대비 5mm 후방 전위로 보존적 처치 시행 할 수 있겠습니다.<br>>> 대정 8판 2부 p1364","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e077.jpg?v=1776535000"]},{"num":78,"question":"19세 남자, 1년전 PCL 재건술 후 지속되는 슬관절 통증 및 불안정증으로 내원하였다. Post. Draw test 상 고도전위 Posterolateral draw test 양성보였다. 방사선 검사상 mechanical axis varus 2도, post. slope 8도, MRI상 PCL 연속성은 유지 되어 보이나, 외측 측부인대 얇아져 있었다. 치료는?","choices":["근위경골 절골술","근위경골 절골술 + 후외측인대 재건술","후방십자인대 재재건술","후방십자인대 재재건술 + 후외측인대 재건술","후외측인대 재건술"],"answer":4,"explanation":". ** 기출 동일 22년 1차 유니온 79번","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e078.jpg?v=1776535000"]},{"num":79,"question":"60세 여자가 1달전부터 우측 무릎 통증 및 심한 부종이 있어 3주간 비스테로이드성 소염진통제를 복용하였으나 호전이 없었다. 방사선 검사상 Kellgren-Lawrence grade 1의 관절염 소견과 MRI상 대퇴 내과, 근위경골 내과, 대퇴 활차에 각각 0.5cm2 크기의 outerbridge grade II 연골손상이 보였으며 활액막염과 심한 종창소견을 보였다. 혈액검사 정상이었다. 다음 치료로 적당한 것은??","choices":["경구 글루코사민","경구 아세트아미노펜","경구 트라마돌","관절내 스테로이드 주입","관절내 하이알루론산 주입"],"answer":4,"explanation":"신출이라 확실하지 않습니다. ELITE 슬관절 p. 492 기존 기출에 비슷한 열령대에 외상없이 통증 발생한 경우 SPONK 문제가 있었으나 이번 문제에 MRI 상에 necrosis 소견이나 bone bruise 와 같이 necrosis 초기 소견을 주지 않았으며 mFC, mTC, trochlea 에 OA 소견 및 활액막염, 종창 소견만 주었고 보기 모두 관절염에서 비수술적 치료에 사용하는 약제입니다<br>레퍼런스 : 슬관절학 2권 924p 관절염 환자에서 슬관절전치환술 외의 치료법<br>보기 5개 모두 약물요법과 주사요법에 해당하며 감염소견 없이 3주간의 NSAIDs 사용에도 호전없고 활액막염 소견이 보인다고 하여 정답은 라.","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e079.jpg?v=1776535000"]},{"num":80,"question":"15세 남자가 3개월전부터 슬관절 통증 및 활동시 악화되는 부종을 호소한다. 방사선검사상 대퇴내과 외측부 2cm2 크기의 골괴사 및 주변 방사선 음영 증가 소견이 관찰되었고 MRI상 골연골펀은 분리되었으나 제자리에 있으며 결손부와 골연골편 사이 액체 신호(fluid signal)이 관찰되었다. 적절한 치료는?","choices":["골연골편 고정술","골연골편 제거술","보조기","연골 재생술","천공술"],"answer":1,"explanation":"ELITE 슬관절 p48<br>나이 15로 변경, fluid signal 보여 OCD stage III,","reference":"","section":"2023년 1차","chapter":"1교시","explanation_images":["images/2023_1차_1교시_e080.jpg?v=1776535000"]},{"num":1,"question":"인체의 연골은 가해지는 힘에 대해 탄성체처럼 변화한다. 이 때 가해지는 압박력에 해단 저항과 조직 내로의 액체의 이동에 관여하는 구성성분은 무엇인가","choices":["Noncollagenous protein","glycoprotein","Collagen 2","collagen6","glycosaminoglycan"],"answer":5,"explanation":"편집자 : 해설로 본다면 답은 5..?","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e001.jpg?v=1776535000"]},{"num":2,"question":"활액막이 고갈되어도 윤활제가 얇게라도 흡착되어 두 접촉면을 미끄럽게 함으로, 관절 표면을 보호하는 윤활기전과 이에 관여하는 물질은","choices":["경계윤활 - lubricin","경계윤활 - fibronectin","경계윤활 - collagen","압착막윤활 – anchorin CII","압착막윤활 – lubricin"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e002.jpg?v=1776535000"]},{"num":3,"question":"고관절 및 슬관절 인공관절 치환술 후 발생하는 대표적인 마모의 조합으로 옳은 것은? 고관절 – 슬관절","choices":["부식 점착","연마 점착","연마 피로","부식 피로","점착 연마"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e003.jpg?v=1776535000"]},{"num":4,"question":"동종이식물 보관 방법에 관한 설명이다. 다음에 해당하는 것은?","choices":["냉동보존(cryopreservation)","sterile air drying(무균공기건조)","저온 냉장 (cold storage, 4°C)","감마선 조사","fresh frozen"],"answer":5,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e004.jpg?v=1776535000"]},{"num":5,"question":"다음 중 A 와 B 를 고르시오. 금속물 중 티타늄은 \"A\" 가 다른 금속물과 다르게 피질골과 비슷하게 작아서 금속내정이나 금속치환물 스템에 사용할 수 있으며 B 현상을 막을 수 있다.","choices":["탄성 계수 – 응력 차단","탄성 계수 – 골융해","피로 강도 – 응력 차단","피로 강도 – 골융해","마찰 계수 – 응력 차단"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e005.jpg?v=1776535000"]},{"num":6,"question":"주관절 구축에서 물리치료를 시행하였다. 30초에서 1분간 지속적으로 일정한 힘을 가하였을 때, 처음에는 변화가 없다가 시간이 지나면서 신연(stretching)이 되는 것은 무엇인가?","choices":["네킹 (necking)","응력이완 (stress relaxation)","이력 (hysteresis)","인성 (toughness)","포복 (creep)"],"answer":5,"explanation":"","reference":"Elite 총론 p.8 기존과 거의 동일","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e006.jpg?v=1776535000"]},{"num":7,"question":"골수내정 고정술을 시행받은 대퇴골 간부의 골절부위에 가해지는 역학적 힘이다. 섬유조직은 형성을 억제하고, 골성 조직의 형성은 촉진하는 것은?","choices":["신연력","압박력","염전력","전단력","정수 긴장력"],"answer":2,"explanation":"","reference":"대한정형외과학 7판 p. 88 치유의 촉진","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e007.jpg?v=1776535000"]},{"num":8,"question":"다음 치료 기법은?","choices":["간섭파치료","극초단파치료","근육 및 신경 자극요법","체외충격파치료","초음파치료"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e008.jpg?v=1776535000"]},{"num":9,"question":"교통사고로 인한 다발성 골절로 치료 받은 환자의 골절부 유합 및 증상이 고정되었다.맥브라이드법으로 계산한 장애율이 우측 발목관절 10프로 좌측 무릎관절 10프로이다. 맥브라이드법으로 계산한 복합 장애율은?","choices":["10%","15%","17.5%","19%","20%"],"answer":4,"explanation":"10% + (100-10)/100*10% = 19%<br>2022년 Elite 2권 총론 pg.514 참고","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e009.jpg?v=1776535000"]},{"num":10,"question":"17세 여자가 계단에서 넘어진 뒤 무릎에 통증과 종창이 발생하였다. 3개월 전부터 간헐적인 통증은 있었다고 하며 방사선 검사상 원위 대퇴골 골간단에 톱니 모양의 불규칙한 짧은 사상 골절 (Short oblique fracture)가 관찰되었다. 적절한 조치는?","choices":["골수내정을 이용한 내고정술","생검술","석고고정 후 경과관찰","외고정술","MRI 검사"],"answer":5,"explanation":"대한정형외과학 7판 p.374 골종양 개론, p. 1465 대퇴골 골절<br>17세의 비교적 어린 나이에 low energy trauma로 수상하였으나 high energy trauma에 의해 발생하는 transverse or short oblique fracture가 발생하였으며 골절면도 불규칙한 상태이다. 병적 골절이 의심되는 상태에서 further evaluation이 필요하고 (나) 혹은 (마)를 생각할 수 있다. 어떠한 종양이든 생검은 마지막 단계에 이루어져야 하기 때문에 답은 MRI 검사로 생각할 수 있다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e010.jpg?v=1776535000"]},{"num":11,"question":"54세 남자가 대퇴골 원위부 후방 피질골에 인접하여 후방으로 돌출된 골종양이 있다. 종양의 모양이 화골성 근염 혹은 골연골종과 감별이 필요한 골육종은?","choices":["고등급 표면 골육종 (high grade surface osteosarcoma)","모세혈관 확장성 골육종 (telangiectatic osteosarcoma)","방골성 골육종 (parosteal osteosarcoma)","이차성 골육종 (secondary osteosarcoma)","전형적 골육종 (conventional osteosarcoma)"],"answer":3,"explanation":"대한정형외과학 p. 418","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e011.jpg?v=1776535000"]},{"num":12,"question":"Ifosfamide와 cyclophosphamide 의 특정적인 합병증은?","choices":["간독성","경련","심독성","이독성","출혈성 방광염"],"answer":5,"explanation":"Ref) Uptodate; Chemotherapy and radiation-related hemorrhagic cystitis in cancer patients","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e012.jpg?v=1776535000"]},{"num":13,"question":"소파술후 충전제 중에서 종양의 재발을 가장 알기 쉬운 것은?","choices":["allobone","autogenous bone","Bone cement","DBM","Artificial bone graft substitute"],"answer":3,"explanation":"Elite 2022. Vol1. 종양 p.120","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e013.jpg?v=1776535000"]},{"num":14,"question":"55세 여자 방사선 검사에서 근위 상완골 불규칙한 석회화 병변이 우연히 관찰되었다. MRI상 병변의 크기는 1x2x2cm이었고 병변은 골수강내 국한되어있으며 피질골로의 침범 없었다. 적절한 치료를 고르시오.","choices":["광범위 소파술","소파술","광범위 절제술","경과관찰","경피적 고주파 소작술"],"answer":4,"explanation":"enchondroma 입니다. 빈출되는 문제입니다. 이 환자에서는 enchondroma에서 악성이 의심되는 소견이 보이지 않으므로 답은 '4'가 되겠습니다.","reference":"출처: Elite 2022. Vol1. 종양 pg90","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e014.jpg?v=1776535000"]},{"num":15,"question":"60세 남자 방사선 검사에서 원위대퇴골에 골수강 내 음영감소 및 석회화 병변이 우연히 관찰되었다. MRI 에서 크기는 6cm였고 골내막의 침식(endosteal scalloping) 및 피질골 팽대가 관찰되었다. 적절한 치료를 고르시오.","choices":["광범위절제","고주파 융해술","경과관찰","방사선치료","조직검사"],"answer":5,"explanation":"첨부한 사진의 ELITE enchondroma에서 악성을 시사하는 X-ray 소견에서 endosteal scalloping과 피질골 팽대가 있습니다. 치료 파트의 사진을 보면 방사선 상 저악성도의 종양과 감별해야할 경우 병소를 완전히 소파하거나 소파후 골 이식을 하거나 시멘트를 충전한다고 되있습니다. 보기에 해당 답이 없는데 악성 감별이 필요하기 때문에 소파를 하면서 조직검사를 하는것이 적절할 것으로 보입니다.","reference":"출처: Elite 2022. Vol1. 종양 pg80-81","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e015.jpg?v=1776535000"]},{"num":16,"question":"다음 설명에 해당하는 연부조직 종양은?","choices":["Undifferentiated pleomorphic sarcoma","Myxoid fibrosarcoma","Myxoid liposarcoma","Leiomyosarcoma","Rhabdomyosarcoma"],"answer":3,"explanation":"","reference":"> 대정 pg 575 해당 내용 점액성 지방육종은 다른 연부조직 육종들과 달리 복강 내 연부조직, 종격이나 척추 등 폐 외의 전이(extra-pulmonary metastasis)가 흔히 발생하므로 병기 결정이나 수술 후 추적 검사 시 주의해야한다.","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e016.jpg?v=1776535000"]},{"num":17,"question":"27세 남자가 허벅지 종괴가 있다. 조직검사상 멜라닌 색소 침착을 보였다. FISH 검사에서 EWSR1-ATF1 유전자 결합을 보였다. 진단은?","choices":["골외성 유익육종 (extraosseous Ewing sarcoma)","골외성 점 extraosseous myxoid chondrosarcoma","악성 흑생종(Malignant melanoma)","투명세포종(Clear cell carcinoma)","포상 연부 육종(alveolar soft part sarcoma)"],"answer":4,"explanation":"Clear cell carcinoma","reference":"> 대정 pg 557 Clear cell carcinoma EWS-ATF1 Pg 581 해당 내용. 투명세포육종(Clear cell sarcoma) 매우 드문 종양으로, 20,30대에 호발한다. 발과 족관절의 건막, 건초에서 생겨 근막을 따라 퍼지며 무릎이나 상지에서도 발생한다. 림프절 전이를 잘하며, 멜라닌 색소가 존재하고 면역조직화학검사소견이 흑색종과 비슷한 점 등으로 인하여 과거에는 연부조직에 생기는 악성흑색종의 변종이라고 알려졌던 종양이다. 투명세포육종은 흑색종과 달리 피부를 침범하지 않으며, t(12;22)(q13;q12) 염색체 전위로 인해 ESWR1-ATF1 융합유전자가 90% 이상의 환자에서 발현된다. 절반 이상에서 림프절 전이를 하며, 폐와 뼈에도 잘 전이 된다. 5년, 10년, 20년 생존율은 각각 67%, 33%. 10%정도로 5년 이후에 전이와 재발이 발생하는 경우도 많다. 치료는 광범위 절제술 후에 방사선 치료와 화학요법을 보조적으로 시행한다. 림프절 전이가 있을 경우 림프절곽청술(lymph node dissection)이 필요할 수 있다.","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e017.jpg?v=1776535000"]},{"num":18,"question":"17세 여자 우측 대퇴부에 무통성 종괴가 생겨 내원하였다. 많이 걸으면 종괴가 커지는 양상이고, X-ray 상 우측 대퇴부 석회화 소견이 관찰되고 MRI 상 vastus lateralis를 침범하는 혈관이 풍부한 종양이 관찰되었다. 치료는?","choices":["광범위 절제술","경화요법","정기적 추적관찰","항암화학요법","방사선 치료"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e018.jpg?v=1776535000"]},{"num":19,"question":"70세 남자 1년전 신장암 진단 받고 치료 중으로 우측 대퇴부 통증으로 x-ray 및 MRI 검사상 우측 대퇴부 경부에서 소전자까지 골용해성 병변 관찰되었다. 병리조직검사상 신장암으로 확진 되었고 다른곳에 전이는 발견되지 않았다. 치료는?","choices":["광범위 절제 후 종양 인공삽입물 치환술","소파술 후 금속판을 이용한 내고정술","소파술 후 금속정을 이용한 내고정술","소파술 후 골시멘트 충전술","예방적 내고정술 후 방사선치료"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e019.jpg?v=1776535000"]},{"num":20,"question":"대퇴골 간부 골절에 대해 골수내정 삽입을 시행하려한다. 다음 중 골절 간격 변형률(fracture gap strain)이 가장 큰 것은?","choices":["나선형 골절","분쇄 골절","분절 골절","사상골절","횡 골절"],"answer":5,"explanation":"2022 ELITE Vol. 10 외상 p. 15 유사문제","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e020.jpg?v=1776535000"]},{"num":21,"question":"다량의 출혈의 다발성 외상 환자가 내원하였다. 환자의 치명적 예후와 연관된 삼징후(lethal triad)로 알맞는 것은?","choices":["acidosis-coagulopathy-hypotension","acidosis-coagulopathy-hypothermia","acidosis-hypotension-hypothermia","alkalosis-coagulopathy-hypotension","alkalosis-coagulopathy-hypothermia"],"answer":2,"explanation":"Adult Rockwood 8th. Fig. 9-5<br>2022 ELITE Vol. 10 외상 p. 108","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e021.jpg?v=1776535000"]},{"num":22,"question":"42세 남자 경골 간부의 분절 골절 후 하퇴 부위의 심한 부종과 수포가 있다. 족관절의 수동 신전시에 심한 통증이 있고, 족배동맥이 약하게 촉지되었다. 혈압은 100/60mmhg, 하퇴 조직압(부위 지칭안함) 25mmhg 확인되었다. 경골 골절과 관련된 합병증을 진단하는데 가장 중요한 단서는?","choices":["하퇴 부위의 심한 부종과 수포","족관절 수동 신전시 심한 통증","족배 동맥이 약하게 촉지","하퇴 조직압 25mmHg","확장기혈압 60mmHg"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e022.jpg?v=1776535000"]},{"num":23,"question":"비구부 횡골절에 대해 Kocher-Langenbeck 접근법으로 내고정물 삽입 수술 중이다. 의인성 좌골신경 손상을 예방하기 위한 하지의 자세는?","choices":["고관절 굴곡 - 슬관절 굴곡","고관절 굴곡 - 슬관절 신전","고관절 신전 - 슬관절 굴곡","고관절 신전 - 슬관절 신전","고관절 외전 - 슬관절 신전"],"answer":3,"explanation":"Kocher langenbeck 접근법은 posterior approach 중하나로 수술중 고관절 및 슬관절의 움직임이 있을수 있다. 수술도중 좌골 신경이 당겨지지 않는 position 생각해보면 문제는 쉽게 풀린다. SLR Test 반대로 한다고 생각하면 된다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e023.jpg?v=1776535000"]},{"num":24,"question":"10개월 전 원위 대퇴 1/4 부위의 골절로 확공성 골수내정 삽입술을 시행 받은 이후 골절부위에 지속적으로 통증이 있었다. X-ray상 골수내정과 나사의 파손은 없었으며, 골절부위에 과도한 가골이 관찰되나 불유합 소견이 보인다. WBC 8000/mm3, CRP 0.2mg/dL(정상 <0.5), ESR 10(정상<20) 확인되었다. 가장 적절한 치료는?","choices":["골수내정 교체술","근위 교합나사 제거술","부가적인 금속판 고정술","원위 교합나사 제거술","자가골 이식술"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e024.jpg?v=1776535000"]},{"num":25,"question":"32세 남자 경골 간부 골절에 대해 골수내정 삽입 후 위축성 불유합이 발생하였으며 감염 소견은 없었다. 자가골 이식술 시행 이후 감염 소견은 없었으며, 수술시 시행한 배양검사상 MSSA가 확인되었다. 적절한 처치는?","choices":["내고정물 유지 + 정맥 항생제","내고정물 유지 + 정맥 항생제 + 변연절제술","내고정물 제거 + 정맥 항생제","내고정물 제거 + 정맥 항생제 + 변연절제술","내고정물 제거 + 정맥 항생제 + 항생제시멘트 삽입술"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e025.jpg?v=1776535000"]},{"num":26,"question":"외고정 시행 이후 핀 삽입 부위에서 화농성 삼출물이 관찰되었으며, X-ray상 핀 주위 피질골에 골 용해 소견이 보인다. 적절한 조치는?","choices":["1주일에 한 번 소독","매일 소독","매일 소독 + 항생제","핀 제거 + 변연절제술","광범위 변연절제술 + 골수염에 대한 치료"],"answer":4,"explanation":"2022 기출","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e026.jpg?v=1776535000"]},{"num":27,"question":"75세 여자 대퇴 전자하 골절에 대해 긴 골수정을 삽입하고 있다. 대퇴의 전방 만곡에 비해 상대적으로 더 곧은 골수내정(Straighter nail)을 삽입하려고 한다. 수술 중 발생 가능한 합병증을 예방하기 위해 수술 시 확인해야 하는 영상 검사는?","choices":["대퇴골 간부 AP","대퇴골 근위부 AP","대퇴골 근위부 Lat.","대퇴골 원위부 AP","대퇴골 원위부 Lat."],"answer":5,"explanation":"기출 변형, distal femur anterior cortex perforation을 생각하고 낸 문제입니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e027.jpg?v=1776535000"]},{"num":28,"question":"전후방 압박유형의 골반골 골절 수상한 환자에게 골반바인더(pelvic binder)를 적용하였으나 혈역학적 불안정하였고, 시행한 FAST상 특이소견은 없었으며, 4pack RBC 수혈을 시행하였음에도 혈압이 70/40 이었다. 다음 시행해야 할 술기는?","choices":["골반거즈패킹","외고정 장치","개복술","추가수혈","혈관조영술"],"answer":2,"explanation":"","reference":"Elite 고관절 p.184","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e028.jpg?v=1776535000"]},{"num":29,"question":"원위 대퇴골 골절에 대하여 외측에서 잠김금속판 고정술을 시행할 때, 고정나사가 대퇴내과의내측 피질골 침투여부를 확인하기 위한 X-ray view는?","choices":["AP view","Lat view","Internal oblique view","External oblique view","Tunnel view"],"answer":3,"explanation":"2022년도 1차 기출변형, AO trauma, 골절학, Union 1권 p.212","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e029.jpg?v=1776535000"]},{"num":30,"question":"65세 남자 상완골 원위간부 골절로 관혈적정복술 및 금속판 내고정술 받은 자로, 수술 후 9개월 동안 지속적으로 통증호소하였다. 내원당시 촬영한 단순방사선사진상 15도의 내반변형되어 있으며, 골절부 가골형성 전혀 안되고 원위부 골소실 소견 보이고 있었다. (혈액검사 WBC, crp, esr 정상 범위). 치료는?","choices":["골수내정 삽입술","골형성촉진제 투여","자가골 이식","압박 금속판 고정 및 자가골 이식","최소침습적 금속판 골유합술"],"answer":4,"explanation":"문제의 환자의 경우 reduction loss 및 bone loss를 동반하고 있다. Stable fixation을 위해 압박 금속판으로 reduction 후 bone defect에는 decortication 및 auto bonegraft가 필요할 것입니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e030.jpg?v=1776535000"]},{"num":31,"question":"45세 남자 환자가 교통사고로 인해 응급실에 내원하였다. 영상검사에서 경골 간부 개방성 횡골절 소견이 있었고, 동반손상 없었으며 활력징후는 정상이었다. 개방 창상은 5cm 길이의 선형으로 오염은 심하지 않았고 피부 결손은 없었다. 변연절제술 및 세척술 후 치료로 적절한 것은?","choices":["외고정 후 음압치료","외고정 후 일차 봉합","골수정 내고정 후 음압치료","골수정 내고정 후 일차 봉합","골수정 내고정 후 조기피부 이식"],"answer":4,"explanation":":<br><Reference 및 유사기출 추가 필요>","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e031.jpg?v=1776535000"]},{"num":32,"question":"골반환 후방 골절에서 SI joint screw fixation 시 screw 의 S1 foramen perforation 유무를 보기 위한 가장 유용한 검사는?","choices":["AP view","Inlet view","Outlet view","Obturator oblique view","Iliac wing view"],"answer":3,"explanation":"Inlet: SI screw anterior protrusion 여부<br>AP: iiloischial, iliopectenal line 등의 basic line<br>Outlet: S1 foramen 침범 여부<br>Iliac: 후주, 전벽, quadrilateral space<br>Obturator: 전주, 후벽","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e032.jpg?v=1776535000"]},{"num":33,"question":"전완부 종양제거술 후 손목 관절의 신전제한이 발생하였다. 이때 손목 신전제한의 회복을 위한 건 이전술 중 단요측수근신근 ( extensor carpi radialis brevis) 재건을 위해 사용되는 공여근은?","choices":["Pronator teres","Flexor carpi radialis","Palmaris longus","4th Flexor Digitorum superficialis","Flexor pollicis longus"],"answer":1,"explanation":"유니온 4권 19p","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e033.jpg?v=1776535000"]},{"num":34,"question":"수근관절 척측전위 (ulnar deviation)에서 요측전위 (radial deviation) 시 근위 수근열 (proximal carpal row)인 주상골 및 월상골의 운동방향으로 옳은 것은?","choices":["주상골 – 굴곡 / 월상골 – 굴곡","주상골 – 굴곡 / 월상골 – 신전","주상골 – 신전 / 월상골 – 굴곡","주상골 – 신전 / 월상골 – 신전","주상골 – 중립 / 월상골 – 굴곡"],"answer":1,"explanation":"유니온 1권 229p 수근관절의 요측 변위로만 바뀌고 족보 그대로 문제 였습니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e034.jpg?v=1776535000"]},{"num":35,"question":"75세 여자가 넘어지며 수상하여 원위요골 골절이 진단되었다. 다음 중 설탕 집게부목(sugar tong splint)를 apply 하고자 할 때 알맞은 부위는?","choices":["volar – 원위 수장피선 / dorsal – 중수 수지관절","volar – 근위 수장피선 / dorsal – 중수 수지관절","volar – 원위 수장피선 / dorsal – 원위 지관절","volar – 근위 수장피선 / dorsal – 원위 지관절","volar – 원위 수장피선 / dorsal – 중수 수지관절 (중복 - 원본 오류)"],"answer":2,"explanation":"2020 족보 34번<br>Sugar tong splint 말단 고정 위치 : proximal palmar crease- MCP joint","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e035.jpg?v=1776535000"]},{"num":36,"question":"35세 남환 엄지 중수지관절 과신전된 뒤 내원하였다. 지간관절은 굴곡, 중수지관절은 신전되어있는 상태이며 능동적, 수동적 굴곡 되지 않았다. 영상 검사 상 근위지골은 탈구되어 배측 탈구되어있었고 sessamoid bone은 원위부로 전위되었다. 도수정복 시도하였으나 정복되지 않았다. 상기환자에서 정복을 못하게 막는 구조물로 옳은 것은?","choices":["내측측부인대","외측측부인대","Flexor pollicis brevis","Sessamoid bone","Volar plate"],"answer":5,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e036.jpg?v=1776535000"]},{"num":37,"question":"상완골 간부 골절로 2주 전 최소침습적 금속판 고정술을 시행받은 환자가 수술 직후 손목의 신전, 중수수지관절의 신전이 불가하였다. 현재시점에서 가장 적절한 검사는?","choices":["근전도검사","CT","MRI","초음파","Bone scan"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e037.jpg?v=1776535000"]},{"num":38,"question":"남환 주먹으로 벽 치고 난 후 4수지 신전 잘 안되고 주먹 쥘 때 EDC tendon이 척측으로 빠지는 소견 관찰됨. 손상된 해부학적 구조물은?","choices":["saggital band","보기 2","보기 3","보기 4","보기 5"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e038.jpg?v=1776535000"]},{"num":39,"question":"30세 간호사 1년전부터 발생한 손목통증. 이학적 검사상 손목 요배부 근위 4cm에 통증 및 압통. 저항을 준 상태로 손목 신전 및 무지 신전시 손목 요배부에서 마찰음 및 압통 발생. x-ray에는 특이소견 없었다. 가장 가능성있는 진단명은?","choices":["교차증후군","드퀘르뱅","류마티스관절염","척측 수근 굴건 건초염","요수근 굴건 건초염"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e039.jpg?v=1776535000"]},{"num":40,"question":"2년전 전완부 열상으로 정중 신경 및 척골 신경 손상에 대하여 일차 신경 봉합술 받았으나 갈퀴손 변형이 발생하여 무거운 물체를 들기가 어렵다. 다음 중 가장 먼저 치료해야 할 증상은?","choices":["수근관절 과신전","중수관절 과굴곡","중수관절 과신전","지간관절 과굴곡","지간관절 과신전"],"answer":3,"explanation":"중수관절 과신전 (레퍼런스 21년 1차 기출)","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e040.jpg?v=1776535000"]},{"num":41,"question":"75세 남자 5년전 요골 골절 손상있었으며 당시 보존적 치료 받았다. 3년전부터 손목 회전시에도 손목 통증이 발생하였다. 원위 요척관절부의 통증과 척골와의 압통이 있었다. 방사선학적 검사상에서는 척골 양성변위를 보이고 있었다. 치료로 옳은 것은?","choices":["관절경적 변연절제술","요골 절골술","수근관절 유합술","척골단축술","척골두 절제술."],"answer":5,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e041.jpg?v=1776535000"]},{"num":42,"question":"65세 여자. 손가락 통증으로 시행한 방사선 검사상 월상골의 높이 감소와 분절화 소견이 우연히 발견되었다. 수근골의 관절염은 없었다. 척골 변위는 양성이었고, 손목에 특별한 증상은 없었다. 월상골에 대한 적절한 치료는?","choices":["물리치료","소염제","요골 단축술","정기적 추시 관찰","혈관 부착 골이식술"],"answer":5,"explanation":"Kienbock dz. 월상골의 붕괴가 확인 되고 다른 수근골의 관절염은 없다는 소견으로 Stage IIIA 정도로 보임. 척골 변위가 양성이라 Joint leveling(Radial shortening, ulnar lengthening) 수술은 할 수 없으므로 혈관부착 골이식술 시행. 우연히 발견하고 증상이 없다는 지문때문에 보기 라에 대해서도 고민해 보았으나 현재 IIIA로 joint preservation procedure로 가능한데 경과 관찰 후 진행하게 되면 salvage procedure 해야 하므로 적절하지 않다고 생각됨. ELITE에서도 보존적 치료가 가능한 경우는 Stage I의 젊은 남자가 T2영상에서 high signal 소견 보이는 경우로만 설명하고 있음.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e042.jpg?v=1776535000"]},{"num":43,"question":"35세 남자 2년전에 제1수지 중수골 기저부 골절-탈구로 부목치료 이후 점차 심해지는 통증으로 내원. 신체검사상 제1수지는 내전되어 있었고, 축성압박을 가하고 회전 변형을 시키자 심한 통증 유발. 방사선 검사상 대능형-중수지골 관절 후방 아탈구와 관절 간격의 소실. 적절한 치료는?","choices":["대능형골 부분 절제술 + 건개재 관절성형술","대능형골 완전 절제술 + 건개재 관절성형술","수근중수골 관절경적 변연절제술","수근중수골 유합술","수근중수골 인대 재건술"],"answer":4,"explanation":"2022 ELITE 수부 p.383수부외과학<br>scaphotrapezium arthritis 가 없는 것이 대능형골 부분 절제술과 건개재 관절성형술을 선택하는데 많은 근거가 됐을것이라 생각하는데 유합술 역시 ST joint arthritis가 없을 때 사용할 수 있는 방법이며 수부외과학 책에 보면 문제에 주어진 정보(CMC dorsal subluxation, CMC의 arthritic change를 의미하는 소견)들이 모두 유합술의 indiciation에 들어있고, 특징적으로 젊은 남자(40세 이하)라는 점을 고려했을 때는 수술 후 40%의 근력이 저하되는 trapezium의 절제술보다는 유합술을 선택하는 것이 좀 더 맞을 것 같습니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e043.jpg?v=1776535000"]},{"num":44,"question":"25세 남자 2주전 농구공에 제3수지를 부딪힌 이후 3수지 근위지관절 배측 통증 및 신전 제한으로 내원. 신체 검사상 3수지 근위지관절에 20도의 신전 지연이 확인되나 수동적으로는 신전 가능. 방사선 검사상 골절은 없음. 치료는?","choices":["건 봉합술","건 이식술","경피적 핀 고정술","신전 부목","정기적 추시 관찰"],"answer":4,"explanation":"Extensor tendon의 central slip tear로 인한 Buttonhole deformity 문제. 외상성으로 발생한 경우 contracture가 오기 전에 먼저 conservative Tx를 시행해야 함. Extension splint 적용하여 6주 정도 경과 관찰 시행.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e044.jpg?v=1776535000"]},{"num":45,"question":"15개월 환아가 제 2 물갈퀴공간 및 제 3 물갈퀴공간 합지증에 대하여 수술을 할때 동시에 수술하지 않고 단계적으로 수술하는 이유는?","choices":["수술시간이 길어짐","물갈퀴공간 협착","손톱변형","이식피부부족","혈액순환문제"],"answer":5,"explanation":"한 손가락의 ulnar & radial side를 같이 하면 안 된다 (circulation poor, necrosis) – ELITE 수부 p.275","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e045.jpg?v=1776535000"]},{"num":46,"question":"30세 남자 2주전 넘어지며 발생한 손목 척측 통증으로 내원하였다. 척골와 압통 및 손목회전시 통증이 관찰되었다. 원위요척관절은 안정적이었으며, 척수근 스트레스검사에서 양성소견 보였따. 골절소견은 보이지 않았으며 척골 양성변위가 관찰될떄, 치료는?","choices":["AS TFCC debri","AS TFCC repair","cast","DRUJ lig. recon","ulnar shortening"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e046.jpg?v=1776535000"]},{"num":47,"question":"27세 여자 1주전 제 4수지 근위지간 관절의 과신전 손상을 받았다. 근위지간관절의 전방에 압통이 존재했으며 외측 및 후방에는 압통은 관찰되지 않았다. Finger X-ray lateral view 에서 중위지 기저부 전방에 견열골절이 관찰되었으며 관절면은 10% 침범하였고 아탈구 증상은 보이지 않았다. 치료는?","choices":["6주간 신전부목","ORIF","CRPP","buddy taping하고 관절운동","volar plate 성형술"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e047.jpg?v=1776535000"]},{"num":48,"question":"35세 남자환자 5년전 우측 손목 수상후 통증 지속되어 내원하였다. 우측 완관절 요측 통증 호소하였으며 수근관절에 중등도 운동제한 있었다. 방사선 검사상 주상골 요부 굴곡 변형 및 불유합 소견 보였으며 SL Angle 70도 측정되었고, 주변 관절 관절염 소견 없음. 향후 치료는 ?","choices":["겸상돌기 절제술","경피적 핀 고정술","전방 골이식 + 내고정술","주상골 절제 + 사중유합술","혈관부착골이식"],"answer":3,"explanation":"UNION 1권 259 pg. 문제 동일 합니다. 답가지만 일부 변경 잇습니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e048.jpg?v=1776535000"]},{"num":49,"question":"64세 남 우측 5수지 신전 제한으로 내원하였다. 신체검사상 중수지골 부위부터 수장 부위 cord 및 nodule있었으며 근위지 관절 30도, 중수지간 관절 40도 구축소견을 보였다. 치료는?","choices":["건막 절개술.","건막 절제술","수지 절단술","병변에 스테로이드 주사","정기적 외래 추시"],"answer":2,"explanation":"UNION 1권 263 pg. 나이랑 답가지 빼고 동일합니다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e049.jpg?v=1776535000"]},{"num":50,"question":"45세 여자 제 4수지 끝에 종물이 발생하였고, 찬물에 닿으면 통증이 심해지는 양상이었다.","choices":["GCT tumor","Glomus tumor","Felon","Paronychia","Neuroma"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e050.jpg?v=1776535000"]},{"num":51,"question":"회전근개 파열이 없더라도 초음파 상에서 보이는 경우가 있는데 어떤 것 때문인가?","choices":["산란 scattering","비등방성 Anisotropy","다중반사 Reverberation","음향증강 Acoustic enhancement","후방음영 Acoustic shadowing"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e051.jpg?v=1776535000"]},{"num":52,"question":"RTSA를 시행할 때 상완골의 lateralization 의 효과로 맞는 것은?","choices":["scapular notching 증가","삼각근 덮힘(wrapping) 증가","삼각근 외전 모멘트 감소","외회전 감소","회전근개 긴장도 감소"],"answer":2,"explanation":"Comment) 해당문제에서 상완골의 laterlization 으로 줬던 것 같습니다. Review 논문을 보면 Lateralization 방법 중 medialized glenoid, lateralized humerus 쪽에<br>Notching 감소<br>Deltoid wrapping 증가<br>Deltoid moment arm 증가<br>Rotator cuff tension 증가<br>를 언급하고 있어 답은 2번이 될 것 같습니다.<br>Parry S, Stachler S, Mahylis J. Lateralization in reverse shoulder arthroplasty: A review. J Orthop. 2020 Mar 27;22:64-67. doi: 10.1016/j.jor.2020.03.027. PMID: 32280171; PMCID: PMC7139126.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e052.jpg?v=1776535000"]},{"num":53,"question":"65세 남자환자이다. 견관절을 능동 거상이 되지 않는 상태로 수동적으로 90도 거상 했을때 그 이후로는 능동거상 가능 했다. 관련 있는 병변은?","choices":["광범위 회전근개 파열","동결건","상완신경총 마비","액와신경 마비","충돌증후군"],"answer":1,"explanation":"정형외과학 8판 1권 p821","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e053.jpg?v=1776535000"]},{"num":54,"question":"17세 여자 우세수인 환자이다. 이번에 처음으로 좌측이 빠졌다. ct 상 glenoid 23mm bony bankart 2mm 관찰되고 humeral head 에 hill sachs lesiom 9mm 관찰된다. 신체 검사상 sulcus +1 보이나 주관절 중수지관절 과신전 은 관찰되지 않는다. 다음중 재발성 탈구와 가장 관련 요인은?","choices":["여자","17세","bony bankart 2mm","hill sacs 9mm","sulcus +1"],"answer":2,"explanation":"elite 견관절 p69","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e054.jpg?v=1776535000"]},{"num":55,"question":"45세남자 좌측 견관절 전방 통증이 있고, 이두장건 통증이 있다. 초음파상 이두장건 아탈구가 관찰된다. 가장 가능성 있는 동반 병변은?","choices":["견갑하건","극상건","극하건","상부 관절와순","소원형건"],"answer":1,"explanation":"정형외과학 8판 1권 p836","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e055.jpg?v=1776535000"]},{"num":56,"question":"25세 남자 앞으로 넘어지며 주관절 탈구 후 주관절 후외측 통증. 책상을 짚고 일어설 때 주관절 후외측 불안정 시 동일한 외력 방향? (기출 21, 16년)","choices":["내반, 회내전, 축성 압박","내반, 회내전, 축성 신전","내반, 회외전, 축성 신전","외반, 회외전, 축성 신전","외반, 회외전, 축성 압박"],"answer":5,"explanation":"정형외과학 8판 1권 p910-911","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e056.jpg?v=1776535000"]},{"num":57,"question":"상완골 외과적 경부 골절 삼각-대흉근 접근법으로 잠김 금속판 고정술 시행 중. 금속판의 원위부가 원위 골절 앞으로 고정될 경우 가장 중요한 원인?","choices":["동반된 회전근개 파열","부족한 해부학적 정복","삼각근 부착부의 불충분한 유리","삼각근하 유착","수술전 견관절 강직"],"answer":2,"explanation":"견주관절 p423-424","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e057.jpg?v=1776535000"]},{"num":58,"question":"20세 남자가 운동 중 좌측 쇄골을 부딪힌 뒤로 좌측 전흉부 통증 발생하였고 숨을 잘 못쉬는 느낌과 쉰 목소리가 나왔다. 신체 진찰 상 쇄골 내측부가 만져지지 않았고 serendipity view 상 쇄골 내측부의 후내방 전위가 보였다. 치료는?","choices":["경과관찰","관절 정복술","금속판 고정술","내측 쇄골 절제술","인대 재건술"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e058.jpg?v=1776535000"]},{"num":59,"question":"59. 52세 여자환자로, 4개월 간의 우측 어깨 통증 및 1개월 전부터 악화된 통증으로 내원하였다. 일상생활이 어렵고 야간통도 심하였다. 우측 견관절의 수동적 운동 범위는 FF 120도, ER 30도, IR L5 로 측정되었다. 소염 진통제로는 호전이 잘 되지 않았다. 스트레칭과 더불어 해야할 치료로 가장 적절한 것은?","choices":["관절강 내 스테로이드 주사","관절경적 관절낭 이완술","마취 하 도수조작술","수압 팽창술","체외 충격파"],"answer":1,"explanation":"<유사기출 추가>","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e059.jpg?v=1776535000"]},{"num":60,"question":"역행성 견관절 전치환술(Reverse total shoulder arthroplasty) 후 흔히 발생하는 관절와 하방 절흔(inferior scapular notching)의 합병증을 예방하기 위한 방법은?","choices":["관절와 치환물 상방 경사(superior tilting)","큰 경간각(neck-shaft angle)의 상완와 치환물 사용","큰 Glenosphere 사용","하방관절와 상완인대(IGHL) 유리술","Glenosphere 상방 고정"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e060.jpg?v=1776535000"]},{"num":61,"question":"20세 수영선수가 최근 2달 전부터 기록(lab time)이 줄어들었다. 수영 할 때마다 어깨 통증이 악화되었다. 신체검진 상 관절와상완(Glenohumeral) 관절의 외회전 증가 및 내회전 감소 돼 있었다. 시행한 MRA 상 회전근개 내 병변과 견관 절 내 병변은 없었다. 환자의 증상을 완화하기 위한 적절한 치료 방법은?","choices":["Anterior capsular stretching exercise","External rotation stretching exercise","Pendulum exercise","Sleeper stretching exercise","Triceps stretching exercise"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e061.jpg?v=1776535000"]},{"num":62,"question":"1년간 지속되는 어깨 통증 및 관절 운동 제한을 주소로 내원한 50세 남자환자이다. 신체 진찰 상 능동적 외회전 불가하였고, 전방굴곡각도 100도였다. 시행한 MRI 상 극하건 및 소원근의 심한 내측 퇴측(retraction) 소견과 진행한 지방 변성 소견 관찰 됐다. 상기 환자의 근이전술로 사용할 공여근으로 적절한 것은?","choices":["광배근(Latissumus dorsi)","대흉건(Pecroralis major)","상부 승모근(trapezius)","소흉건(Pectoralis minor)","이두 장건근(Biceps long head)"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e062.jpg?v=1776535000"]},{"num":63,"question":"견관절의 Adhesive capsulitis환자로 보존적 치료 했음에도 통증이 지속되어 관절경하 하방관절낭 수술적 치료 시행하였다. 수술 후 신경손상이 발생하였을 때, 증상으로 적절한 것은?","choices":["견관절 외전","견관절 외회전","손목관절 굴곡","손목관절 신전","주관절 굴곡"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e063.jpg?v=1776535000"]},{"num":64,"question":"30세 남자 넘어진 후 발생한 견관절 통증으로 내원함. Clavicle ap view 및 weight bearing view에서 쇄골보다 견갑골이 경도의 상승을 보이고, 견봉쇄골 관절의 widening이 보였다. Rockwood type III, IV 구분 위해 추가로 찍어야할 X RAY는?","choices":["axillary view","Skyler notch view","Scapula ap view","West point view","Suprascapular outlet view"],"answer":1,"explanation":".","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e064.jpg?v=1776535000"]},{"num":65,"question":"23세 투수 2개월 전부터 구속감소 및 내상과 팔꿈치 통증으로 내원. 4th 5th 손가락 위약감 및 저린 증상 발생함. 경기중 또는 직후에만 증상이 있으며 쉬면 나아지는 양상이다. 증상의 원인은?","choices":["내측 불안정성","골연골병변","외측 불안정성","이두 장두건 염증","후골간신경 마비"],"answer":1,"explanation":".Elite 2022. P364","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e065.jpg?v=1776535000"]},{"num":66,"question":"외번(eversion) 후 발생한 족관절 내외측의 통증 및 부종으로 내원하였다. 단순 방사선 상 골절 소견은 보이지 않았으며, ER stress test positive 일 때 손상됐을 구조물로 알맞은 것은? 1","choices":["말초신경병증","전방 족근관 증후군","족근관 증후군","족근동 증후군","지간신경종"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e066.jpg?v=1776535000"]},{"num":67,"question":"20세 발레리나가 제 1 물갈퀴 공간(1st web space)에 감각 저하 및 통증을 호소하였다. 볼이 좁은 신발을 신으면 증상이 악화되었다. 지간 압박 검사상 음성 소견 보였다. 전기 진단 검사상 심부 비골 신경(deep peroneal nerve) 원위부의 운동 및 감각 전달 속도 저하를 보였고, 비골 경부 및 족관절 위치에서는 정상 소견 보였다. 진단은?","choices":["말초신경병증","전방 족근관 증후군","족근관 증후군","족근동 증후군","지간신경종"],"answer":2,"explanation":"Anterior tarsal tunnel syndrome은 흔히 deep peroneal nerve compression과 연관된다.<br>증상은 통증, 감각 저하, 위약감으로 나타난다.<br>비수술적 치료: 발, 발목의 전방부가 압박되지 않게 해야함. Shoe modification, cortisone inj. PT<br>수술적 치료: 신경 압박 부위를 찾아서 감압. (extensor retinaculum 근위부 또는 tarsal, metatarsal까지 원위부로 갈수도 있다.)","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e067.jpg?v=1776535000"]},{"num":68,"question":"24세 남자가 4개월 전 농구하다 우측 발목을 접지른 후 족관절 불안정성이 지속되었다. 수상 당시 특별한 치료는 받지 않았다고 한다. 신경학적 증상은 없었고, 내반 부하 영상 검사 (varus stress radiograph)상 우측 거골각 6도, 좌측 거골각 4도로 측정되었다. 가장 적절한 치료는?","choices":["동종건을 이용한 해부학적 재건술","보조기 착용 및 보행","비골건 이전을 통한 비해부학적 재건술","신전지대 보강 및 외측부인대 봉합술","비골근 강화 운동 및 재활"],"answer":5,"explanation":"UNION","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e068.jpg?v=1776535000"]},{"num":69,"question":"48세 남성, ankle medial OA, intact talar dome, TAS 78도로 SMO 시행 시 적절한 교정각은?","choices":["8","10","15","18","20"],"answer":3,"explanation":"추가","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e069.jpg?v=1776535000"]},{"num":70,"question":"50세 남성으로 근래의 뒷꿈치 통증을 호소하며 돌출로 신발신기 불편하다고 함. 마라톤을 즐긴다고 하고 이전에는 치료 받지 않았었다고 함. 적절한 치료는?","choices":["스테로이드 주사","스트레칭, 신발 교정","종골 절골","체외충격파","프롤로"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e070.jpg?v=1776535000"]},{"num":71,"question":"족관절 삼과골절에서 외과골절 정복시키면 후과골절은 자연적으로 정복되는 경우가 많다. 관련된 구조물은?","choices":["deltoid lig.","ATFL","AITFL","PTFL","PITFL"],"answer":5,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e071.jpg?v=1776535000"]},{"num":72,"question":"거골경부 전위성 골절로 관혈적 정복술 시행 후, 3개월째 시행한 방사선 사진에서 거골 체부의 골경화 소견이 관찰되었다. 가장 원인이 되는 혈관은 무엇인가?","choices":["Deltoid artery","Dorsalis Pedis artery","Artery of tarsal sinus","Artery of tarsal canal","Peroneal artery"],"answer":4,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e072.jpg?v=1776535000"]},{"num":73,"question":"아킬레스 파열 수술 후 1년이 된 30살 남자가 계단을 내려 갈 때 위약감이 느껴졌다. 초음파 검사에서 아킬레스건의 연속성은 잘 유지되고 건측에 비해 근위축은 없었다. 나타날 수 있는 증상은?","choices":["족간대성경련 (Ankle clonus)","Hyper dorsiflexion","Thompson squeeze test 양성","Skin dimpling","Silfverskiold test 양성"],"answer":2,"explanation":"건의 연속성이 유지되고 근위축이 없음에도 족저 굴곡 근력 약화가 나타난 것으로 보아 achilles teondon elongation이 되었음을 알 수 있고, elongation 정도는 ankle dorsiflexion의 정도에 의해 알 수 있다.<br>즉 dorsiflexion이 많이 되면 elongation이 많음을 의미한다.<br>Elite 족부 p.15","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e073.jpg?v=1776535000"]},{"num":74,"question":"28세 남자가 농구하다가 다친 뒤 계단을 오르거나 쪼그려 앉을 때 족관절 외측에서 '툭'하는 소리와 함께 통증이 느껴졌고, 신체검사상 비골 후방에서 압통이 있었다. 수술 시 재건해야할 구조물은?","choices":["Superior peroneal retinaculum","achilles tendon","anterior talofibular ligament","Inferior peroneal retinaculum","Inferior extensor retinaculum"],"answer":1,"explanation":"급성 비골건의 전방 탈구는 갑작스러운 족관절의 과신전 또는 외전과 함께 강한 비골근의 수축 으로 인하여, superior peroneal retinaculum의 파열 또는 이로 인한 비골과의 견연 골절에 의하여 발생하는 것으로 주로 스키, 축구 선수에서 호발한다.<br>아래 그림처럼 지붕이 superior peroneal retinaculum이며 peroneal canal안에 2개의 tendon (PL, PB) 가 있다.<br>Dynamic test를 시행하면 2개의 tendon이 서로 위치가 바뀌거나, 또는 SPR 위로 subluxation되 는 것을 볼 수 있다.","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e074.jpg?v=1776535000"]},{"num":75,"question":"65세 여자환자로 2년전부터 시작된 좌측 무지 통증을 주소로 내원하였다. 진찰 소견상 제1 중족 족지 관절의 배굴 제한과 압통이 있으며, 방사선 검사상 중족골두 배부에 골극이 존재하였다. 보행 중 가장 통증을 많이 호소하는 시기는?","choices":["입각기 초기","입각기 중기","입각기 말기","유각기 초기","유각기 중기"],"answer":3,"explanation":"엘리트 족부 289pg","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e075.jpg?v=1776535000"]},{"num":76,"question":"65세 여자환자로 족부 제1족지 건막류 부위의 통증과 외반변형이 있었다. 무지외반각도는 50도, 중족지간각도는 20도였다. 신체검진상 1st ray instability가 존재하였다. 이 환자를 수술 할 때, 원위 연부조직 유리술과 함께 시행할 술기는?","choices":["1st 중족-족지골 유합술","1st 중족골 원위 절골술","1st 중족골 간부 절골술","1st 중족골 근위 절골술","1st 족근 중족골 유합술"],"answer":5,"explanation":"다빈도 기출, 1st ray instability -> Lapidus op","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e076.jpg?v=1776535000"]},{"num":77,"question":"45세 여자가 우측 제 2족지 족배부에 painful callus로 내원하였다. 해당 callus는 제 2족지 PIP joint의 dorsal side에 위치하였으며, PIP 및 DIP는 flexion 되어 있었다. 제 2 족지 종족골두를 손가락으로 들어올리면서 족관절을 배굴시킬때 해당 변형은 교정되는 양상이었다. 치료는?","choices":["2nd 근위지관절의 절제 관절성형술","굴곡건 이전술","2nd 중족족지 관절유합술","Weil osteotomy","장족지신전근 연장술"],"answer":2,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e077.jpg?v=1776535000"]},{"num":78,"question":"60세 당뇨병 환자에서 1년 동안 지속되는 제 2 종족골두 족저부의 약 1cm*1.5cm 크기의 궤양이 있었다. 궤양은 피하조직까지만 노출되어 있었으며 발적은 없었다. 족부의 동맥은 잘 촉지되었으며 ABI 0.95이다. 피부 감각은 감소되어 있었다. 가장 적절한 치료는??","choices":["베타딘 드레싱","음압 상처 치료","전 접촉 석고 붕대 고정","피부 이식","변연 절제술 후 일차 봉합술"],"answer":3,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e078.jpg?v=1776535000"]},{"num":79,"question":"만성 족관절 불안정증에 대한 관절경적 외측 인대 봉합술을 할 때, 전거비인대의 상태를 보기 위한 관절경 삽입구 A 와 기구 삽입구 B 로 적절한 조합은?","choices":["A 전경골근 내측 B 제3비골근 외측","A 전경골근 외측 B 장무지신전근 내측","A 제3비골근 내측 B 전경골근 내측","A 제3비골근 내측 B 장무지신전근 외측","Sono"],"answer":1,"explanation":"","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e079.jpg?v=1776535000"]},{"num":80,"question":"45세 여자환자로 6개월전부터 간헐적으로 발생하는 족관절의 통증 및 불안정증으로 내원하였다. 통증은 활동을 시작할때 악화되는 양상이며 호전과 악화를 반복하였다. 신체검진상 족관절 전내측의 압통외 특이소견은 없었다. 진단을 위해 가장 적절한 검사는?","choices":["골주사검사","stress xray","Sono","CT","MRI"],"answer":5,"explanation":"OLT, Elite 2022 족부 page. 73 ( 기존문제와 동일)","reference":"","section":"2023년 1차","chapter":"2교시","explanation_images":["images/2023_1차_2교시_e080.jpg?v=1776535000"]},{"num":1,"question":"27세 여자 우측 대퇴부 통증으로 내원하여 시행한 x-ray, bone scan이다. 관련있는 유전자는? -x-ray : 위 사진보다는 덜 심함.. Rt ilium, Rt proximal femur, Rt fibular shaft 에 FD 처럼 보임 -Bone scan : Fibrous dysplasia 있는 부위에 동일하게 hot uptake 되어있는 양상","choices":["EWS-FLI1","EXT1/EXT2","GNAS","NF1","SST-SSX1"],"answer":3,"explanation":"","reference":"대정 8판","section":"2023년 2차","question_images":["images/2023_2차_q001.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e001.jpg?v=1776535000"],"chapter":"종양"},{"num":2,"question":"54세 남자 특이 기저질환 없으며 Rt hip pain으로 내원하여 시행한 x-ray, bone scan, PET-CT이다. - X-ray : Rt femur neck pathologic fx, cookie bite appearance - Bone scan : Rt femur uptake 외에 정상 - PET-CT : Rt lung 에 hot uptake 적절한 조치 혹은 치료는?","choices":["조직검사","소파술 및 내고정술 + 골시멘트 충전","소파술 및 내고정술 + 골이식","소파술 및 인공관절 치환술","광범위 절제술 및 종양대치물"],"answer":1,"explanation":"","reference":"2022 엘리트 종양 206pg","section":"2023년 2차","question_images":["images/2023_2차_q002.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e002.jpg?v=1776535000"],"chapter":"종양"},{"num":3,"question":"45세 남자 좌측 견관절 통증으로 내원하여 시행한 검사이다. 적절한 치료 방법은? - X-ray : cortex 침범한 extracompartmental chondrosarcoma, 위 사진은 osteosarcoma 이고 medulla 안에 calcification 있었음) MRI : enhance(+), medial 쪽으로 tumor cortex 뚫고 나옴 병리사진 :High cellularity, High grade chondrosarcoma","choices":["Extended curettage + BG","Extended curettage + cement augmentation","Wide excision","Wide excision + Chemo","Wide excision + Chemo + RT"],"answer":3,"explanation":"","reference":"작년 2차 유사 문제, 유니온 첨부(low grade 아니였음 이번엔) *Low grade 였다는 의견도 있으나 extracompartmental 이라 Wide excision 필요","section":"2023년 2차","question_images":["images/2023_2차_q003.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e003.jpg?v=1776535000"],"chapter":"종양"},{"num":4,"question":"좌골신경을 침범한 다음 종양에 대해 적절한 치료는?","choices":["변연절제술","변연절제술 + RT","광범위절제술","광범위절제술 + CT","광범위절제술 + CT + RT"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q004.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e004.jpg?v=1776535000"],"chapter":"종양"},{"num":5,"question":"치료지침을 결정하기 위해 bx 필요한 종양은?","choices":["[보기 1 - 이미지]","[보기 2 - 이미지]","[보기 3 - 이미지]","[보기 4 - 이미지]","[보기 5 - 이미지]"],"answer":4,"explanation":"","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q005.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e005.jpg?v=1776535000"],"chapter":"종양"},{"num":6,"question":"13세 남아 검사 상 다음과 같은 소견(xray: distal femur metaphysis에 위치한 osteoblastic하며 periosteal reaction 저명하여 osteosarcoma 의심되는 소견, mri: coronal, saggital, axial이 각각 stack으로 주어짐. Soft tissue extension 저명하였으나 관절면을 침범하진 않았음.) 보일 때 적절한 조직검사 경로는?(MRI distal femur axial cut 주어지며 빨간 화살표 방향 다섯 개 주어지고 적절한 경로를 택하라고 함)?","choices":["A","B","C","D","E"],"answer":5,"explanation":"(실제 주어진 axial cut은 위 사진보다 좀 더 distal로 전형적인 distal femur의 trapezoidal shape이 보이는 level이었고, mass는 모든 방향으로 extraosseous extension 되어있는 모습이었습니다. Distal femur에선 vastus lateralis or medialis를 가르고 들어가는 것이 원칙인데, 이런 경우 VL or VM 둘 다 최단 경로 접근이 가능하여 실제 시험에서 B, E중 어느 것을 답으로 할지 고민하다 추후 wide resection을 시행할 때 조직검사 경로를 모두 포함하여 절제해야함을 고려한다면, lateral side로 접근하여 distal femur resection 이후 tumor prosthesis reconstruction 하는 것이 일반적이므로 VM보다는 VL로 접근하는 게 더 적절할 것으로 생각되어 E를 골랐습니다.<br>참조) 2022 대정 ICL – ‘악성 골종양 치료 원칙’ 김완림 교수님<br>-Distal femur는 주로 VL or VM을 가르고 들어가고, proximal tibia는 anteromedial로 들어간다<br>-Proximal humerus는 anterior deltoid로 들어가는 게 중요함<br><총론>","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q006.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e006.jpg?v=1776535000"],"chapter": apter":"견주관절"},{"num":22,"question":"RTSA시 A에 비해 B에서의 상대적인 장점을 고르시오.","choices":["내회전범위 증가","외회전범위 증가","Scapular notching 증가","통증","재수술율 감소"],"answer":2,"explanation":"RTSA에서 B(X-ray에서 더 lateralized된 rTSA)가 A(medialized rTSA)보다 갖는 장점: 외회전범위 증가, scapular notching 감소, rotator cuff tension 증가. 따라서 상대적 장점은 외회전범위 증가(2번).","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q022.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e022.jpg?v=1776535000"],"chapter":"견주관절"},{"num":23,"question":"반복적인 어깨 탈구 환자의 견관절 MR-arthrogram이다. 화살표가 표시하는 구조를 관절경 영상에서 고르시오. (G : glenoid, H : humeral head)","choices":["[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]"],"answer":4,"explanation":"유니온 3권 16번 입니다<br>다른 풀이<br>연수강좌<br>연수강좌에서 해당 구조물은 MGHL 이라고 했으며 bankart lesion 은 저렇게 멀리 떨어지지 않는다고 하였습니다. 해당 그림은 2021 intaining 에 출제됐던 그림과 똑같았습니다.","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q023.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e023.jpg?v=1776535000"],"chapter":"견주관절"},{"num":24,"question":"glenoid inferior pole Fx 3D CT 보여주고 수술 동영상 보여주면서 어느 intermuscular plane으로 approach 하는것인지? *편집자 추가 :fx 양상이 lateral border쪽에서 깨져 shortening 되어있는 CT였던걸로 기억합니다. Post op X-ray * 편집자 추가 : 수술 동영상(환자를 prone position으로 등쪽에서 horizontal dissection 하였고 fixation 후 닫을 때 위 아래 muscle 을 집게로 잡고 닫았다 열었다 했음","choices":["견갑하근 – 극상근","극상근 – 극하근","극하근 – 소원근","대원근 – 광배근","소원근 – 대원근"],"answer":3,"explanation":"Judet approach","reference":"","section":"2023년 2차","question_images":["images/2023_2차_q024.jpg?v=1776535000"],"explanation_images":["images/2023_2차_e024.jpg?v=1776535000"],"chapter":"견주관절"},{"num":25,"question":"다음 상완골 골절 중 fibular strut allobone graft가 필요한 엑스레이 소견은?","choices":["[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]","[보기 1 - 이미지]"],"answer":4,"explanation":"","reference":"대정 8판 1560p, campbell 3050p medial support와 medial comminution이 reduction loss에 중요한 risk factor이고, fibular strut allograft를 사용해야 한다는 indication
